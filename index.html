'use strict';
// ============================================================
// SKYSTACK — vibrant pixel stack-tower arcade game
// Screens: HOME / SHOP / ME (+ in-run HUD, game over).
// Tutorial, chiptune music, XP levels, achievements, settings.
// Single file, zero deps.
// ============================================================
// logical resolution matches the device aspect ratio EXACTLY in both dimensions, so filling
// the screen never distorts pixels — tall screens get more H, wide screens get more W, and
// every element repositions off W/H instead of stretching. Recomputed live on resize/rotate.
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W = 0, H = 0;
function computeSize() {
  const AR = Math.max(innerWidth, 1) / Math.max(innerHeight, 1);
  H = AR <= 1 ? Math.min(520, Math.max(300, Math.round(180 / AR))) : 320;
  W = AR <= 1 ? Math.max(150, Math.round(H * AR)) : Math.min(960, Math.round(H * AR));
  canvas.width = W; canvas.height = H;      // resets ctx state
  ctx.imageSmoothingEnabled = false;
}
computeSize();
const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;

function fitCanvas() {
  // logical aspect matches the window by construction, so 100% fill keeps pixels square.
  // small drift (browser bars collapsing, entering fullscreen) becomes invisible stretch;
  // only a big mismatch (rotation) falls back to centered aspect-fit
  const arWin = innerWidth / Math.max(innerHeight, 1), arGame = W / H;
  if (Math.abs(arWin - arGame) < arGame * 0.15) {
    canvas.style.width = '100vw';
    canvas.style.height = '100vh'; canvas.style.height = '100dvh';  // dvh tracks browser bars
  } else {
    const scale = Math.min(innerWidth / W, innerHeight / H);
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }
  if (booted) render();
}
var booted = false;
var canvasRect = null;
var adaptTimer = 0;
addEventListener('resize', () => {
  canvasRect = null; fitCanvas();
  clearTimeout(adaptTimer); adaptTimer = setTimeout(adaptToScreen, 180);   // settle, then re-adapt
});
// exactly ONE animation loop, ever
var rafId = 0;
function kickLoop() { if (rafId) return; last = performance.now(); rafId = requestAnimationFrame(frame); }
document.addEventListener('visibilitychange', () => { if (!document.hidden) kickLoop(); });
addEventListener('focus', kickLoop);
addEventListener('pointerdown', kickLoop, true);
fitCanvas();

  '!':[4,4,4,4,4,0,4],'+':[0,4,4,31,4,4,0],'-':[0,0,0,31,0,0,0],'.':[0,0,0,0,0,6,6],':':[0,6,6,0,6,6,0],
  '<':[2,4,8,16,8,4,2],'>':[8,4,2,1,2,4,8],'/':[1,2,2,4,8,8,16],'%':[17,1,2,4,8,16,17],
  '*':[0,10,4,31,4,10,0],'?':[14,17,1,2,4,0,4]
};
function txt(text, x, y, sc, color, align) {
  text = String(text).toUpperCase();
  const cw = 6 * sc, totalW = text.length * cw - sc;
  let px = x;
  if (align === 'center') px = Math.round(x - totalW / 2); else if (align === 'right') px = Math.round(x - totalW);
  ctx.fillStyle = color;
  for (const ch of text) {
    const g = FONT[ch];
    if (g) for (let r = 0; r < 7; r++) { const b = g[r]; for (let c = 0; c < 5; c++) if (b & (16 >> c)) ctx.fillRect(px + c * sc, y + r * sc, sc, sc); }
    px += cw;
  }
}

// ---------- audio ----------
let AC = null;
let muted = store.get('skystack-mute', false);
let musicOn = store.get('skystack-music', true);
let hapticsOn = store.get('skystack-hapt', true);
function audio() { if (!AC) { try { AC = new (window.AudioContext || window.webkitAudioContext)({ latencyHint: 'interactive' }); } catch (e) {} } if (AC && AC.state === 'suspended') AC.resume(); return AC; }
function tone(f, dur, type, vol, when) {
  const ac = audio(); if (!ac || muted) return;
  const t = ac.currentTime + (when || 0), o = ac.createOscillator(), g = ac.createGain();
  o.type = type || 'square'; o.frequency.value = f;
  g.gain.setValueAtTime(vol || 0.12, t); g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(g); g.connect(ac.destination); o.start(t); o.stop(t + dur + 0.02);
}
function noise(dur, vol) {
  const ac = audio(); if (!ac || muted) return;
  const len = Math.floor(ac.sampleRate * dur), buf = ac.createBuffer(1, len, ac.sampleRate), d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
  const s = ac.createBufferSource(), g = ac.createGain(); s.buffer = buf; g.gain.value = vol; s.connect(g); g.connect(ac.destination); s.start();
}
function hapt(m) { if (muted || !hapticsOn) return; try { navigator.vibrate && navigator.vibrate(m); } catch (e) {} }
const sfx = {
  land() { tone(110, .09, 'triangle', .22); tone(70, .12, 'sine', .18); hapt(12); },
  slice() { noise(.09, .14); tone(180, .05, 'sawtooth', .05); },
  perfect(c) { const f = 523 * Math.pow(2, Math.min(c, 16) / 12); tone(f, .09, 'square', .10); tone(f * 1.5, .12, 'square', .08, .07); hapt(18); },
  milestone() { [523, 659, 784, 1047].forEach((n, i) => tone(n, .14, 'square', .10, i * .09)); hapt([20, 40, 30]); },
  coin() { tone(988, .05, 'square', .07); tone(1319, .07, 'square', .06, .04); },
  power() { [659, 880, 1175].forEach((n, i) => tone(n, .1, 'triangle', .1, i * .05)); hapt([12, 20]); },
  gift() { [784, 988].forEach((n, i) => tone(n, .08, 'square', .09, i * .06)); tone(1319, .12, 'triangle', .08, .12); hapt([12, 18]); },
  pop() { noise(.05, .18); tone(880, .06, 'square', .1); tone(1175, .05, 'square', .07, .04); hapt(15); },

  unlock() { [392, 523, 659, 880].forEach((n, i) => tone(n, .13, 'triangle', .11, i * .08)); hapt([15, 30, 15, 30]); },
  mission() { [784, 988, 1319].forEach((n, i) => tone(n, .12, 'square', .1, i * .07)); hapt([15, 25]); },

  start() { tone(523, .07, 'square', .08); tone(784, .1, 'square', .08, .08); },
  tap() { tone(660, .05, 'square', .06); },
  pause() { tone(660, .06, 'triangle', .08); tone(440, .1, 'triangle', .07, .06); },      // settle down

  wind() { tone(220, .5, 'sine', .04); noise(.5, .03); }

// ---------- music (procedural chiptune; tempo rises with tower height + streak) ----------
const BASS = [110, 87.31, 130.81, 98];                    // A F C G
const PENT = [220, 261.63, 293.66, 329.63, 392, 440];     // A minor pentatonic-ish
let musicNext = 0, musicBar = 0, hatBuf = null, barT0 = 0, barDurCur = 0;
function beatPulse() {   // 0..1, peaks on each music bar so UI breathes in time with the tune
  if (AC && AC.state === 'running' && !muted && musicOn && musicNext > 0 && barDurCur > 0) {
    let ph = ((AC.currentTime - barT0) / barDurCur) % 1;
    if (ph < 0) ph += 1;
    return Math.max(0, 1 - ph * 2.2);
  }
  return .5 + .5 * Math.sin(tick * .1);
}
function curBarDur() {
  const playing = state === 'playing' || state === 'dropping';
  let d = 1.85;                                                        // menus: calm
  if (playing) d = clamp(1.62 - blocks.length * 0.004, 1.22, 1.62);   // runs: driving, faster as you climb
  if (fever || nova) d *= 0.85;                                        // hotter in a streak
  return d;
}
function scheduleBar(t, bar, dur) {
  const ac = AC;
  barT0 = t; barDurCur = dur;
  const playing = state === 'playing' || state === 'dropping';
  const hot = fever || nova;
  const SB = (typeof EV !== 'undefined' && EV && EV.music) ? EV.music.bass : BASS;
  const SP = (typeof EV !== 'undefined' && EV && EV.music) ? EV.music.pent : PENT;
  const bass = SB[bar % 4] * (nova ? 2 : 1);
  if (playing) {
    // pumping quarter-note bass
    for (let q = 0; q < 4; q++) {
      const tq = t + q * (dur/4);
      const o = ac.createOscillator(), g = ac.createGain();
      o.type = 'triangle'; o.frequency.value = bass;
      g.gain.setValueAtTime(0.05, tq); g.gain.exponentialRampToValueAtTime(0.001, tq + dur/4 * 0.9);
      o.connect(g); g.connect(ac.destination); o.start(tq); o.stop(tq + dur/4);
    }
    // kick on the downbeats
    for (const kq of [0, 2]) {
      const tk = t + kq * (dur/4);
      const o = ac.createOscillator(), g = ac.createGain();
      o.type = 'sine'; o.frequency.setValueAtTime(120, tk); o.frequency.exponentialRampToValueAtTime(45, tk + 0.09);
      g.gain.setValueAtTime(0.13, tk); g.gain.exponentialRampToValueAtTime(0.001, tk + 0.11);
      o.connect(g); g.connect(ac.destination); o.start(tk); o.stop(tk + 0.13);
    }
    // hi-hats: off-beats normally, every 8th when hot
    if (!hatBuf) { const len = Math.floor(ac.sampleRate * 0.03); hatBuf = ac.createBuffer(1, len, ac.sampleRate); const d2 = hatBuf.getChannelData(0); for (let s2 = 0; s2 < len; s2++) d2[s2] = (Math.random()*2-1) * (1 - s2/len); }
    for (let i = 0; i < 8; i++) {
      if (i % 2 === 0 && !hot) continue;
      const src = ac.createBufferSource(), g = ac.createGain();
      src.buffer = hatBuf; g.gain.value = 0.05;
      src.connect(g); g.connect(ac.destination); src.start(t + i * (dur/8));
    }
  } else {
    // menu: soft sustained pad
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = 'triangle'; o.frequency.value = bass;
    g.gain.setValueAtTime(0.035, t); g.gain.setValueAtTime(0.035, t + dur*0.8); g.gain.linearRampToValueAtTime(0.001, t + dur);
    o.connect(g); g.connect(ac.destination); o.start(t); o.stop(t + dur);
  }
  for (let i = 0; i < 8; i++) {
    if (!hot && (bar + i) % 4 === 3 && i % 2 === 1) continue;          // breathing room (none when hot)
    const f = SP[(bar * 3 + i * 2 + (i > 4 ? 1 : 0)) % SP.length] * (i === 7 || hot ? 2 : 1);
    const t2 = t + i * (dur / 8);
    const o2 = ac.createOscillator(), g2 = ac.createGain();
    o2.type = 'square'; o2.frequency.value = f;
    g2.gain.setValueAtTime(hot ? 0.026 : playing ? 0.024 : 0.02, t2); g2.gain.exponentialRampToValueAtTime(0.001, t2 + 0.14);
    o2.connect(g2); g2.connect(ac.destination); o2.start(t2); o2.stop(t2 + 0.16);
  }
}
function musicStep() {
  if (!AC || AC.state !== 'running' || muted || !musicOn) { musicNext = 0; return; }
  if (musicNext === 0) musicNext = AC.currentTime + 0.1;
  while (musicNext < AC.currentTime + 0.4) { const d = curBarDur(); scheduleBar(musicNext, musicBar, d); musicNext += d; musicBar++; }
}

}

// shine that lives ON the letterforms: re-draws the title in white inside narrow
// vertical strips around a sweeping center, so it hugs every pixel of the glyphs
// and eases in/out over its cycle — never a box, never a hard cut-off
function titleShine(str, y, scale) {
  if (reduceMotion) return;
  const tw2 = str.length * 6 * scale, ttx = Math.round(W/2 - tw2/2);
  const phase = (tick % 150) / 150;                  // sweep, then rest
  if (phase >= 0.5) return;
  const p2 = phase / 0.5;
  const cx3 = ttx - 8 + (tw2 + 16) * p2;             // sweep center
  const fade = Math.sin(p2 * Math.PI);               // soft start + finish
  const gh = 7 * scale + 2;                          // glyph height + slack
  for (const band of [[0, .55], [3, .3], [6, .12]]) {
    for (const s2 of [-1, 1]) {
      const bx2 = cx3 + band[0] * s2 - (s2 < 0 ? 3 : 0);
      ctx.save(); ctx.beginPath(); ctx.rect(bx2, y - 1, 3, gh); ctx.clip();
      txt(str, W/2, y, scale, 'rgba(255,255,255,' + (band[1] * fade).toFixed(3) + ')', 'center');
      ctx.restore();
      if (band[0] === 0) break;                      // center band once
    }
  }
}

// ---------- sky map (level select: one row per level, drag-scrolls, footer launches) ----------
// list layout: one generous row per level on a straight climbing trail down a
// centered column; the list drag-scrolls whenever it is taller than the screen
const MAP_ROW = 30, MAP_HEAD = 40, MAP_FOOT = 34;
function skyMapNodes() {
  const viewTop = MAP_HEAD + 4, viewBot = H - MAP_FOOT - 4;
  const colW = Math.min(W - 12, 288), colX = Math.round((W - colW) / 2);
  const n = TIERS.length;
  const contentH = (n + 2) * MAP_ROW;                       // ground + levels + gate
  mapScrollMax = Math.max(0, contentH - (viewBot - viewTop));
  mapScroll = clamp(mapScroll, 0, mapScrollMax);
  const base = mapScrollMax > 0
    ? viewBot - 15 + Math.round(mapScroll)
    : Math.round((viewTop + viewBot) / 2 + contentH / 2) - 15;
  const trailX = colX + 12, plateX = colX + 26;
  const pts = [];
  for (let i = 0; i < n; i++) pts.push({ x: trailX, y: base - (i + 1) * MAP_ROW });
  return { pts, start: { x: trailX, y: base }, gate: { x: trailX, y: base - (n + 1) * MAP_ROW },
           colX, colW, trailX, plateX, viewTop, viewBot };
}
function openSkyMap() {   // focus the view on the next goal
  skyMap = true; mapDrag = null; mapScroll = 0;
  selLevel = Math.min(prog, TIERS.length - 1);
  const L = skyMapNodes();                                  // computes mapScrollMax
  const k = Math.min(prog, TIERS.length) + 1;               // row index of the next goal / gate
  mapScroll = clamp(k * MAP_ROW - (L.viewBot - L.viewTop) / 2 + MAP_ROW, 0, mapScrollMax);
}
// a tap (pointerup without drag) on the open map
function mapTapAt(p) {
  const L = skyMapNodes();
  if (p.y <= MAP_HEAD) { skyMap = false; sfx.tap(); return; }               // header closes
  if (p.y >= H - MAP_FOOT) {                                                // footer launches the selection
    if (selLevel >= 0 && selLevel <= Math.min(prog, TIERS.length - 1)) { skyMap = false; startLevel(selLevel); }
    return;
  }
  if (p.x >= L.colX && p.x <= L.colX + L.colW) {
    const inView = y2 => y2 > L.viewTop - 2 && y2 < L.viewBot + 2;
    for (let i = 0; i < TIERS.length; i++) if (inView(L.pts[i].y) && Math.abs(p.y - L.pts[i].y) <= 14) {
      if (i <= prog) {
        if (selLevel === i) { skyMap = false; startLevel(i); }              // second tap plays it
        else { selLevel = i; sfx.tap(); }
      } else sfx.deny();                                                    // locked level
      return;
    }
    if (inView(L.gate.y) && Math.abs(p.y - L.gate.y) <= 14) { sfx.deny(); return; }   // sealed gate
  }
  skyMap = false; sfx.tap();
}
function dkHex(hex, f) {
  const v = parseInt(hex.slice(1), 16);
  return 'rgb(' + Math.round((v>>16 & 255)*f) + ',' + Math.round((v>>8 & 255)*f) + ',' + Math.round((v & 255)*f) + ')';
}
// raised pixel disc: drop shadow + dark extruded side + lit face + bevel highlight
function mapNode3D(x, y, r, face, side) {
  pixDisc(x + 1, y + 3, r, 'rgba(0,0,0,0.35)');
  pixDisc(x, y + 2, r, side);
  pixDisc(x, y, r, face);
  ctx.fillStyle = 'rgba(255,255,255,0.45)';

}
// pixel vignette for each stage, drawn in the row's right column
function drawStageDeco(i, x, y) {

  } else {              // the stars: big star with sparkles
    ctx.fillRect(x-1, y-4, 2, 8); ctx.fillRect(x-4, y-1, 8, 2); ctx.fillRect(x-2, y-2, 4, 4);

  }
}
function renderSkyMap() {
  const L = skyMapNodes();
  const ph = reduceMotion ? 0 : tick;
  // altitude at a screen y follows the rows, so the real stage skies scroll with the list
  const bl = j => j <= 0 ? 0 : j <= TIERS.length ? TIERS[j-1].n : TIERS[TIERS.length-1].n + (j - TIERS.length) * 140;
  const blocksAt = y2 => {
    const k = (L.start.y - y2) / MAP_ROW;
    if (k <= 0) return 0;
    const i = Math.floor(k), f = k - i;
    return bl(i) + (bl(i + 1) - bl(i)) * f;
  };
  // OPAQUE themed backdrop: the actual in-game skies, anchored to the stage rows
  for (let y2 = 0; y2 < H; y2 += 3) {
    const sky = skyColor(blocksAt(y2));
    ctx.fillStyle = 'rgb('+sky[0]+','+sky[1]+','+sky[2]+')';
    ctx.fillRect(0, y2, W, 3);
  }
  ctx.fillStyle = 'rgba(11,14,26,0.55)'; ctx.fillRect(0, 0, W, H);   // night veil for readability
  // stars fade in with altitude
  for (let i = 0; i < 40; i++) {
    const sx2 = (i*67 + 13) % W, sy2 = (i*131 + 7) % H;
    const a = clamp((blocksAt(sy2) - 110) / 160, 0, 1);
    if (a <= 0) continue;
    ctx.globalAlpha = a * (.25 + .5*(.5 + .5*Math.sin(ph*.05 + i)));
    ctx.fillStyle = '#FFF6E8'; ctx.fillRect(sx2, sy2, i%5===0?2:1, i%5===0?2:1);
  }
  ctx.globalAlpha = 1;
  // shooting star streaks across the top when you are up high
  if (!reduceMotion && blocksAt(60) > 150) {
    const cyc = (tick % 480) / 480;
    if (cyc < .1) {
      const f = cyc / .1, sx2 = Math.round(W*.8 - f*W*.55), sy2 = Math.round(56 + f*30);
      ctx.fillStyle = '#FFF6E8';
      for (let k = 0; k < 5; k++) { ctx.globalAlpha = (1 - f) * (1 - k*.17); ctx.fillRect(sx2 + k*3, sy2 - k*2, 2, 1); }
      ctx.globalAlpha = 1;
    }
  }
  const onScreen = y2 => y2 > -24 && y2 < H + 24;
  // band decor rides along with its stage row, behind the list
  if (onScreen(L.pts[7].y)) {   // shaded moon by ORBIT
    const mnX = W - 18, mnY = L.pts[7].y - 10;
    pixDisc(mnX, mnY, 7, 'rgba(150,146,180,0.85)');
    pixDisc(mnX - 1, mnY - 1, 6, 'rgba(216,212,232,0.9)');
    ctx.fillStyle = 'rgba(150,146,180,0.8)'; ctx.fillRect(mnX+1, mnY+1, 2, 2); ctx.fillRect(mnX-3, mnY+3, 1, 1); ctx.fillRect(mnX-1, mnY-3, 1, 1);
  }

    const ax = Math.round(W*(k+.5)/6 + Math.sin(ph*.02 + k*1.7)*6), ay = L.pts[5].y;
    ctx.globalAlpha = .09 + .05*Math.sin(ph*.04 + k);
    ctx.fillStyle = k % 2 ? '#7EF2C5' : '#C77EFF';
    for (let s2 = -10; s2 <= 10; s2 += 2) ctx.fillRect(ax + Math.round(Math.sin((ay+s2)*.2 + ph*.03)*2), ay + s2, 2, 2);
  }
  ctx.globalAlpha = 1;
  if (onScreen(L.pts[2].y)) {   // clouds drift by CLOUD NINE
    ctx.fillStyle = 'rgba(255,246,232,0.16)';
    for (let k = 0; k < 4; k++) {
      const span = W + 44;
      const cx2 = Math.round(((k*83 + ph*(.12 + k*.03)) % span + span) % span) - 22;
      const cy2 = L.pts[2].y + [-18, -6, 8, 20][k];
      ctx.fillRect(cx2-6, cy2, 12, 2); ctx.fillRect(cx2-3, cy2-2, 7, 2); ctx.fillRect(cx2+2, cy2+2, 6, 1);
    }
  }
  if (onScreen(L.pts[1].y)) {   // birds flap by TREETOPS
    ctx.fillStyle = 'rgba(20,16,34,0.7)';
    for (let k = 0; k < 2; k++) {
      const span = W + 30;
      const bx = Math.round(((k*140 + 40 + ph*.2) % span + span) % span - 15);
      const by = L.pts[1].y - 6 + k*12;
      const up = Math.floor(ph*.15 + k*3) % 2;
      ctx.fillRect(bx-2, by + (up?-1:0), 2, 1); ctx.fillRect(bx, by, 1, 1); ctx.fillRect(bx+1, by + (up?-1:0), 2, 1);
    }
  }
  const gy = L.start.y + 21;    // city skyline sits on the ground under START
  if (gy > 0 && gy - 17 < H) for (let x2 = 0; x2 < W; x2 += 13) {
    const bh2 = 6 + (x2*7 + 5) % 11;
    ctx.fillStyle = 'rgba(11,14,26,0.85)'; ctx.fillRect(x2, gy - bh2, 11, bh2);
    if (bh2 > 9) { ctx.fillStyle = 'rgba(255,215,94,0.35)'; ctx.fillRect(x2+2, gy-bh2+2, 1, 1); ctx.fillRect(x2+7, gy-bh2+4, 1, 1); }
  }
  // straight dotted trail up the gutter; walked part glows gold, mascot marks your best
  let mp = null;
  if (bestHeight > 0) {
    const nextIdx = TIERS.findIndex(t => bestHeight < t.n);
    if (nextIdx === -1) mp = L.gate;
    else {
      const prevN = nextIdx === 0 ? 0 : TIERS[nextIdx-1].n;
      const frac = clamp((bestHeight - prevN) / (TIERS[nextIdx].n - prevN), 0, 1);
      const a2 = nextIdx === 0 ? L.start : L.pts[nextIdx-1];
      mp = { x: L.trailX, y: Math.round(a2.y - frac * MAP_ROW) };
    }
  }
  for (let yy = L.gate.y; yy <= L.start.y; yy += 6) {
    if (yy < L.viewTop - 4 || yy > L.viewBot + 4) continue;
    ctx.fillStyle = 'rgba(0,0,0,0.35)'; ctx.fillRect(L.trailX - 1, yy + 1, 2, 2);
    ctx.fillStyle = mp && yy >= mp.y ? 'rgba(255,215,94,0.6)' : 'rgba(255,246,232,0.28)';
    ctx.fillRect(L.trailX - 1, yy, 2, 2);
  }
  if (mp && mp.y > L.viewTop - 6 && mp.y < L.viewBot + 6) drawMascot(L.trailX, mp.y + 4);
  // ground marker where the trail meets the earth (not a tappable row)
  if (L.start.y > L.viewTop && L.start.y < L.viewBot + 15) {
    pixDisc(L.trailX, L.start.y, 4, 'rgba(255,246,232,0.3)');
    pixDisc(L.trailX, L.start.y, 2, '#141022');
    txt('GROUND 0M', L.plateX + 4, L.start.y - 3, 1, 'rgba(255,246,232,0.4)', 'left');
  }
  // one row per level: plate + numbered badge on the trail + name/goal/stars + vignette
  const pw = L.colX + L.colW - L.plateX;
  for (let k = 0; k <= TIERS.length; k++) {
    const isGate = k === TIERS.length;
    const y = isGate ? L.gate.y : L.pts[k].y;
    if (y < L.viewTop - 15 || y > L.viewBot + 15) continue;
    const t = isGate ? null : TIERS[k];
    const cleared = !isGate && k < prog, isNext = k === prog && !isGate;
    const unlocked = !isGate && k <= prog;
    const champ = prog >= TIERS.length;
    const sel = !isGate && selLevel === k && unlocked;
    // plate
    ctx.fillStyle = 'rgba(11,14,26,' + (sel ? '0.8' : '0.55') + ')'; ctx.fillRect(L.plateX, y-12, pw, 24);
    ctx.fillStyle = 'rgba(255,246,232,0.09)'; ctx.fillRect(L.plateX, y-12, pw, 1);
    ctx.fillStyle = 'rgba(0,0,0,0.35)'; ctx.fillRect(L.plateX+1, y+12, pw, 1);
    const accent = isGate ? (champ ? '#FFD75E' : 'rgba(255,246,232,0.18)')
      : cleared ? '#FFD75E' : isNext ? t.c : 'rgba(255,246,232,0.18)';
    ctx.fillStyle = accent; ctx.fillRect(L.plateX, y-12, 3, 24);
    if (sel) {   // selected level: white frame
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.fillRect(L.plateX-1, y-13, pw+2, 1); ctx.fillRect(L.plateX-1, y+12, pw+2, 1);
      ctx.fillRect(L.plateX-1, y-13, 1, 26); ctx.fillRect(L.plateX+pw, y-13, 1, 26);
    } else if (isNext && !reduceMotion) {   // next goal: soft pulsing frame in its color
      ctx.globalAlpha = .25 + .3*(.5 + .5*Math.sin(tick*.1));
      ctx.fillStyle = t.c;
      ctx.fillRect(L.plateX-1, y-13, pw+2, 1); ctx.fillRect(L.plateX-1, y+12, pw+2, 1);
      ctx.fillRect(L.plateX-1, y-13, 1, 26); ctx.fillRect(L.plateX+pw, y-13, 1, 26);
      ctx.globalAlpha = 1;
    }
    // numbered 3D badge on the trail (padlock when locked, crown gate at the top)
    if (isGate) {
      if (champ) {
        mapNode3D(L.trailX, y, 6, '#FFD75E', '#7A5A14'); pixDisc(L.trailX, y, 4, '#4A3A0C');
        ctx.fillStyle = '#FFD75E'; ctx.fillRect(L.trailX-2, y-1, 5, 2);
        ctx.fillRect(L.trailX-2, y-2, 1, 1); ctx.fillRect(L.trailX, y-2, 1, 1); ctx.fillRect(L.trailX+2, y-2, 1, 1);
      } else {
        pixDisc(L.trailX, y, 6, 'rgba(0,0,0,0.3)'); pixDisc(L.trailX, y, 5, 'rgba(255,246,232,0.14)'); pixDisc(L.trailX, y, 4, '#141022');
        txt('?', L.trailX, y - 3, 1, 'rgba(255,246,232,0.55)', 'center');
      }
    } else {
      const bx = L.trailX - 8, by = y - 8;
      ctx.fillStyle = 'rgba(0,0,0,0.35)'; ctx.fillRect(bx+1, by+16, 16, 2);            // drop shadow
      ctx.fillStyle = cleared ? '#7A5A14' : isNext ? dkHex(t.c, .4) : 'rgba(0,0,0,0.5)';
      ctx.fillRect(bx, by+2, 16, 16);                                                  // extruded side
      ctx.fillStyle = cleared ? '#FFD75E' : isNext ? t.c : 'rgba(46,40,66,0.95)';
      ctx.fillRect(bx, by, 16, 16);                                                    // face
      ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.fillRect(bx, by, 16, 1); ctx.fillRect(bx, by, 1, 16);
      if (isNext && !reduceMotion) { ctx.globalAlpha = .2 + .25*(.5+.5*Math.sin(tick*.1)); ctx.fillStyle = '#FFF6E8'; ctx.fillRect(bx-2, by-2, 20, 20); ctx.globalAlpha = 1; }
      if (unlocked) txt(k+1, L.trailX, y - 3, 1, cleared ? '#4A3A0C' : '#141022', 'center');
      else { ctx.fillStyle = 'rgba(255,246,232,0.5)'; ctx.fillRect(L.trailX-2, y-1, 5, 4); ctx.fillRect(L.trailX-1, y-3, 1, 2); ctx.fillRect(L.trailX+1, y-3, 1, 2); }
    }
    // labels: name + stars on top, goal/status below
    const name = isGate ? (champ ? 'SKY CHAMPION' : '? ? ?') : t.name;
    const meters = isGate ? (champ ? 'THE GATE IS OPEN' : 'SEALED')
      : 'GOAL ' + t.n*METERS_PER + 'M' + (cleared ? '' : isNext ? ' - NEXT' : ' - LOCKED');
    const nameCol = isGate ? (champ ? '#FFD75E' : 'rgba(255,246,232,0.4)')
      : cleared ? '#FFF6E8' : isNext ? t.c : 'rgba(255,246,232,0.4)';
    txt(name, L.plateX + 10, y - 9, 1, nameCol, 'left');
    txt(meters, L.plateX + 10, y + 2, 1, 'rgba(255,246,232,0.5)', 'left');
    if (!isGate) {
      if (unlocked) for (let s2 = 0; s2 < 3; s2++) drawStarPix(L.plateX + pw - 46 + s2*10, y, 1, s2 < (levelStars[k] || 0));
      drawStageDeco(k, L.colX + L.colW - 16, y);
    }
  }
  // header plate
  ctx.fillStyle = 'rgba(11,14,26,0.72)'; ctx.fillRect(0, 0, W, MAP_HEAD);
  ctx.fillStyle = 'rgba(255,246,232,0.12)'; ctx.fillRect(0, MAP_HEAD, W, 1);
  txt('SKY MAP', W/2+1, 8, 2, 'rgba(0,0,0,0.5)', 'center');
  txt('SKY MAP', W/2, 7, 2, '#FFF6E8', 'center');
  txt('CHOOSE YOUR PATH', W/2, 26, 1, '#FFD75E', 'center');
  txt('X', W - 12, 8, 1, 'rgba(255,246,232,0.6)', 'center');   // header tap closes
  // footer: PLAY button for the selected level
  ctx.fillStyle = 'rgba(11,14,26,0.72)'; ctx.fillRect(0, H - MAP_FOOT, W, MAP_FOOT);
  ctx.fillStyle = 'rgba(255,246,232,0.12)'; ctx.fillRect(0, H - MAP_FOOT, W, 1);
  if (selLevel >= 0 && selLevel <= Math.min(prog, TIERS.length - 1)) {
    const st = TIERS[selLevel];
    const bw = Math.min(W - 24, 220), bx = Math.round(W/2 - bw/2);
    plate3D(bx, H - MAP_FOOT + 6, bw, 20, playA(.8 + .15*Math.sin(tick*.08)));
    txt('PLAY LEVEL ' + (selLevel+1) + ' - ' + st.n*METERS_PER + 'M', W/2, H - MAP_FOOT + 13, 1, '#08301F', 'center');
  } else {
    txt('REACH HIGHER TO UNLOCK', W/2, H - 21, 1, 'rgba(255,246,232,0.5)', 'center');
  }
  // slim scrollbar on the right edge
  if (mapScrollMax > 0) {
    const trackH = L.viewBot - L.viewTop;
    const thumbH = Math.max(14, Math.round(trackH * trackH / (trackH + mapScrollMax)));
    const thumbY = Math.round(L.viewTop + (1 - mapScroll / mapScrollMax) * (trackH - thumbH));
    ctx.fillStyle = 'rgba(255,246,232,0.1)'; ctx.fillRect(W - 4, L.viewTop, 2, trackH);
    ctx.fillStyle = 'rgba(255,246,232,0.4)'; ctx.fillRect(W - 4, thumbY, 2, thumbH);
  }
}

// ---------- shared 3D UI helpers ----------
// raised plate: drop shadow + lit top edge + shaded bottom edge (+ accent spine)
function plate3D(x, y, w, h, fill, accent) {
  ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fillRect(x+1, y+h, w, 2);
  ctx.fillStyle = fill; ctx.fillRect(x, y, w, h);
  ctx.fillStyle = 'rgba(255,255,255,0.22)'; ctx.fillRect(x, y, w, 1);
  ctx.fillStyle = 'rgba(0,0,0,0.28)'; ctx.fillRect(x, y+h-1, w, 1);
  if (accent) { ctx.fillStyle = accent; ctx.fillRect(x, y, 3, h); }
}
// 7x7 five-point pixel star at integer scale s, centered on (x, y)
function drawStarPix(x, y, s, filled) {
  ctx.fillStyle = filled ? '#FFD75E' : 'rgba(255,246,232,0.18)';
  const px = (dx, dy, w2, h2) => ctx.fillRect(x + dx*s, y + dy*s, w2*s, h2*s);
  px(0,-3,1,1); px(-1,-2,3,1); px(-3,-1,7,1); px(-2,0,5,1); px(-1,1,3,1); px(-2,2,1,1); px(2,2,1,1);
  if (filled) { ctx.fillStyle = '#FFF6E8'; ctx.fillRect(x, y - s, s, s); }   // glint
}

  ctx.fillStyle = 'rgba(11,14,26,0.74)'; ctx.fillRect(0, 0, W, H);
  // confetti rains behind the text
  if (!reduceMotion) for (let i = 0; i < 36; i++) {
    const cx2 = (i*61 + 17) % W;
    const cy2 = ((winT * (1.1 + (i%4)*.35) + i*47) % (H + 20)) - 10;
    ctx.globalAlpha = .5 + .4*Math.sin(winT*.2 + i);
    ctx.fillStyle = ['#FFD75E','#62E8B5','#5EC8F2','#FF9ED2','#C77EFF'][i % 5];
    ctx.fillRect(Math.round(cx2 + Math.sin(winT*.08 + i)*4), Math.round(cy2), 2, 3);
  }
  ctx.globalAlpha = 1;
  const topY = Math.round(H*.13);
  txt('LEVEL ' + num, W/2, topY, 1, 'rgba(255,246,232,0.7)', 'center');
  txt(t.name, W/2+1, topY + 12, 2, 'rgba(0,0,0,0.5)', 'center');
  txt(t.name, W/2, topY + 11, 2, t.c, 'center');
  if (winT > 8) {   // COMPLETE! stamps in with a two-frame pop
    const sc = winT < 14 ? 3 : 2;
    txt('COMPLETE!', W/2+1, topY + 33, sc, 'rgba(0,0,0,0.5)', 'center');
    txt('COMPLETE!', W/2, topY + 32, sc, '#FFF6E8', 'center');
  }
  // stars pop one by one
  const starY = Math.round(H*.36);
  for (let k = 0; k < 3; k++) {
    const at = 24 + k*12, on = k < winStars && winT > at;
    const pop = on && winT < at + 6;
    drawStarPix(W/2 + (k-1)*30, starY, pop ? 4 : 3, on);
  }
  const placed = Math.max(1, blocks.length - runLaunch);
  txt('PERFECTS ' + runPerfects + '/' + placed, W/2, starY + 18, 1, 'rgba(255,246,232,0.55)', 'center');
  if (winT > 48) {   // reward counts up
    const shown = Math.min(winReward, Math.floor((winT - 48) * 1.5));
    drawCoin(W/2 - 20, starY + 31);
    txt('+' + shown, W/2 - 9, starY + 31, 1, '#FFD75E', 'left');
    if (winFirst) txt(prog === TIERS.length ? 'SKY CONQUERED!' : 'NEW STAGE UNLOCKED!', W/2, starY + 44, 1, '#62E8B5', 'center');
  }
  if (winT > 24) {
    const last = runLevel + 1 >= TIERS.length;
    const labels = { next: last ? 'BACK TO MAP' : 'NEXT LEVEL', retry: 'RETRY', map: 'SKY MAP' };
    for (const rw of WIN_ROWS) {
      const main = rw.id === 'next';
      plate3D(rw.x, rw.y, rw.w, rw.h, main ? playA(.85) : 'rgba(255,246,232,0.12)', main ? null : t.c);
      txt(labels[rw.id], W/2, rw.y + 7, 1, main ? '#08301F' : '#FFF6E8', 'center');
    }
  }
}
function renderLevelFail() {
  const t = TIERS[runLevel], num = runLevel + 1;
  ctx.fillStyle = 'rgba(11,14,26,0.74)'; ctx.fillRect(0, 0, W, H);
  const goal = TIERS[runLevel].n, from = runLaunch;
  const pct = clamp((blocks.length - from) / (goal - from), 0, 1);
  const topY = Math.round(H*.14);
  txt('LEVEL ' + num + ' - ' + t.name, W/2, topY, 1, 'rgba(255,246,232,0.7)', 'center');
  const head = overCause === 'quit' ? 'RUN ENDED' : pct >= .6 ? 'SO CLOSE!' : 'TOPPLED!';
  txt(head, W/2+1, topY + 13, 2, 'rgba(0,0,0,0.5)', 'center');
  txt(head, W/2, topY + 12, 2, pct >= .6 ? '#FFD75E' : '#FF7E6B', 'center');
  // progress bar toward the goal
  const bw = Math.min(W - 60, 180), bx = Math.round(W/2 - bw/2), by = Math.round(H*.33);
  const fillW = Math.round(bw * pct * Math.min(1, failT/30));
  plate3D(bx, by, bw, 8, 'rgba(0,0,0,0.5)');
  ctx.fillStyle = t.c; ctx.fillRect(bx, by + 1, fillW, 6);
  txt('REACHED ' + blocks.length*METERS_PER + 'M / ' + goal*METERS_PER + 'M', W/2, by + 14, 1, 'rgba(255,246,232,0.75)', 'center');
  if (runCoins > 0) { drawCoin(W/2 - 16, by + 27); txt('+' + runCoins, W/2 - 5, by + 27, 1, '#FFD75E', 'left'); }
  if (failT > 24) {
    if (reviveOffered) {
      const cost = reviveCost(), ok = coins >= cost;
      const pulse = ok && Math.floor(tick/16)%2 === 0;
      plate3D(FAIL_REV.x, FAIL_REV.y, FAIL_REV.w, FAIL_REV.h,
        ok ? (pulse ? 'rgba(98,232,181,0.95)' : 'rgba(98,232,181,0.8)') : 'rgba(255,246,232,0.10)',
        ok ? null : 'rgba(255,246,232,0.25)');
      drawCoin(W/2 - 30, FAIL_REV.y + 7);
      txt(ok ? 'REVIVE ' + cost : 'NEED ' + cost, W/2 - 20, FAIL_REV.y + 7, 1, ok ? '#08301F' : 'rgba(255,246,232,0.5)', 'left');
      txt('1 REVIVE PER RUN', W/2, FAIL_REV.y - 10, 1, 'rgba(255,246,232,0.45)', 'center');
    }
    const labels = { retry: 'RETRY', map: 'SKY MAP', home: 'HOME' };
    for (const rw of FAIL_ROWS) {
      const main = rw.id === 'retry';
      plate3D(rw.x, rw.y, rw.w, rw.h, main ? playA(.85) : 'rgba(255,246,232,0.12)', main ? null : 'rgba(255,246,232,0.3)');
      txt(labels[rw.id], W/2, rw.y + 7, 1, main ? '#08301F' : '#FFF6E8', 'center');
    }
  }
}

// ---------- in-run HUD ----------
function renderHUD(h) {
  const shadow = 'rgba(0,0,0,0.35)';
  const m = curMode();
  ctx.fillStyle='rgba(0,0,0,0.25)'; ctx.fillRect(PAUSE_BTN.x-1,PAUSE_BTN.y-1,PAUSE_BTN.w+2,PAUSE_BTN.h+2);
  ctx.fillStyle='#FFF6E8'; ctx.fillRect(PAUSE_BTN.x+3,PAUSE_BTN.y+3,3,8); ctx.fillRect(PAUSE_BTN.x+8,PAUSE_BTN.y+3,3,8);
  drawCoin(22, 7); txt(coins, 31, 7, 1, '#FFD75E', 'left');
  txt(score, W/2+1, 6, 2, shadow, 'center'); txt(score, W/2, 5, 2, '#FFF6E8', 'center');
  if (m.time) { const s = Math.ceil(timeLeft/60); txt(s+'S', W-24, 7, 1, s<=10?(Math.floor(tick/8)%2?'#FF5E7E':'#FFD75E'):'rgba(255,246,232,0.9)', 'right'); }
  txt(h*METERS_PER+'M', W/2, 22, 1, 'rgba(255,246,232,0.8)', 'center');
  if (runLevel >= 0) {   // campaign HUD: the goal + a slim progress bar
    const goal = TIERS[runLevel].n, from = runLaunch;
    txt('LEVEL ' + (runLevel+1) + ' - GOAL ' + goal*METERS_PER + 'M', W/2, 33, 1, TIERS[runLevel].c, 'center');
    const bw = Math.min(W - 80, 120), bx = Math.round(W/2 - bw/2);
    const pct = clamp((h - from) / (goal - from), 0, 1);
    ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fillRect(bx, 43, bw, 3);
    ctx.fillStyle = TIERS[runLevel].c; ctx.fillRect(bx, 43, Math.round(bw*pct), 3);
  }
  if (combo > 1) {
    const lbl = nova ? 'NOVA X' : fever ? 'FEVER X' : combo >= 7 ? 'BLAZING X' : 'COMBO X';
    const col2 = nova ? (Math.floor(tick/4)%2 ? '#FFFFFF' : 'hsl('+((tick*14)%360)+',100%,80%)')
               : fever ? ('hsl('+((tick*8)%360)+',100%,75%)')
               : combo >= 7 ? '#FF9E3D' : (combo>=5?'#FF7E6B':'#FFD75E');
    txt(lbl+combo, W/2, runLevel >= 0 ? 50 : 33, 1, col2, 'center');
  }
  let ix = 4;
  for (let i=0;i<shield;i++) { drawIcon('shield', ix, 20); ix += 10; }
  if (widenNext) { drawIcon('wide', ix, 20); ix += 10; }
  if (slowBlocks > 0) { drawIcon('slow', ix, 20); ix += 10; }
  if (auraBlocks > 0) { drawIcon('aura', ix, 20); ix += 10; }
  if (goldenNext || (slider && slider.golden)) { drawIcon('gold', ix, 20); ix += 10; }
  if (m.fail && m.id!=='zen' && h > 5) {
    const bp = clamp(balance/TOPPLE, -1, 1);
    if (Math.abs(bp) > 0.22) {
      ctx.globalAlpha = Math.min(1, (Math.abs(bp) - 0.22) * 5);
      const bmW=54, bmX=W/2-bmW/2, bmY=44;
      ctx.fillStyle='rgba(0,0,0,0.32)'; ctx.fillRect(bmX-1,bmY-1,bmW+2,5);
      ctx.fillStyle='rgba(255,246,232,0.25)'; ctx.fillRect(bmX+bmW/2, bmY-1, 1, 5);
      const px = bmX + bmW/2 + bp*(bmW/2-1);
      const danger = Math.abs(bp) > 0.72;
      ctx.fillStyle = danger ? (Math.floor(tick/6)%2?'#FF5E7E':'#FFD75E') : '#62E8B5';
      ctx.fillRect(Math.round(px-1), bmY-1, 3, 5);
      ctx.globalAlpha = 1;
      if (danger && Math.floor(tick/10)%2===0) txt('BALANCE!', W/2, 52, 1, '#FF5E7E', 'center');
    }
  }
  if (wind) {
    const env = Math.sin(Math.min(wind.t/wind.dur,1)*Math.PI);
    ctx.globalAlpha = .4 + env*.5;
    txt(wind.dir>0?'WIND >':'< WIND', W/2, 62, 1, '#BFE8FF', 'center');
    ctx.globalAlpha = 1;
  }
  // first-run tutorial hints (one calm strip, bottom third)
  if (tutStep >= 0) {
    const msgs = ['TAP TO DROP THE BLOCK', 'CENTER IT FOR A PERFECT', 'STACK HIGH - DONT TOPPLE'];
    ctx.fillStyle = 'rgba(11,14,26,0.55)'; ctx.fillRect(0, H-84, W, 18);
    ctx.fillStyle = 'rgba(255,215,94,0.5)'; ctx.fillRect(0, H-84, W, 1);
    if (Math.floor(tick/25)%4 !== 3) txt(msgs[tutStep], W/2, H-78, 1, '#FFF6E8', 'center');
  }
  // sound toggle
  ctx.fillStyle='rgba(0,0,0,0.25)'; ctx.fillRect(SND_BTN.x-1,SND_BTN.y-1,SND_BTN.w+2,SND_BTN.h+2);
  ctx.fillStyle = muted ? 'rgba(255,246,232,0.45)' : '#FFF6E8';
  ctx.fillRect(SND_BTN.x+2,SND_BTN.y+5,3,4); ctx.fillRect(SND_BTN.x+5,SND_BTN.y+3,2,8);
  if (!muted) { ctx.fillRect(SND_BTN.x+9,SND_BTN.y+4,1,6); ctx.fillRect(SND_BTN.x+11,SND_BTN.y+2,1,10); }
  else { ctx.fillRect(SND_BTN.x+9,SND_BTN.y+4,1,1); ctx.fillRect(SND_BTN.x+10,SND_BTN.y+5,1,1); ctx.fillRect(SND_BTN.x+11,SND_BTN.y+6,1,2); ctx.fillRect(SND_BTN.x+10,SND_BTN.y+8,1,1); ctx.fillRect(SND_BTN.x+9,SND_BTN.y+9,1,1); }
}

// ---------- game over ----------
const CAUSE_TXT = { miss:'MISSED!', topple:'TOPPLED!', precision:'NOT PERFECT', time:"TIME'S UP", quit:'GAVE UP' };
function renderGameOver() {
  ctx.fillStyle = 'rgba(11,14,26,0.66)'; ctx.fillRect(0, 0, W, H);
  const shadow = 'rgba(0,0,0,0.35)';
  txt('GAME OVER', W/2+1, 27, 2, shadow, 'center');
  txt('GAME OVER', W/2, 26, 2, '#FF5E7E', 'center');
  txt((CAUSE_TXT[overCause] || '') + ' - ' + curMode().name, W/2, 46, 1, 'rgba(255,246,232,0.6)', 'center');
  txt('HEIGHT', W/2, 62, 1, 'rgba(255,246,232,0.7)', 'center');
  txt(blocks.length*METERS_PER+'M', W/2, 73, 2, newHeight?'#62E8B5':'#FFF6E8', 'center');
  if (newHeight && Math.floor(tick/20)%2===0) txt('NEW RECORD!', W/2, 91, 1, '#62E8B5', 'center');
  txt('SCORE '+score+(newBest?' - NEW BEST!':''), W/2, 103, 1, newBest?'#62E8B5':'rgba(255,246,232,0.85)', 'center');
  txt('BEST '+bestBlocksFor(mode)*METERS_PER+'M - '+fmtPts(bestScoreFor(mode))+' PTS', W/2, 114, 1, '#FFD75E', 'center');
  drawCoin(W/2-24, 127); txt('+'+runCoins, W/2-14, 127, 1, '#FFD75E', 'left');
  if (runSettled) txt('+'+xpThisRun+' XP', W/2+12, 127, 1, '#62E8B5', 'left');
  if (maxCombo > 1) txt('MAX COMBO X'+maxCombo, W/2, 141, 1, 'rgba(255,246,232,0.8)', 'center');
  if (reviveOffered) {   // XP/missions settle after the offer — this space is the revive's
    const cost = reviveCost(), ok = coins >= cost;
    const pulse = ok && Math.floor(tick/16)%2 === 0;
    plate3D(REVIVE_BTN.x, REVIVE_BTN.y, REVIVE_BTN.w, REVIVE_BTN.h,
      ok ? (pulse ? 'rgba(98,232,181,0.95)' : 'rgba(98,232,181,0.8)') : 'rgba(255,246,232,0.10)',
      ok ? null : 'rgba(255,246,232,0.25)');
    drawCoin(W/2 - 32, REVIVE_BTN.y + 8);
    txt(ok ? 'REVIVE ' + cost : 'NEED ' + cost, W/2 - 22, REVIVE_BTN.y + 8, 1, ok ? '#08301F' : 'rgba(255,246,232,0.5)', 'left');
    txt('1 REVIVE PER RUN', W/2, REVIVE_BTN.y + 27, 1, 'rgba(255,246,232,0.45)', 'center');
  } else if (runSettled) {
    let y = 156;
    if (levelUpsThisRun > 0) { txt('LEVEL UP! NOW LV '+lvl.level+' +25', W/2, y, 1, '#FFD75E', 'center'); y += 11; }
    for (let i = 0; i < achThisRun.length && i < 2; i++) { txt('ACHIEVEMENT: '+achThisRun[i]+' +25', W/2, y, 1, '#C77EFF', 'center'); y += 11; }
    for (let i = 0; i < completedThisRun.length && i < 2; i++) { txt('* '+completedThisRun[i].text+' +'+completedThisRun[i].reward, W/2, y, 1, '#62E8B5', 'center'); y += 11; }
    if (mode === 'daily') { txt('DAILY STREAK ' + daily.streak, W/2, y, 1, '#FF9E5E', 'center'); y += 11; }
  }
  ctx.fillStyle = 'rgba(94,200,242,0.9)'; ctx.fillRect(SHARE_BTN.x, SHARE_BTN.y, SHARE_BTN.w, SHARE_BTN.h);
  ctx.fillStyle = 'rgba(255,255,255,0.35)'; ctx.fillRect(SHARE_BTN.x, SHARE_BTN.y, SHARE_BTN.w, 1);
  txt('SHARE', W/2, SHARE_BTN.y + 5, 1, '#04222E', 'center');
  if (overLock <= 0 && Math.floor(tick/30)%2===0) txt(reviveOffered ? 'TAP TO SKIP' : 'TAP TO CONTINUE', W/2, H-68, 1, '#FFF6E8', 'center');
}

// ---------- loop ----------
let last = performance.now();
function frame(now) { rafId = 0; let dt=(now-last)/16.667; last=now; if (dt>3) dt=3; if (dt<0) dt=0; update(dt); render(); rafId = requestAnimationFrame(frame); }
blocks = [{ x:(W-BASE_W)/2, w:BASE_W, col:blockCol(0) }];
cameraY = towerTopY()-(H - 100); cameraTarget = cameraY; fadeT = 0;
previewIdx = Math.max(0, SKINS.findIndex(s => s.id === skinId));
booted = true;
render();
kickLoop();
try { if ('serviceWorker' in navigator && location.protocol.indexOf('http') === 0) navigator.serviceWorker.register('sw.js').catch(() => {}); } catch (e) {}
</script>
