'use strict';
// ============================================================
// SKYSTACK — vibrant pixel stack-tower arcade game
// Screens: HOME / SHOP / ME (+ in-run HUD, game over).
// Tutorial, chiptune music, XP levels, achievements, settings.
// Single file, zero deps.
// ============================================================
// logical resolution matches the device aspect ratio EXACTLY in both dimensions, so filling
// the screen never distorts pixels — tall screens get more H, wide screens get more W, and
// every element repositions off W/H instead of stretching. Recomputed live on resize/rotate.
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W = 0, H = 0;
function computeSize() {
  const AR = Math.max(innerWidth, 1) / Math.max(innerHeight, 1);
  H = AR <= 1 ? Math.min(520, Math.max(300, Math.round(180 / AR))) : 320;
  W = AR <= 1 ? Math.max(150, Math.round(H * AR)) : Math.min(960, Math.round(H * AR));
  canvas.width = W; canvas.height = H;      // resets ctx state
  ctx.imageSmoothingEnabled = false;
}
computeSize();
const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;

function fitCanvas() {
  // logical aspect matches the window by construction, so 100% fill keeps pixels square.
  // small drift (browser bars collapsing, entering fullscreen) becomes invisible stretch;
  // only a big mismatch (rotation) falls back to centered aspect-fit
  const arWin = innerWidth / Math.max(innerHeight, 1), arGame = W / H;
  if (Math.abs(arWin - arGame) < arGame * 0.15) {
    canvas.style.width = '100vw';
    canvas.style.height = '100vh'; canvas.style.height = '100dvh';  // dvh tracks browser bars
  } else {
    const scale = Math.min(innerWidth / W, innerHeight / H);
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }
  if (booted) render();
}
var booted = false;
var canvasRect = null;
var adaptTimer = 0;
addEventListener('resize', () => {
  canvasRect = null; fitCanvas();
  clearTimeout(adaptTimer); adaptTimer = setTimeout(adaptToScreen, 180);   // settle, then re-adapt
});
// exactly ONE animation loop, ever
var rafId = 0;
function kickLoop() { if (rafId) return; last = performance.now(); rafId = requestAnimationFrame(frame); }
document.addEventListener('visibilitychange', () => { if (!document.hidden) kickLoop(); });
addEventListener('focus', kickLoop);
addEventListener('pointerdown', kickLoop, true);
fitCanvas();

  '!':[4,4,4,4,4,0,4],'+':[0,4,4,31,4,4,0],'-':[0,0,0,31,0,0,0],'.':[0,0,0,0,0,6,6],':':[0,6,6,0,6,6,0],
  '<':[2,4,8,16,8,4,2],'>':[8,4,2,1,2,4,8],'/':[1,2,2,4,8,8,16],'%':[17,1,2,4,8,16,17],
  '*':[0,10,4,31,4,10,0],'?':[14,17,1,2,4,0,4]
};
function txt(text, x, y, sc, color, align) {
  text = String(text).toUpperCase();
  const cw = 6 * sc, totalW = text.length * cw - sc;
  let px = x;
  if (align === 'center') px = Math.round(x - totalW / 2); else if (align === 'right') px = Math.round(x - totalW);
  ctx.fillStyle = color;
  for (const ch of text) {
    const g = FONT[ch];
    if (g) for (let r = 0; r < 7; r++) { const b = g[r]; for (let c = 0; c < 5; c++) if (b & (16 >> c)) ctx.fillRect(px + c * sc, y + r * sc, sc, sc); }
    px += cw;
  }
}

// ---------- audio ----------
let AC = null;
let muted = store.get('skystack-mute', false);
let musicOn = store.get('skystack-music', true);
let hapticsOn = store.get('skystack-hapt', true);
function audio() { if (!AC) { try { AC = new (window.AudioContext || window.webkitAudioContext)({ latencyHint: 'interactive' }); } catch (e) {} } if (AC && AC.state === 'suspended') AC.resume(); return AC; }
function tone(f, dur, type, vol, when) {
  const ac = audio(); if (!ac || muted) return;
  const t = ac.currentTime + (when || 0), o = ac.createOscillator(), g = ac.createGain();
  o.type = type || 'square'; o.frequency.value = f;
  g.gain.setValueAtTime(vol || 0.12, t); g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(g); g.connect(ac.destination); o.start(t); o.stop(t + dur + 0.02);
}
function noise(dur, vol) {
  const ac = audio(); if (!ac || muted) return;
  const len = Math.floor(ac.sampleRate * dur), buf = ac.createBuffer(1, len, ac.sampleRate), d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
  const s = ac.createBufferSource(), g = ac.createGain(); s.buffer = buf; g.gain.value = vol; s.connect(g); g.connect(ac.destination); s.start();
}
function hapt(m) { if (muted || !hapticsOn) return; try { navigator.vibrate && navigator.vibrate(m); } catch (e) {} }
const sfx = {
  land() { tone(110, .09, 'triangle', .22); tone(70, .12, 'sine', .18); hapt(12); },
  slice() { noise(.09, .14); tone(180, .05, 'sawtooth', .05); },
  perfect(c) { const f = 523 * Math.pow(2, Math.min(c, 16) / 12); tone(f, .09, 'square', .10); tone(f * 1.5, .12, 'square', .08, .07); hapt(18); },
  milestone() { [523, 659, 784, 1047].forEach((n, i) => tone(n, .14, 'square', .10, i * .09)); hapt([20, 40, 30]); },
  coin() { tone(988, .05, 'square', .07); tone(1319, .07, 'square', .06, .04); },
  power() { [659, 880, 1175].forEach((n, i) => tone(n, .1, 'triangle', .1, i * .05)); hapt([12, 20]); },
  gift() { [784, 988].forEach((n, i) => tone(n, .08, 'square', .09, i * .06)); tone(1319, .12, 'triangle', .08, .12); hapt([12, 18]); },
  pop() { noise(.05, .18); tone(880, .06, 'square', .1); tone(1175, .05, 'square', .07, .04); hapt(15); },

  unlock() { [392, 523, 659, 880].forEach((n, i) => tone(n, .13, 'triangle', .11, i * .08)); hapt([15, 30, 15, 30]); },

  start() { tone(523, .07, 'square', .08); tone(784, .1, 'square', .08, .08); },
  tap() { tone(660, .05, 'square', .06); },
  pause() { tone(660, .06, 'triangle', .08); tone(440, .1, 'triangle', .07, .06); },      // settle down

  wind() { tone(220, .5, 'sine', .04); noise(.5, .03); }

// ---------- music (procedural chiptune; tempo rises with tower height + streak) ----------
const BASS = [110, 87.31, 130.81, 98];                    // A F C G
const PENT = [220, 261.63, 293.66, 329.63, 392, 440];     // A minor pentatonic-ish
let musicNext = 0, musicBar = 0, hatBuf = null, barT0 = 0, barDurCur = 0;
function beatPulse() {   // 0..1, peaks on each music bar so UI breathes in time with the tune
  if (AC && AC.state === 'running' && !muted && musicOn && musicNext > 0 && barDurCur > 0) {
    let ph = ((AC.currentTime - barT0) / barDurCur) % 1;
    if (ph < 0) ph += 1;
    return Math.max(0, 1 - ph * 2.2);
  }
  return .5 + .5 * Math.sin(tick * .1);
}
function curBarDur() {
  const playing = state === 'playing' || state === 'dropping';
  let d = 1.85;                                                        // menus: calm
  if (playing) d = clamp(1.62 - blocks.length * 0.004, 1.22, 1.62);   // runs: driving, faster as you climb
  if (fever || nova) d *= 0.85;                                        // hotter in a streak
  return d;
}
function scheduleBar(t, bar, dur) {
  const ac = AC;
  barT0 = t; barDurCur = dur;
  const playing = state === 'playing' || state === 'dropping';
  const hot = fever || nova;
  const SB = (typeof EV !== 'undefined' && EV && EV.music) ? EV.music.bass : BASS;
  const SP = (typeof EV !== 'undefined' && EV && EV.music) ? EV.music.pent : PENT;
  const bass = SB[bar % 4] * (nova ? 2 : 1);
  if (playing) {
    // pumping quarter-note bass
    for (let q = 0; q < 4; q++) {
      const tq = t + q * (dur/4);
      const o = ac.createOscillator(), g = ac.createGain();
      o.type = 'triangle'; o.frequency.value = bass;
      g.gain.setValueAtTime(0.05, tq); g.gain.exponentialRampToValueAtTime(0.001, tq + dur/4 * 0.9);
      o.connect(g); g.connect(ac.destination); o.start(tq); o.stop(tq + dur/4);
    }
    // kick on the downbeats
    for (const kq of [0, 2]) {
      const tk = t + kq * (dur/4);
      const o = ac.createOscillator(), g = ac.createGain();
      o.type = 'sine'; o.frequency.setValueAtTime(120, tk); o.frequency.exponentialRampToValueAtTime(45, tk + 0.09);
      g.gain.setValueAtTime(0.13, tk); g.gain.exponentialRampToValueAtTime(0.001, tk + 0.11);
      o.connect(g); g.connect(ac.destination); o.start(tk); o.stop(tk + 0.13);
    }
    // hi-hats: off-beats normally, every 8th when hot
    if (!hatBuf) { const len = Math.floor(ac.sampleRate * 0.03); hatBuf = ac.createBuffer(1, len, ac.sampleRate); const d2 = hatBuf.getChannelData(0); for (let s2 = 0; s2 < len; s2++) d2[s2] = (Math.random()*2-1) * (1 - s2/len); }
    for (let i = 0; i < 8; i++) {
      if (i % 2 === 0 && !hot) continue;
      const src = ac.createBufferSource(), g = ac.createGain();
      src.buffer = hatBuf; g.gain.value = 0.05;
      src.connect(g); g.connect(ac.destination); src.start(t + i * (dur/8));
    }
  } else {
    // menu: soft sustained pad
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = 'triangle'; o.frequency.value = bass;
    g.gain.setValueAtTime(0.035, t); g.gain.setValueAtTime(0.035, t + dur*0.8); g.gain.linearRampToValueAtTime(0.001, t + dur);
    o.connect(g); g.connect(ac.destination); o.start(t); o.stop(t + dur);
  }
  for (let i = 0; i < 8; i++) {
    if (!hot && (bar + i) % 4 === 3 && i % 2 === 1) continue;          // breathing room (none when hot)
    const f = SP[(bar * 3 + i * 2 + (i > 4 ? 1 : 0)) % SP.length] * (i === 7 || hot ? 2 : 1);
    const t2 = t + i * (dur / 8);
    const o2 = ac.createOscillator(), g2 = ac.createGain();
    o2.type = 'square'; o2.frequency.value = f;
    g2.gain.setValueAtTime(hot ? 0.026 : playing ? 0.024 : 0.02, t2); g2.gain.exponentialRampToValueAtTime(0.001, t2 + 0.14);
    o2.connect(g2); g2.connect(ac.destination); o2.start(t2); o2.stop(t2 + 0.16);
  }
}
function musicStep() {
  if (!AC || AC.state !== 'running' || muted || !musicOn) { musicNext = 0; return; }
  if (musicNext === 0) musicNext = AC.currentTime + 0.1;
  while (musicNext < AC.currentTime + 0.4) { const d = curBarDur(); scheduleBar(musicNext, musicBar, d); musicNext += d; musicBar++; }
}

const clouds = []; for (let i = 0; i < 6; i++) clouds.push({ x: Math.random()*W, y: Math.random()*1100-850, s:.05+Math.random()*.1, w:20+Math.random()*24 });

// cave wildlife: bats + glow-worms live at absolute cave altitudes (a) so they stay underground as you climb

const glowworms = []; for (let i = 0; i < 12; i++) glowworms.push({ a: 2+Math.random()*30, x: Math.random()*W, ph: Math.random()*6.28, dx: Math.random()*6.28 });
// AI-generated pixel-art sprites (loaded async; guarded so the headless VM without Image() is fine)
const caveBgImg = (typeof Image !== 'undefined') ? Object.assign(new Image(), { src: './assets/cave-bg.png' }) : null;
let shooter = null, shooterTimer = 240;
let demo = { n: 1, t: 0 };

function towerTopY() { return GROUND_Y - blocks.length * BH; }
function blockCol(i) { const s = skin(); return s.base(i, hueBase); }
function setExpr(e, t) { mascot.expr = e; mascot.exprT = t; }
function effPerfect() { return PERFECT_PX * (auraBlocks > 0 ? 2 : 1) * (1 + assist); }

function resetRun() {
  const m = curMode();
  if (m.daily) { rnd = mulberry32((todayKey() ^ 0x9E3779B9) >>> 0); hueBase = rnd() * 360; }
  else { rnd = Math.random; hueBase = Math.random() * 360; }
  // campaign level: pre-stack the tower to the level's start height
  runLevel = m.id === 'level' ? pendingLevel : -1; pendingLevel = -1;
  runLaunch = runLevel >= 0 ? levelStartN(runLevel) : 0;
  blocks = [{ x:(W-BASE_W)/2, w:BASE_W, col:blockCol(0) }];
  for (let i = 1; i < runLaunch; i++) blocks.push({ x:(W-BASE_W)/2, w:BASE_W, col: blockCol(i) });
  debris = []; particles = []; floaters = []; trails = []; coinFx = []; pickups = [];
  balloon = null; lastBalloonRow = 0;
  score = 0; combo = 0; maxCombo = 0; newBest = false; newHeight = false;
  tier = TIERS.findIndex(t => t.n > blocks.length); if (tier < 0) tier = TIERS.length;   // skip pre-stacked tiers
  runCoins = 0; runPerfects = 0; runPowerups = 0; runFevers = 0; runBalloons = 0; bannerT = 0;
  shield = 0; widenNext = false; slowBlocks = 0; auraBlocks = 0; goldenNext = false;
  wind = null; windTimer = 260;

  fadeT = 1; overCause = '';
  reviveUsed = false; reviveOffered = false; runSettled = false;
  fever = false; feverT = 0; nova = false; novaT = 0; novaFlash = 0; skybreakT = 0;
  balance = 0; swayX = 0; paused = false; dropPending = 0;
  timeLeft = m.time || 0;
  PERFECT_PX = 2.6;
  assist = (m.pure || m.daily) ? 0 : clamp(0.5 - skill * 0.55, 0, 0.5);   // struggling players start with help
  mascot.hop = 0; mascot.expr = 'normal'; mascot.exprT = 0;
  tutStep = tutDone ? -1 : 0;
  if (!m.daily && !m.pure) {
    if (loadout.shield) shield = 1;

  }
  loadout = { shield:false, aura:false, slow:false };
  cameraY = towerTopY() - (H - 100); cameraTarget = cameraY;
  if (runLevel >= 0 && !reduceMotion) cameraY = cameraTarget + 120;   // pan-to-landmark: reveal the themed base, then settle up into play
  schedulePickups(); spawnSlider();
}
// wide screens: blocks travel a centered corridor (phone-width feel) instead of the
// whole screen, wrapping through a pixel-fade so there's no long empty commute
function slideRange() {
  const cw = Math.min(W, 220);
  return { l: Math.round((W - cw)/2), r: Math.round((W + cw)/2), wrap: cw < W };
}
function sliderWrapFx(x) {
  if (!slider || reduceMotion) return;
  const cy2 = slider.y + BH/2;
  for (let i = 0; i < 7; i++) particles.push({
    x: x + Math.random()*slider.w, y: cy2 + (Math.random()-.5)*8,
    vx: (Math.random()-.5)*1.2, vy: (Math.random()-.5)*1.2, life: .55, color: 'rgba(255,246,232,0.8)'
  });
}
function spawnSlider() {
  const top = blocks[blocks.length - 1];
  const fromLeft = blocks.length % 2 === 1;
  let speed = Math.min(1.1 + blocks.length * 0.020, 2.8);                    // gentler climb than before
  if (runLevel >= 0) speed = Math.min(speed * (1 + runLevel * 0.03), 3.1);   // each level is a notch meaner
  speed *= (1 - assist * 0.30);                                              // dynamic difficulty eases the pace
  const mat = matAt(tier); speed *= mat.spd;                                 // region material: heavy stone slower, ice/steel quicker
  if (slowBlocks > 0) { speed *= 0.55; slowBlocks--; }
  if (auraBlocks > 0) auraBlocks--;
  const SR = slideRange();
  slider = { w: top.w, x: fromLeft ? SR.l - top.w : SR.r, dir: fromLeft ? 1 : -1, speed, y: towerTopY() - BH - 24, golden: goldenNext, wob: mat.wob };
  goldenNext = false;
}
function drop() {
  if (!slider || dropPending > 0) return;
  dropPending = 5;                                     // ~85ms grace: the block keeps sliding briefly
}
function releaseBlock() {
  if (!slider) return;
  // launch with downward velocity so the tap reads as instant, not delayed
  faller = { x: slider.x, w: slider.w, y: slider.y, vy: 2.6, col: slider.golden ? {h:46,s:92,l:60} : blockCol(blocks.length), golden: slider.golden };
  slider = null; state = 'dropping';

}

function schedulePickups() {
  if (curMode().pure) return;                       // PURE: zero power-ups, pure skill
  while (nextPickupRow < blocks.length + 16) {
    const type = pick(['coin','coin','coin','wide','slow','shield','aura','gold','fever']);
    const SR = slideRange();                          // always reachable: spawn inside the block corridor
    const x = SR.l + 22 + rnd() * (SR.r - SR.l - 44);
    pickups.push({ row: nextPickupRow, x, type, got: false });
    nextPickupRow += 8 + Math.floor(rnd() * 6);     // sparser than before — less visual clutter
  }
}
function addCoins(n, x, y) {
  if (EV) n = Math.ceil(n * 1.25);   // event week: +25% coins
  coins += n; runCoins += n; stats.coins += n; coinPop = 1;
  store.set('skystack-coins', coins);
  if (x !== undefined) for (let i = 0; i < n && i < 6; i++) coinFx.push({ x, y, t: 0, delay: i * 3 });
  sfx.coin();
}
function applyPower(type, cx, cy2, silent) {
  const P = POW[type];
  if (type === 'coin') { addCoins(5, cx, cy2); }
  else if (type === 'shield') { shield = Math.min(shield + 1, 2); if (!silent) sfx.shield(); }
  else if (type === 'wide') { widenNext = true; if (!silent) sfx.power(); }
  else if (type === 'slow') { slowBlocks = 4; if (!silent) sfx.power(); }
  else if (type === 'aura') { auraBlocks = 5; if (!silent) sfx.power(); }
  else if (type === 'gold') { goldenNext = true; if (slider) slider.golden = true; if (!silent) sfx.golden(); }
  else if (type === 'fever') { combo += 4; if (!silent) sfx.power(); if (combo >= 10 && !fever) { enterFever(); } if (fever) feverT = 180; }
  floaters.push({ text: P.label, x: cx, y: cy2, vy: -.4, life: 1.2, color: P.c1 });
  if (type !== 'coin') for (let i = 0; i < 12; i++) particles.push({ x: cx, y: cy2, vx:(Math.random()-.5)*2.6, vy:(Math.random()-.5)*2.6, life: 1, color: P.c1 });
}
function collectPickup(p, cx, cy2) {

function enterFever() {

}
function maybeSpawnBalloon() {
  if (curMode().pure) return;

  if (blocks.length - lastBalloonRow < 8) return;
  if (rnd() > 0.5) { lastBalloonRow = blocks.length; return; }
  const top = blocks[blocks.length - 1];
  const side = rnd() < 0.5 ? -1 : 1;
  const SR = slideRange();
  const bx = side < 0 ? Math.max(SR.l + 10, top.x - 16) : Math.min(SR.r - 10, top.x + top.w + 16);

}
function balloonWorldY() {
  const rise = (1 - balloon.inT) * 56;               // drifts UP into position instead of popping in
  const esc = balloon.away * balloon.away * 110;     // missed: accelerates away into the sky
  return GROUND_Y - balloon.row * BH - BH/2 + rise - esc + Math.sin(tick * .06 + balloon.ph) * 3;
}

function land() {

  const offset = f.x - top.x;

  if (balloon && !balloon.away && Math.abs((GROUND_Y - balloon.row * BH) - (towerTopY() - BH)) < BH &&
      balloon.x >= f.x - 4 && balloon.x <= f.x + f.w + 4) {
    runBalloons++; runPowerups++; stats.balloons++;

      if (Math.abs(nx - top.x) > top.w) nx = clamp(top.x + (f.x < top.x ? -8 : 8), 0, W - nw);
      blocks.push({ x: nx, w: nw, col: f.col });
      floaters.push({ text: m.fail ? 'SHIELD!' : 'SAVED', x:W/2, y:towerTopY()-BH, vy:-.4, life:1.4, color:'#5EC8F2' });
      for (let i = 0; i < 20; i++) particles.push({ x:nx+nw/2, y:towerTopY()-BH, vx:(Math.random()-.5)*3, vy:(Math.random()-.5)*3, life:1, color:'#5EC8F2' });
      sfx.shield(); shake = Math.max(shake, 3); faller = null; squash = 1;
      cameraTarget = towerTopY() - (H - 100); state = 'playing'; afterPlace(f, false); spawnSlider(); return;
    }
    debris.push({ x:f.x, y:f.y, w:f.w, h:BH, vx:f.x<top.x?-.6:.6, vy:1.5, rot:0, vr:(Math.random()-.5)*.2, col:f.col });
    setExpr('sad', 999); gameOver('miss'); return;
  }

  const isPerfect = Math.abs(offset) <= effPerfect();
  let nx = oL, nw = overlap;
  const goldMult = f.golden ? 5 : 1;
  if (isPerfect) {
    nx = top.x; nw = Math.min(f.w, top.w);
    combo++; runPerfects++; maxCombo = Math.max(maxCombo, combo);
    if (dda) assist = Math.max(assistFloor(), assist - 0.05);   // you've got this: ease the help back down
    if (tutStep === 2) { tutStep = -1; tutDone = true; store.set('skystack-tut', true); }
    const grow = combo >= 8 ? 8 : combo >= 5 ? 5 : combo >= 3 ? 3 : 1;
    const cap = combo >= 5 ? W : BASE_W;

    const streakMult = nova ? 3 : fever ? 2 : 1;
    score += Math.round((10 + 5 * combo) * streakMult * goldMult * (m.mult || 1));
    addCoins(combo >= 7 ? 2 : 1, W/2, towerTopY()-BH);
    floaters.push({ text:'PERFECT', x:W/2, y:towerTopY()-BH-6, vy:-.4, life:1, color:'#FFD75E' });
    if (combo > 1) floaters.push({ text:'X'+combo, x:W/2, y:towerTopY()-BH+6, vy:-.4, life:1.1, color:'#FFF6E8' });

    shake = Math.max(shake, 2);
    mascot.hop = 1; setExpr(fever || combo >= 5 ? 'wow' : 'happy', 24);

        bannerText = 'SUPERNOVA! 3X'; bannerT = 1;

  if (widenNext) { const grow2 = Math.min(14, BASE_W - nw); if (grow2 > 0) { nx -= grow2/2; nw += grow2; nx = clamp(nx, 0, W - nw); } widenNext = false; }

  faller = null; squash = 1; cameraTarget = towerTopY() - (H - 100); state = 'playing';
  afterPlace(f, true, nx + nw/2);

  spawnSlider();

function afterPlace(f, updateBalance, placedCenter) {
  stats.blocks++;
  if (updateBalance) balance = balance * 0.5 + (placedCenter - W/2) * 0.5 * (1 - assist * 0.4);   // assist forgives lean
  const r = blocks.length - 1, b = blocks[r];
  for (const p of pickups) { if (p.got || p.row !== r) continue; if (p.x >= b.x && p.x <= b.x + b.w) collectPickup(p, p.x, towerTopY()); }
  schedulePickups();
  maybeSpawnBalloon();
  if (balloon && !balloon.away && blocks.length > balloon.row + 1) balloon.away = 0.01;   // missed — it escapes upward
  const h = blocks.length;
  if (runLevel >= 0 && h >= TIERS[runLevel].n) { levelComplete(); return; }   // campaign goal reached
  if (tier < TIERS.length && h >= TIERS[tier].n) {
    const t = TIERS[tier]; bannerText = t.n*METERS_PER + 'M - ' + t.name; bannerT = 1;
    let reward = 5 + tier * 3;
    if (tier + 1 > prog) {                                    // first time this stage is reached: LEVEL CLEAR
      prog = tier + 1; store.set('skystack-tiers', prog);
      bannerText = 'LEVEL CLEAR - ' + t.name; reward += 15;
      if (prog === TIERS.length) { bannerText = 'SKY CONQUERED!'; reward += 200; }   // beat the game
    }
    addCoins(reward, W/2, 40);
    floaters.push({ text:'+'+reward, x:W/2, y:towerTopY()-BH-18, vy:-.35, life:1.4, color:'#FFD75E' });
    burst(W/2, towerTopY()-BH, 24, f.col, true); shake = Math.max(shake, reduceMotion?2:4);
    sfx.milestone(); tier++; startRegionIntro(tier);   // entering the next region — play its intro
  }
  const bh2 = bestBlocksFor(mode);
  if (!runLaunch && runLevel < 0 && h > bh2 && !newHeight && bh2 > 0) {
    newHeight = true;
    floaters.push({ text:'NEW BEST!', x:W/2, y:towerTopY()+2, vy:-.3, life:1.6, color:'#62E8B5' });
    burst(W/2, towerTopY(), 16, f.col, true); shake = Math.max(shake, 3); hapt([15,25,15]);
  }
}

// missions, XP and achievements settle at the end of every run (win or loss)
function settleRun(xpBonus) {
  completedThisRun = [];
  let changed = false;
  for (let i = 0; i < missions.length; i++) {
    const mm = missions[i], def = MDEF[mm.key];
    if (def.achieve() >= mm.target) {
      completedThisRun.push({ text: def.text(mm.target), reward: mm.reward });
      coins += mm.reward; stats.coins += mm.reward; store.set('skystack-coins', coins);
      missions[i] = newMission(missions.map(x => x.key)); changed = true;
    }
  }
  if (completedThisRun.length) sfx.mission();
  if (changed) store.set('skystack-missions', missions);
  // XP + level (only the blocks YOU placed count, not the pre-stack)
  xpThisRun = Math.max(1, Math.round(score / 10) + (blocks.length - runLaunch) + (xpBonus || 0));
  lvl.xp += xpThisRun; levelUpsThisRun = 0;
  while (lvl.xp >= xpNeed()) { lvl.xp -= xpNeed(); lvl.level++; levelUpsThisRun++; coins += 25; stats.coins += 25; }
  if (levelUpsThisRun) { sfx.levelup(); store.set('skystack-coins', coins); }
  store.set('skystack-lv', lvl);
  achThisRun = [];
  for (const a of ACH) {
    if (achDone.indexOf(a.id) === -1 && a.chk()) {
      achDone.push(a.id); achThisRun.push(a.name);
      coins += 25; stats.coins += 25;
    }
  }
  if (achThisRun.length) { store.set('skystack-ach', achDone); store.set('skystack-coins', coins); sfx.unlock(); }
  // adapt the personal skill estimate so the next run's assist fits the player
  const placed = Math.max(0, blocks.length - runLaunch);
  const perf = clamp((Math.min(maxCombo, 12) / 12) * 0.6 + (Math.min(placed, 50) / 50) * 0.4, 0, 1);
  skill += (perf - skill) * 0.2; store.set('skystack-skill', +skill.toFixed(3));
  saveStats();
}
// campaign level goal reached mid-run: freeze the run and celebrate
function levelComplete() {
  const i = runLevel;
  state = 'levelwin'; winT = 0;
  faller = null; slider = null; combo = 0; fever = false; feverT = 0; nova = false; novaT = 0; paused = false; dropPending = 0;
  const placed = Math.max(1, blocks.length - runLaunch);
  const ratio = runPerfects / placed;                       // stars reward precision, not luck
  winStars = 1 + (ratio >= .2 ? 1 : 0) + (ratio >= .45 ? 1 : 0);
  winFirst = i + 1 > prog;
  if (winFirst) { prog = i + 1; store.set('skystack-tiers', prog); }
  if (winStars > (levelStars[i] || 0)) { levelStars[i] = winStars; store.set('skystack-levelstars', levelStars); }
  winReward = 15 + i * 10 + winStars * 5 + (winFirst ? 25 : 0) + (winFirst && prog === TIERS.length ? 200 : 0);
  coins += winReward; stats.coins += winReward; store.set('skystack-coins', coins);
  runSettled = true; reviveOffered = false;   // wins settle on the spot
  stats.games++;
  stats.maxCombo = Math.max(stats.maxCombo, maxCombo);
  settleRun(20);
  setExpr('happy', 600);
  sfx.milestone(); sfx.unlock(); hapt([20, 30, 20, 30, 40]);
}
function gameOver(cause) {
  state = 'gameover'; faller = null; slider = null; combo = 0; fever = false; feverT = 0; nova = false; novaT = 0; paused = false; dropPending = 0;
  overCause = cause || 'miss';

// live window/orientation change: recompute size + layout, then re-center the whole

function adaptToScreen() {
  const oldW = W, oldH = H, oldGY = GROUND_Y;
  computeSize();

  relayout();
  const dx = (W - oldW) / 2, dgy = GROUND_Y - oldGY, kx = W / oldW, ky = H / oldH;
  for (const b of blocks) b.x += dx;
  if (slider) { slider.x += dx; slider.y += dgy; }
  if (faller) { faller.x += dx; faller.y += dgy; }
  if (balloon) balloon.x = clamp(balloon.x + dx, 10, W - 10);
  const SRn = slideRange();
  for (const p of pickups) p.x = clamp(p.x + dx, SRn.l + 20, SRn.r - 20);   // keep pickups reachable
  for (const d of debris) { d.x += dx; d.y += dgy; }
  for (const pt of particles) { pt.x += dx; pt.y += dgy; }
  for (const f of floaters) { f.x += dx; f.y += dgy; }
  for (const t of trails) { t.x += dx; t.y += dgy; }
  for (const cf of coinFx) { cf.x += dx; cf.y += dgy; }
  for (const st of stars) st.x *= kx;
  for (const cl of clouds) cl.x *= kx;

}

      else if (rw.id === 'sound') { muted = !muted; store.set('skystack-mute', muted); if (!muted) sfx.tap(); }

// ---------- update ----------
function update(dt) {
  if (paused) return;                 // full freeze — world, music scheduling, timers
  tick += dt;
  musicStep();
  updateEventFx(dt);
  cameraY += (cameraTarget - cameraY) * 0.08 * dt;
  if (shake > 0) shake = Math.max(0, shake - .25*dt);
  if (squash > 0) squash = Math.max(0, squash - .07*dt);
  if (flashT > 0) flashT = Math.max(0, flashT - .05*dt);
  if (bannerT > 0) bannerT = Math.max(0, bannerT - .006*dt);
  if (regionIntro) { regionIntro.t += dt; if (regionIntro.t >= regionIntro.dur) regionIntro = null; }
  if (coinPop > 0) coinPop = Math.max(0, coinPop - .05*dt);
  if (fadeT > 0) fadeT = Math.max(0, fadeT - .06*dt);
  if (overLock > 0) overLock -= dt;
  if (state === 'levelwin') winT += dt;
  if (state === 'levelfail') failT += dt;
  if (toastT > 0) toastT = Math.max(0, toastT - .014*dt);
  if (mascot.hop > 0) mascot.hop = Math.max(0, mascot.hop - .06*dt);
  if (mascot.exprT > 0) { mascot.exprT -= dt; if (mascot.exprT <= 0 && state !== 'gameover') mascot.expr = 'normal'; }

  if (state === 'shop') { demo.t += dt; if (demo.t > 22) { demo.t = 0; demo.n = demo.n >= 4 ? 1 : demo.n + 1; } }

  const playing = state === 'playing' || state === 'dropping';
  const m = curMode();
  if (playing && m.time) { timeLeft -= dt; if (timeLeft <= 0) { timeLeft = 0; gameOver('time'); } }
  if (fever) { feverT -= dt; if (feverT <= 0) { fever = false; feverT = 0; } }
  if (nova) { novaT -= dt; if (novaT <= 0) { nova = false; novaT = 0; } }
  if (novaFlash > 0) novaFlash = Math.max(0, novaFlash - .04*dt);
  if (skybreakT > 0) skybreakT = Math.max(0, skybreakT - .008*dt);

  const idle = Math.sin(tick*0.03) * Math.min(blocks.length*0.12, 4) * (m.id==='zen'?0.5:1);
  let windPush = 0;
  if (wind) { const env = Math.sin(Math.min(wind.t/wind.dur,1)*Math.PI); windPush = wind.dir * env * 4; }
  const leanTarget = playing ? (balance * 0.28 + idle + windPush) : 0;
  swayX += (leanTarget - swayX) * 0.12 * dt;

  if (playing && m.wind) {
    const wf = matAt(tier).wind;                                            // region wind exposure: sheltered caves, howling jet stream
    windTimer -= dt;
    if (!wind && windTimer <= 0 && blocks.length > 25 && wf > 0) { wind = { dir: Math.random()<.5?-1:1, str:(.16+Math.random()*.30)*wf, dur:100+Math.random()*80, t:0 }; sfx.wind(); }

  if (h < 106) return 0.10 + (h - 80) / 26 * 0.13;

// which tier fills the screen + how strongly the neighbour stage bleeds in near a boundary
function currentBiome(cy) {
  const centerA = (GROUND_Y - cy - (H - 100)) / BH, BLEND = 5;
  const ti = biomeTierAt(centerA), upN = TIERS[ti].n, dnN = ti > 0 ? TIERS[ti-1].n : 0;
  return { ti,

}

// gentle transition and never hard-swaps between stages.
function stageFloat(A) {
  for (let i = 0; i < TIERS.length - 1; i++) {
    const up = TIERS[i].n, dn = i ? TIERS[i - 1].n : 0;

  } else if (tier === 3) {                                                              // JET STREAM — speed lines
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    for (let k = 0; k < 7; k++) { ctx.globalAlpha = .3*a; const sx = (W+60) - (ph*(5+k) + k*70) % (W+60); ctx.fillRect(Math.round(sx), 20 + (k*33)%(H-40), 10 + (k%3)*6, 1); }
  } else if (tier === 5) {                                                              // AURORA — snow
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    for (let k = 0; k < 16; k++) { ctx.globalAlpha = .7*a; ctx.fillRect(Math.round((k*33) % W + Math.sin(ph*.03+k)*6), Math.round(((ph*.6 + k*40) % (H+30)) - 15), 1, 1); }
  } else if (tier === 6) {                                                              // SPACE — a meteor streaks now and then
    const cyc = (ph*3) % 640; if (cyc < 120) { const t = cyc, mx = W - t*1.4, my = 30 + t*.9;
      for (let i2 = 0; i2 < 10; i2++) { ctx.globalAlpha = (.7*(1 - i2/10))*a; ctx.fillStyle = '#FFF6E8'; ctx.fillRect(Math.round(mx + i2*2.4), Math.round(my - i2*1.5), 2, 2); } }
  } else if (tier === 7) {                                                              // ORBIT — tumbling debris sparks
    for (let k = 0; k < 6; k++) { ctx.globalAlpha = .5*a; ctx.fillStyle = k%2 ? '#C7CFE6' : '#8FB8FF'; ctx.fillRect(Math.round((W+40) - (ph*(1.4+k*.3) + k*60)%(W+40)), Math.round(30 + (k*41)%(H-120) + Math.sin(ph*.05+k)*4), 2, 1); }
  } else if (tier === 8) {                                                              // THE STARS — celebratory gold sparks
    for (let k = 0; k < 10; k++) { const tw = Math.sin(ph*.1 + k*1.3); ctx.globalAlpha = (tw > .2 ? .8 : .2)*a; ctx.fillStyle = k%2 ? '#FFE28A' : '#FFFFFF'; ctx.fillRect(Math.round((k*31 + Math.sin(ph*.02+k)*8) % W), Math.round((k*53) % H), tw > .5 ? 2 : 1, tw > .5 ? 2 : 1); }
  } else if (tier === 0) {                                                              // ROOFTOPS — drifting dust motes
    ctx.fillStyle = 'rgba(255,246,232,0.5)';
    for (let k = 0; k < 5; k++) { ctx.globalAlpha = .35*a; ctx.fillRect(Math.round((k*67 + ph*.3)%W), Math.round(60 + (k*51)%(H-120) + Math.sin(ph*.05+k)*5), 1, 1); }
  }
  ctx.globalAlpha = 1;
}

// ================= continuous anchored world (Phase 2) =================
// The low world (caves, surface, trees, buildings) lives at ABSOLUTE world altitude and is
// simply climbed PAST — never cross-faded. A=0 is the tower base / cave floor.
const SURF_A = 33;                                           // surface line (blocks): cave ceiling / where trees+buildings root (~100m deep cave below)
const SHAFT_W_F = 0.52;                                      // central open shaft (the corridor the tower climbs) as a fraction of W
function worldY(A, cy) { return Math.round(GROUND_Y - A * BH - (cy === undefined ? cameraY : cy)); }   // screen-y of world altitude A

// distant, topless skyline on the horizon — parallax depth only (you never climb past it)
function drawSkylineHaze(ph, yCeil) {
  const horizon = Math.min(H, yCeil);
  const cols = [0.06, 0.19, 0.33, 0.5, 0.66, 0.8, 0.93];
  for (let i = 0; i < cols.length; i++) {
    const w = Math.round(W * (0.05 + bhash(i*5+1)*0.05)), hgt = Math.round(22 + bhash(i*7)*40);
    const x = Math.round(W*cols[i] - w/2), topY = horizon - hgt;
    if (topY > H) continue;
    ctx.globalAlpha = 0.32; ctx.fillStyle = '#8CA0BE'; ctx.fillRect(x, topY, w, horizon - topY);
    ctx.globalAlpha = 0.45; ctx.fillStyle = '#A4B6D0'; ctx.fillRect(x, topY, w, 2);
    ctx.globalAlpha = 0.20; ctx.fillStyle = '#EAF4FF';
    for (let wy = topY+4; wy < horizon-2; wy += 6) for (let wx = x+2; wx < x+w-2; wx += 5) if (bhash(wx*13+wy) > 0.62) ctx.fillRect(wx, wy, 2, 2);
  }
  ctx.globalAlpha = 1;
}

// the underground: rock walls framing a dark central shaft, glinting crystals, a dripstone
// ceiling with the escape hole in the middle. `top` = screen-y rock starts; `ceilY` = the
// ceiling line (or <0 when the ceiling is off-screen and we're deep below).
// Terraria-style underground: a TEXTURED BACKGROUND WALL (behind the tower, so the blocks keep
// full room to breathe) — dirt->stone->deep-stone strata, ore/gem specks, cave pockets receding
// into darkness for depth, crystals, and the dripstone ceiling + escape hole up top.
function drawCaveWalls(ph, top, ceilY, cy) {
  const under = H - top; if (under <= 0) return;
  // AI pixel-art cave backdrop (tiled + parallax) when the sprite has loaded — replaces the procedural wall
  if (caveBgImg && caveBgImg.complete && caveBgImg.naturalWidth) {
    ctx.imageSmoothingEnabled = false;
    const ih = Math.round(W * caveBgImg.naturalHeight / caveBgImg.naturalWidth);
    const off = ((Math.round(cy * 0.5) % ih) + ih) % ih;
    for (let y = top - off; y < H; y += ih) ctx.drawImage(caveBgImg, 0, y, W, ih);
    ctx.imageSmoothingEnabled = true;
    if (ceilY > -6 && ceilY < H) drawCaveCeiling(ph, ceilY);
    return;
  }
  const T = 18, aOf = y => (GROUND_Y - cy - y) / BH;                                          // screen-y -> world altitude
  // 1) background wall: dim, receding into black the deeper you are
  const g = ctx.createLinearGradient(0, top, 0, H);
  g.addColorStop(0, '#3A2A20'); g.addColorStop(0.4, '#241C20'); g.addColorStop(1, '#09070E');
  ctx.globalAlpha = 1; ctx.fillStyle = g; ctx.fillRect(0, top, W, under);
  // 2) world-anchored rock tiles + strata + sparse ore/gem
  const phase = ((GROUND_Y - cy) % T + T) % T;
  for (let y = top - ((top - (top - phase)) % T) - T; y < H; y += T) {
    const A = aOf(y + T/2), row = Math.round((GROUND_Y - cy - y) / T);
    const dirt = A > SURF_A - 8, deep = A < 8;
    for (let x = 0; x < W; x += T) {
      const s = bhash(row*131 + x*7), base = dirt ? 54 : deep ? 24 : 38, v = base + Math.round((s - 0.5) * 14);
      ctx.globalAlpha = 0.5;
      ctx.fillStyle = dirt ? 'rgb(' + (v+24) + ',' + (v+2) + ',' + (v-18) + ')' : 'rgb(' + (v-2) + ',' + v + ',' + (v+7) + ')';
      ctx.fillRect(x + 1, y + 1, T - 2, T - 2);                                               // rock block (mortar gaps read as the dark base)
      if (s > 0.87) { ctx.globalAlpha = 0.32; ctx.fillStyle = '#000'; ctx.fillRect(x + 4, y + 2, 1, T - 5); }   // crack
      if (s < 0.05) { ctx.globalAlpha = 0.85; const gem = bhash(row*3 + x);                    // ore / gem speck
        ctx.fillStyle = gem > 0.66 ? '#D8A83C' : gem > 0.33 ? '#7EE8C5' : '#8FB8FF'; ctx.fillRect(x + (T>>1), y + (T>>1), 2, 2); }
    }
  }
  ctx.globalAlpha = 1;
  // 3) open cave pockets / distant tunnels — dark blobs receding into black (depth cue)
  for (let k = 0; k < 8; k++) {
    const band = 92, py = top - (top % band) + k * band; if (py > H + 40) break; if (py < top - 40) continue;
    const seed = bhash(Math.round((GROUND_Y - cy - py) / band) * 17 + k * 5);
    const px = Math.round(seed * W), r = Math.round(20 + bhash(k*7 + 3) * 22);
    ctx.globalAlpha = 0.5; pixDisc(px, Math.round(py), r + 5, '#0C0912');
    ctx.globalAlpha = 0.6; pixDisc(px, Math.round(py), r, '#060409');
    ctx.globalAlpha = 0.6; ctx.fillStyle = '#181220';                                          // stalactites/stalagmites framing it
    for (let sx = px - r; sx < px + r; sx += 6) { const st = Math.round(bhash(sx*5 + (py|0)) * 8);
      ctx.fillRect(sx, Math.round(py) - r, 2, st); const sg = Math.round(bhash(sx*3) * 7); ctx.fillRect(sx + 3, Math.round(py) + r - sg, 2, sg); }
  }
  ctx.globalAlpha = 1;
  // 4) glinting crystals (ambient life, on the walls not the play column)
  for (let k = 0; k < 7; k++) {
    const gy = top + 26 + k * 68; if (gy > H) break;
    const gx = (k & 1) ? W - 18 - (k * 5) : 12 + (k * 5), gl = reduceMotion ? 0.6 : (0.4 + 0.4 * Math.sin(ph * 0.08 + k * 2));
    ctx.globalAlpha = gl; ctx.fillStyle = k % 2 ? '#7EE8C5' : '#B58CF0'; ctx.fillRect(Math.round(gx), Math.round(gy), 2, 4);
    ctx.globalAlpha = gl * 0.35; ctx.fillRect(Math.round(gx) - 1, Math.round(gy) + 1, 4, 2);
  }
  ctx.globalAlpha = 1;
  // 5) dripstone ceiling + escape hole + daylight shaft
  if (ceilY > -6 && ceilY < H) drawCaveCeiling(ph, ceilY);
}
// dripstone ceiling + escape hole + daylight shaft + roots + drip (shared by the procedural + AI cave paths)
function drawCaveCeiling(ph, ceilY) {
  const shaftW = Math.round(W * SHAFT_W_F), cxL = Math.round((W - shaftW) / 2), cxR = cxL + shaftW;
  for (let yy = ceilY; yy < Math.min(H, ceilY + 220); yy += 5) {                             // sunbeam spilling through the hole
    const t = (yy - ceilY) / 220, w2 = shaftW * (0.66 + t * 0.5);
    ctx.globalAlpha = 0.09 * (1 - t); ctx.fillStyle = 'rgba(255,240,200,0.9)'; ctx.fillRect(Math.round(W/2 - w2/2), yy, Math.round(w2), 5);
  }
  ctx.globalAlpha = 1; ctx.fillStyle = '#2E2230';
  for (let x = 0; x < W; x += 8) {
    if (x > cxL - 10 && x < cxR + 10) continue;                                              // leave the escape hole open
    const sl = Math.round(6 + bhash(x*5) * 15);
    ctx.fillRect(x, ceilY - 3, 8, 4);
    for (let t = 0; t < sl; t++) { const ww = Math.max(1, Math.round((1 - t/sl) * 5)); ctx.fillRect(Math.round(x+4 - ww/2), ceilY + t, ww, 1); }
  }
  for (let k = 0; k < 7; k++) { const rx = Math.round(bhash(k*23) * W); if (rx > cxL - 6 && rx < cxR + 6) continue;   // hanging roots on the dirt rim
    ctx.globalAlpha = 0.6; ctx.fillStyle = '#3A2A18'; ctx.fillRect(rx, ceilY + 2, 1, 6 + Math.round(bhash(k*5) * 10)); }
  ctx.globalAlpha = 0.5; ctx.fillStyle = 'rgba(255,236,180,0.7)';
  ctx.fillRect(cxL - 10, ceilY - 1, 10, 2); ctx.fillRect(cxR, ceilY - 1, 10, 2);
  ctx.globalAlpha = 1;
  if (!reduceMotion) { const dp = (ph*2) % 130, dx = Math.round(W/2 + Math.sin(ph*0.7) * shaftW * 0.3);
    ctx.globalAlpha = 0.5; ctx.fillStyle = '#9FD8E8'; ctx.fillRect(dx, ceilY + dp, 1, 3); ctx.globalAlpha = 1; }
}

// the grass+dirt surface lip on either side of the escape hole, where trees & buildings root
function drawSurfaceGround(ph, yCeil) {
  const shaftW = Math.round(W * SHAFT_W_F), cxL = Math.round((W - shaftW) / 2), cxR = cxL + shaftW;
  for (const seg of [[0, cxL], [cxR, W]]) {
    const x0 = seg[0], x1 = seg[1];
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#5A3F2A'; ctx.fillRect(x0, yCeil, x1 - x0, 7);                            // dirt lip
    ctx.fillStyle = '#3A2818'; ctx.fillRect(x0, yCeil + 5, x1 - x0, 2);
    ctx.fillStyle = '#3E8A32'; ctx.fillRect(x0, yCeil - 2, x1 - x0, 3);                        // grass base
    ctx.fillStyle = '#6ECB54';
    for (let gx = x0; gx < x1; gx += 3) { const gh = 2 + Math.round(bhash(gx*7)*3), sw = reduceMotion ? 0 : Math.round(Math.sin(ph*0.05 + gx)*0.6);
      ctx.fillRect(gx + sw, yCeil - 2 - gh, 1, gh); }                                          // grass blades
  }
  ctx.globalAlpha = 1;
}

// deterministic instances rooted at the surface. Trees top out ~TREETOPS(22); most roofs
// ~ROOFTOPS(34); a couple towers reach toward the clouds. Fixed screen-X (the world never pans X).
const BUILDINGS = [
  { x:0.015, w:0.15, topA:66,  body:'#68768E', roof:'#8E9CB2' },
  { x:0.175, w:0.11, topA:101, body:'#5A6B86', roof:'#82909E' },   // tower reaching the clouds
  { x:0.31,  w:0.10, topA:58,  body:'#6E7A92', roof:'#94A0B4' },
  { x:0.585, w:0.12, topA:78,  body:'#5E6C86', roof:'#8894AA' },
  { x:0.735, w:0.105,topA:104, body:'#66748C', roof:'#8A97AD' },   // tower reaching the clouds
  { x:0.86,  w:0.135,topA:62,  body:'#5A6880', roof:'#828FA6' }
];
const TREES = [
  { x:0.085, topA:57, s:1.05 }, { x:0.245, topA:47, s:0.82 },
  { x:0.66,  topA:60, s:1.15 }, { x:0.93,  topA:50, s:0.95 }
];
// one solid city tower rooted at the surface (base SURF_A) with a real roof at topA — climbed past.
function rootedBuilding(b, seed) {
  const baseY = worldY(SURF_A), topY = worldY(b.topA);
  if (topY > H || baseY < 0) return;
  const x = Math.round(W * b.x), w = Math.round(W * b.w);
  const y0 = Math.max(topY, -2), y1 = Math.min(baseY, H + 2);
  ctx.globalAlpha = 1;
  ctx.fillStyle = b.body; ctx.fillRect(x, y0, w, y1 - y0);                                     // body
  ctx.fillStyle = 'rgba(0,0,0,0.28)';       ctx.fillRect(x, y0, 2, y1 - y0);                   // shadow (left)
  ctx.fillStyle = 'rgba(255,232,176,0.14)'; ctx.fillRect(x + w - 2, y0, 2, y1 - y0);           // sun-lit (right)
  if (topY > -6) {                                                                             // roof clutter (only when the top is near/on screen)
    ctx.fillStyle = b.roof; ctx.fillRect(x - 2, topY, w + 4, 3);
    ctx.fillStyle = 'rgba(255,232,176,0.16)'; ctx.fillRect(x - 2, topY, w + 4, 1);
    if (bhash(seed*7) > 0.5) { ctx.fillStyle = '#39445E'; ctx.fillRect(x + (w*0.45|0), topY - 6, 7, 6); ctx.fillStyle = b.roof; ctx.fillRect(x + (w*0.45|0), topY - 6, 7, 1); }
    else { const ax = x + (w*0.5|0); ctx.fillStyle = 'rgba(190,200,220,0.7)'; ctx.fillRect(ax, topY - 9, 1, 9); ctx.fillRect(ax - 2, topY - 5, 5, 1);
      const blink = reduceMotion ? 1 : Math.sin(tick*.12 + seed)*.5 + .5; ctx.globalAlpha = .3 + .6*blink; ctx.fillStyle = '#FF5E5E'; ctx.fillRect(ax, topY - 10, 1, 1); ctx.globalAlpha = 1; }
  }
  for (let wy = y0 + 6; wy < y1 - 3; wy += 13) for (let wx = x + 3; wx < x + w - 3; wx += 6) {  // windows, pattern anchored to the base so it doesn't swim
    const r = bhash(Math.round(wx*17 + (baseY - wy)*3 + seed*101));
    if (r < 0.30) { ctx.globalAlpha = .85; ctx.fillStyle = '#39445E'; ctx.fillRect(wx, wy, 4, 9); continue; }
    if (r > 0.95 && !reduceMotion) { const fl = Math.sin(tick*.09 + wx + wy) > -.3 ? 1 : .35; ctx.globalAlpha = .8*fl; ctx.fillStyle = 'rgb(255,224,150)'; ctx.fillRect(wx, wy, 4, 8); continue; }
    ctx.globalAlpha = .4 + .4*r; ctx.fillStyle = 'rgb(176,206,238)'; ctx.fillRect(wx, wy, 4, 8);
    ctx.globalAlpha = .25 + .25*r; ctx.fillStyle = '#EAF4FF'; ctx.fillRect(wx, wy, 4, 1);
  }
  ctx.globalAlpha = 1;
}
// one whole tree rooted at the surface: tapering trunk + branches carrying connected canopy, top at topA
function rootedTree(t, seed) {
  const baseY = worldY(SURF_A), topY = worldY(t.topA);
  if (topY > H || baseY < 0) return;
  const sway = reduceMotion ? 0 : Math.sin(tick*.018 + seed)*2, x = Math.round(W * t.x + sway);
  const w = Math.max(6, Math.round(9 * t.s)), trunkTop = Math.max(topY + 6, -20), y1 = Math.min(baseY, H + 2);
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#3A2616';            ctx.fillRect(x, trunkTop, w, y1 - trunkTop);           // solid trunk
  ctx.fillStyle = 'rgba(96,66,36,0.55)';ctx.fillRect(x + w - 2, trunkTop, 2, y1 - trunkTop);   // lit right edge
  ctx.fillStyle = 'rgba(0,0,0,0.32)';   ctx.fillRect(x, trunkTop, 2, y1 - trunkTop);           // shadow left edge
  const P = Math.max(20, Math.round(34 * t.s));
  for (let by = topY + 10; by < y1; by += P) {                                                 // branch nodes + connected foliage
    if (by < -20 || by > H + 20) continue;
    const nd = Math.round((baseY - by) / P), side = (nd & 1) ? 1 : -1, br = Math.round(16 * t.s);
    ctx.fillStyle = '#3A2616'; ctx.fillRect(side > 0 ? x + w : x - br, by, br, 3); ctx.fillRect(side > 0 ? x + w + br - 3 : x - br, by - 6, 3, 8);
    foliageBlob(side > 0 ? x + w + br : x - br, by - 3, 15 * t.s, 1);
    foliageBlob(x + (w >> 1), by - 8 * t.s, 12 * t.s, 1);
  }
  if (topY < H + 20) { foliageBlob(x + (w >> 1), topY + 4, 18 * t.s, 1);                        // canopy crown at the top
    foliageBlob(x + (w >> 1) - 6, topY + 2, 12 * t.s, 1); foliageBlob(x + (w >> 1) + 6, topY + 7, 12 * t.s, 1); }
  ctx.globalAlpha = 1;
}

// a small flapping bird (multi-frame wing beat): body + head + two bent wings
function drawBird(x, y, s, ph, col) {
  x = Math.round(x); y = Math.round(y);
  ctx.fillStyle = col;
  const tip = Math.round(Math.sin(ph) * 3 * s), wl = Math.max(3, Math.round(5 * s)), bw = Math.max(2, Math.round(3 * s));
  ctx.fillRect(x - 1, y, bw, Math.max(1, Math.round(2 * s)));               // body
  ctx.fillRect(x + bw - 1, y - 1, 1, 1);                                    // head
  ctx.fillRect(x - wl, y - tip, wl, 1);                                     // left wing (shoulder)
  ctx.fillRect(x - wl, Math.min(y, y - tip), 1, Math.max(1, Math.abs(tip)));// left wing tip
  const rx = x + bw - 1;
  ctx.fillRect(rx, y - tip, wl, 1);                                         // right wing
  ctx.fillRect(rx + wl - 1, Math.min(y, y - tip), 1, Math.max(1, Math.abs(tip)));
}
// a little bat with angular flapping wings (cave life)
function drawBat(x, y, ph) {
  x = Math.round(x); y = Math.round(y);
  ctx.fillStyle = '#140E1E';
  const up = Math.round((Math.sin(ph) * 0.5 + 0.5) * 4);
  ctx.fillRect(x, y, 2, 2);                                                 // body
  ctx.fillRect(x, y - 1, 1, 1); ctx.fillRect(x + 1, y - 1, 1, 1);          // ears
  ctx.fillRect(x - 4, y - up, 4, 1); ctx.fillRect(x - 5, y - up + 1, 1, 2); ctx.fillRect(x - 2, y + 1, 2, 1);   // left wing
  ctx.fillRect(x + 2, y - up, 4, 1); ctx.fillRect(x + 5, y - up + 1, 1, 2); ctx.fillRect(x + 2, y + 1, 2, 1);   // right wing
}
// bats flitting + glow-worms pulsing in the cave; each anchored to its world altitude, self-culls off-screen
function drawCaveLife(cy, ph) {
  for (const g of glowworms) {
    const gy = worldY(g.a, cy) + Math.round(Math.sin(g.dx) * 6); if (gy < -6 || gy > H + 6) continue;
    const gx = Math.round(g.x + Math.sin(g.dx * 0.7) * 10), pulse = 0.3 + 0.5 * (Math.sin(g.ph) * 0.5 + 0.5);
    ctx.globalAlpha = pulse * 0.45; pixDisc(gx, gy, 3, 'rgba(150,240,180,0.6)');
    ctx.globalAlpha = pulse;        ctx.fillStyle = '#D6FCB4'; ctx.fillRect(gx, gy, 1, 1);
  }
  ctx.globalAlpha = 1;
  for (const b of bats) {
    const by = worldY(b.a, cy) + Math.round(Math.sin(b.wob) * 12); if (by < -8 || by > H + 8) continue;
    drawBat(b.x, by, b.ph);
  }
  ctx.globalAlpha = 1;
}

// draw the rooted low world for the current camera; each layer self-clips by altitude (no fade)
function drawGroundWorld(cy, ph) {
  const yCeil = worldY(SURF_A, cy);
  if (yCeil < H) drawSkylineHaze(ph, yCeil);                                                   // daylight horizon behind everything
  for (let i = 0; i < BUILDINGS.length; i++) rootedBuilding(BUILDINGS[i], i + 3);              // rooted city towers (behind)
  for (let i = 0; i < TREES.length; i++) rootedTree(TREES[i], i + 17);                         // rooted trees (in front of the towers)
  if (yCeil > 0) drawCaveWalls(ph, Math.min(yCeil, H), yCeil >= H ? -999 : yCeil, cy);         // underground below the ceiling
  else if (worldY(0, cy) > 0) drawCaveWalls(ph, 0, -999, cy);                                  // (transition safety) rock still below
  drawCaveLife(cy, ph);                                                                        // bats + glow-worms (self-cull to the cave band)
  if (yCeil > -8 && yCeil < H + 8) drawSurfaceGround(ph, yCeil);
}

function drawBiomeDecor(cy) {
  const ph = reduceMotion ? 0 : tick;
  drawGroundWorld(cy, ph);                                      // rooted caves/surface/(trees+buildings) — anchored, no fade

  const { ti, wUp, wDn } = currentBiome(cy);                   // celestial sky bands only sit ABOVE the ground world
  if (ti >= 4) {
    biomeBackdrop(ti, cy, 1);
    if (wUp > 0 && ti+1 >= 4) biomeBackdrop(ti+1, cy, wUp);
    if (wDn > 0 && ti-1 >= 4) biomeBackdrop(ti-1, cy, wDn);
  }

  // sparse drifting mid-ground sprites for the celestial bands (ti>=4 → old sprite index ti-2)
  const lowA = (GROUND_Y - cy - H - 30) / BH, highA = (GROUND_Y - cy + 30) / BH, STEP = 6;
  for (let s = Math.floor(lowA / STEP); s <= Math.ceil(highA / STEP); s++) {
    const A = s * STEP; if (A < 3) continue;
    const tiA = biomeTierAt(A); if (tiA < 4) continue;
    const sy = Math.round(GROUND_Y - A*BH - cy);
    if (sy < -30 || sy > H + 30) continue;
    const seed = (s * 2654435761) >>> 0, x = (seed % (W + 40)) - 20;
    biomeSprite(tiA - 2, x, sy, s, ph);
  }

  // animated weather for the on-screen celestial tier(s)
  if (ti >= 4) {
    biomeWeather(ti - 2, cy, 1, ph);
    if (wUp > 0 && ti+1 >= 4) biomeWeather(ti+1 - 2, cy, wUp, ph);
    if (wDn > 0 && ti-1 >= 4) biomeWeather(ti-1 - 2, cy, wDn, ph);
  }
}

// ---------- region entry cinematics ----------
// A short, non-blocking overlay that fires when you ENTER a region (run start + each crossing).
// The board keeps playing underneath. reduceMotion -> a plain static title card.
function startRegionIntro(ti) {
  if (ti < 0 || ti >= TIERS.length) return;
  regionIntro = { ti, t: 0, dur: reduceMotion ? 55 : 100 };
}

}

// shine that lives ON the letterforms: re-draws the title in white inside narrow
// vertical strips around a sweeping center, so it hugs every pixel of the glyphs
// and eases in/out over its cycle — never a box, never a hard cut-off
function titleShine(str, y, scale) {
  if (reduceMotion) return;
  const tw2 = str.length * 6 * scale, ttx = Math.round(W/2 - tw2/2);
  const phase = (tick % 150) / 150;                  // sweep, then rest
  if (phase >= 0.5) return;
  const p2 = phase / 0.5;
  const cx3 = ttx - 8 + (tw2 + 16) * p2;             // sweep center
  const fade = Math.sin(p2 * Math.PI);               // soft start + finish
  const gh = 7 * scale + 2;                          // glyph height + slack
  for (const band of [[0, .55], [3, .3], [6, .12]]) {
    for (const s2 of [-1, 1]) {
      const bx2 = cx3 + band[0] * s2 - (s2 < 0 ? 3 : 0);
      ctx.save(); ctx.beginPath(); ctx.rect(bx2, y - 1, 3, gh); ctx.clip();
      txt(str, W/2, y, scale, 'rgba(255,255,255,' + (band[1] * fade).toFixed(3) + ')', 'center');
      ctx.restore();
      if (band[0] === 0) break;                      // center band once
    }
  }
}

// ---------- sky map (level select: one row per level, drag-scrolls, footer launches) ----------
// list layout: one generous row per level on a straight climbing trail down a
// centered column; the list drag-scrolls whenever it is taller than the screen
const MAP_ROW = 60, MAP_HEAD = 34, MAP_FOOT = 10;
// per-stage floating-island palette (grass, cloud, rock, ice, space-rock, metal, gold)
const ISLES = [
  { top:'#57AC50', s:'#2F6B30', e:'#1B481D' },              // 0 rooftops  — grass
  { top:'#41A04E', s:'#26602E', e:'#164019' },              // 1 treetops  — grass
  { cloud:true },                                           // 2 cloud nine
  { cloud:true },                                           // 3 jet stream
  { top:'#6A5A90', s:'#3E3459', e:'#28203C' },              // 4 stratosphere — rock
  { top:'#8FE6F0', s:'#3E8AA6', e:'#276A84' },              // 5 aurora — ice
  { top:'#4C4670', s:'#2C2846', e:'#1A1730' },              // 6 space — dark rock
  { top:'#9090AC', s:'#4E4E6C', e:'#333350' },              // 7 orbit — metal
  { top:'#FFD75E', s:'#9A7420', e:'#5E4610' }               // 8 the stars — gold
];
// numbered badges weave left/right down an S-curve; only x winds, y stays evenly
// spaced by altitude so scroll + progress math is unchanged
function skyMapNodes() {
  const viewTop = MAP_HEAD + 4, viewBot = H - MAP_FOOT - 4;
  const colW = Math.min(W - 8, 300), colX = Math.round((W - colW) / 2);
  const n = TIERS.length, midX = Math.round(W / 2);
  const islandW = Math.min(W - 24, 104);
  const amp = clamp(Math.round(W * 0.16), 8, Math.max(6, Math.round((W - islandW) / 2) - 2));
  const wv = i => midX + Math.round(amp * Math.sin(i * 1.25 + 0.7));
  const contentH = (n + 2) * MAP_ROW;                       // ground + levels + gate
  mapScrollMax = Math.max(0, contentH - (viewBot - viewTop));
  mapScroll = clamp(mapScroll, 0, mapScrollMax);
  const base = mapScrollMax > 0
    ? viewBot - 16 + Math.round(mapScroll)
    : Math.round((viewTop + viewBot) / 2 + contentH / 2) - 16;
  const pts = [];
  for (let i = 0; i < n; i++) pts.push({ x: wv(i), y: base - (i + 1) * MAP_ROW });
  return { pts, start: { x: midX, y: base }, gate: { x: midX, y: base - (n + 1) * MAP_ROW },
           colX, colW, midX, amp, islandW, viewTop, viewBot };
}
function openSkyMap() {   // focus the view on the next goal
  skyMap = true; mapDrag = null; mapScroll = 0;
  selLevel = Math.min(prog, TIERS.length - 1);
  const L = skyMapNodes();                                  // computes mapScrollMax
  const k = Math.min(prog, TIERS.length) + 1;               // row index of the next goal / gate
  mapScroll = clamp(k * MAP_ROW - (L.viewBot - L.viewTop) / 2 + MAP_ROW, 0, mapScrollMax);
}
// a tap (pointerup without drag) on the open map: header/X closes; a badge selects,
// then a second tap on the same badge launches it. Empty taps are ignored (use the X).
function mapTapAt(p) {
  const L = skyMapNodes();
  if (p.y <= MAP_HEAD) { skyMap = false; sfx.tap(); return; }               // header / X closes
  const HITX = 26, HITY = 24;
  const inView = y2 => y2 > L.viewTop - 6 && y2 < L.viewBot + 6;
  for (let i = 0; i < TIERS.length; i++) {
    const pt = L.pts[i];
    if (!inView(pt.y)) continue;
    if (Math.abs(p.x - pt.x) <= HITX && Math.abs(p.y - pt.y) <= HITY) {
      if (i <= prog) {
        if (selLevel === i) { skyMap = false; startLevel(i); }              // second tap plays it
        else { selLevel = i; sfx.tap(); }
      } else sfx.deny();                                                    // locked level
      return;
    }
  }
  if (inView(L.gate.y) && Math.abs(p.x - L.gate.x) <= HITX && Math.abs(p.y - L.gate.y) <= HITY) { sfx.deny(); return; }
}
function dkHex(hex, f) {
  const v = parseInt(hex.slice(1), 16);
  return 'rgb(' + Math.round((v>>16 & 255)*f) + ',' + Math.round((v>>8 & 255)*f) + ',' + Math.round((v & 255)*f) + ')';
}
// raised pixel disc: drop shadow + dark extruded side + lit face + bevel highlight
function mapNode3D(x, y, r, face, side) {
  pixDisc(x + 1, y + 3, r, 'rgba(0,0,0,0.35)');
  pixDisc(x, y + 2, r, side);
  pixDisc(x, y, r, face);
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.fillRect(x - 2, y - r + 1, 3, 1); ctx.fillRect(x - r + 1, y - 2, 1, 3);

// pixel vignette for each stage, drawn in the row's right column
function drawStageDeco(i, x, y) {

    ctx.fillRect(x+1, y-4, 4, 3); ctx.fillRect(x, y-2, 6, 2);

    ctx.fillStyle = '#8A5A2C'; ctx.fillRect(x+2, y, 2, 4); ctx.fillRect(x-4, y+1, 1, 3);

    ctx.fillStyle = 'rgba(255,246,232,0.6)'; ctx.fillRect(x-5, y+3, 3, 1); ctx.fillRect(x-2, y+2, 1, 1);
  } else if (i === 7) { // orbit: shaded ringed planet + orbiting moon
    ctx.fillRect(x-2, y-2, 4, 4); ctx.fillRect(x-1, y-3, 2, 6);
    ctx.fillStyle = dkHex(c, .55); ctx.fillRect(x, y, 2, 2);
    ctx.fillStyle = 'rgba(255,246,232,0.55)'; ctx.fillRect(x-4, y, 3, 1); ctx.fillRect(x+2, y, 3, 1);
    ctx.fillStyle = '#FFF6E8'; ctx.fillRect(x + Math.round(Math.cos(ph*.07)*5), y + Math.round(Math.sin(ph*.07)*3), 1, 1);
  } else {              // the stars: big star with sparkles
    ctx.fillRect(x-1, y-4, 2, 8); ctx.fillRect(x-4, y-1, 8, 2); ctx.fillRect(x-2, y-2, 4, 4);
    ctx.fillStyle = 'rgba(255,255,255,0.95)'; ctx.fillRect(x-1, y-1, 2, 2);
    if (!reduceMotion && Math.floor(tick/14)%2===0) { ctx.fillStyle = '#FFF6E8'; ctx.fillRect(x+4, y-4, 1, 1); ctx.fillRect(x-5, y+3, 1, 1); }
  }
}
// blend a hex color toward white by f (0..1) -> 'rgb(...)'
function liteHex(hex, f) {
  const v = parseInt(hex.slice(1), 16), r = v>>16&255, g = v>>8&255, b = v&255, m = c => Math.round(c + (255-c)*f);
  return 'rgb(' + m(r) + ',' + m(g) + ',' + m(b) + ')';
}
// a puffy multi-lobe cloud platform (stages 2/3); wispy adds jet-stream contrails
function drawCloudIsland(cx, topY, half, ph, wispy) {
  const drift = Math.round(Math.sin(ph*.03)*2);

  drawMapDecor(L, ph);   // birds, balloons, plane, aurora, galaxy, moon, planet — behind the islands
  // best-height marker point along the winding trail (mascot rides it, walked dots glow)
  let mp = null;
  if (bestHeight > 0) {
    const nextIdx = TIERS.findIndex(t => bestHeight < t.n);
    if (nextIdx === -1) mp = { x: L.gate.x, y: L.gate.y };
    else {
      const prevN = nextIdx === 0 ? 0 : TIERS[nextIdx-1].n;
      const frac = clamp((bestHeight - prevN) / (TIERS[nextIdx].n - prevN), 0, 1);
      const a2 = nextIdx === 0 ? L.start : L.pts[nextIdx-1], b2 = L.pts[nextIdx];
      mp = { x: Math.round(a2.x + (b2.x - a2.x) * frac), y: Math.round(a2.y - frac * MAP_ROW) };
    }
  }
  // winding dotted trail: ground -> each stage -> the gate. walked part glows gold
  const chain = [L.start, ...L.pts, L.gate];
  for (let j = 0; j < chain.length - 1; j++) {
    const a2 = chain[j], b2 = chain[j+1];
    const seg = Math.hypot(b2.x - a2.x, b2.y - a2.y), steps = Math.max(2, Math.round(seg / 5));
    for (let s2 = 1; s2 < steps; s2++) {
      const tt = s2 / steps, dx = Math.round(a2.x + (b2.x - a2.x) * tt), dy = Math.round(a2.y + (b2.y - a2.y) * tt);
      if (dy < L.viewTop - 3 || dy > L.viewBot + 3) continue;
      ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fillRect(dx - 1, dy + 1, 3, 2);
      ctx.fillStyle = (mp && dy >= mp.y) ? 'rgba(255,215,94,0.85)' : 'rgba(255,246,232,0.5)';
      ctx.fillRect(dx - 1, dy, 3, 2);
    }
  }
  // ground marker where the trail meets the earth
  if (L.start.y > L.viewTop - 6 && L.start.y < L.viewBot + 12) {
    pixDisc(L.start.x, L.start.y, 4, 'rgba(255,246,232,0.3)');
    pixDisc(L.start.x, L.start.y, 2, '#141022');
    txt('GROUND', L.start.x, L.start.y + 6, 1, 'rgba(255,246,232,0.4)', 'center');
  }
  // stages, drawn top (farthest) down so nearer islands overlap the ones above
  const champ = prog >= TIERS.length;
  for (let k = TIERS.length; k >= 0; k--) {
    const isGate = k === TIERS.length;
    const pt = isGate ? L.gate : L.pts[k];
    if (pt.y < L.viewTop - 26 || pt.y > L.viewBot + 28) continue;
    const bob = reduceMotion ? 0 : Math.round(Math.sin(tick*.045 + k*1.3)*2);   // islands drift like they float
    if (isGate) {
      if (champ) {
        drawIsland(8, pt.x, pt.y + 6 + bob);
        mapNode3D(pt.x, pt.y, 7, '#FFD75E', '#7A5A14'); pixDisc(pt.x, pt.y, 4, '#4A3A0C');
        ctx.fillStyle = '#FFD75E'; ctx.fillRect(pt.x-2, pt.y-1, 5, 2);
        ctx.fillRect(pt.x-2, pt.y-2, 1, 1); ctx.fillRect(pt.x, pt.y-2, 1, 1); ctx.fillRect(pt.x+2, pt.y-2, 1, 1);
        txt('SKY CHAMPION', pt.x, pt.y - 24, 1, '#FFD75E', 'center');
        txt('THE GATE IS OPEN', pt.x, pt.y + 18, 1, 'rgba(255,246,232,0.6)', 'center');
      } else {   // sealed golden gate at the summit
        ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fillRect(pt.x-11, pt.y+9, 22, 3);
        ctx.fillStyle = '#9A7420'; ctx.fillRect(pt.x-10, pt.y-9, 20, 19);
        ctx.fillStyle = '#FFD75E'; ctx.fillRect(pt.x-8, pt.y-7, 16, 17);
        ctx.fillStyle = 'rgba(255,255,255,0.35)'; ctx.fillRect(pt.x-8, pt.y-7, 16, 1);
        ctx.fillStyle = '#5E4610'; ctx.fillRect(pt.x-4, pt.y-1, 8, 11);
        txt('?', pt.x, pt.y + 1, 1, '#FFD75E', 'center');
        txt('? ? ?', pt.x, pt.y - 24, 1, 'rgba(255,246,232,0.5)', 'center');
        txt('SEALED - ' + TIERS[TIERS.length-1].n*METERS_PER + 'M', pt.x, pt.y + 16, 1, 'rgba(255,246,232,0.45)', 'center');
      }
      continue;
    }
    const t = TIERS[k];
    const cleared = k < prog, isNext = k === prog, unlocked = k <= prog, sel = selLevel === k && unlocked;
    // floating themed island (bobs gently underneath the pinned badge) + its weather
    drawIsland(k, pt.x, pt.y + 5 + bob);
    drawStageWeather(k, pt.x, pt.y + bob, ph);
    // stage label stacked above the badge (clear of the badge top)
    txt((k+1) + '. ' + t.name, pt.x, pt.y - 30, 1, unlocked ? t.c : 'rgba(255,246,232,0.45)', 'center');
    txt(t.n*METERS_PER + 'M' + (cleared ? '' : isNext ? ' - NEXT' : ' - LOCKED'), pt.x, pt.y - 21, 1, 'rgba(255,246,232,0.55)', 'center');
    // numbered badge on the trail
    mapBadge(k+1, pt.x, pt.y, cleared, isNext, unlocked, sel);
    // stars under the badge
    if (unlocked) for (let s2 = 0; s2 < 3; s2++) drawStarPix(pt.x - 8 + s2*8, pt.y + 15, 1, s2 < (levelStars[k] || 0));
    // selected stage: a PLAY pill (a second tap on the badge launches it)
    if (sel) {
      const pw2 = 34, px2 = Math.round(pt.x - pw2/2);
      plate3D(px2, pt.y + 20, pw2, 9, playA(.8 + .12*Math.sin(tick*.1)));
      txt('PLAY', pt.x, pt.y + 22, 1, '#08301F', 'center');
    }
  }
  // mascot marks your best height on the winding trail
  if (mp && mp.y > L.viewTop - 6 && mp.y < L.viewBot + 6) drawMascot(mp.x, mp.y + 2);
  // header
  ctx.fillStyle = 'rgba(11,14,26,0.72)'; ctx.fillRect(0, 0, W, MAP_HEAD);
  ctx.fillStyle = 'rgba(255,246,232,0.12)'; ctx.fillRect(0, MAP_HEAD, W, 1);
  txt('SKY MAP', W/2+1, 6, 2, 'rgba(0,0,0,0.5)', 'center');
  txt('SKY MAP', W/2, 5, 2, '#FFF6E8', 'center');
  txt('CHOOSE YOUR PATH', W/2, 22, 1, '#FFD75E', 'center');
  ctx.fillStyle = 'rgba(255,246,232,0.14)'; ctx.fillRect(W-18, 6, 13, 13);   // close box
  txt('X', W-12, 8, 1, 'rgba(255,246,232,0.85)', 'center');
  // slim scrollbar on the right edge
  if (mapScrollMax > 0) {
    const trackH = L.viewBot - L.viewTop;
    const thumbH = Math.max(14, Math.round(trackH * trackH / (trackH + mapScrollMax)));
    const thumbY = Math.round(L.viewTop + (1 - mapScroll / mapScrollMax) * (trackH - thumbH));
    ctx.fillStyle = 'rgba(255,246,232,0.1)'; ctx.fillRect(W - 3, L.viewTop, 2, trackH);
    ctx.fillStyle = 'rgba(255,246,232,0.4)'; ctx.fillRect(W - 3, thumbY, 2, thumbH);
  }
}

// ---------- shared 3D UI helpers ----------
// raised plate: drop shadow + lit top edge + shaded bottom edge (+ accent spine)
function plate3D(x, y, w, h, fill, accent) {
  ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fillRect(x+1, y+h, w, 2);
  ctx.fillStyle = fill; ctx.fillRect(x, y, w, h);
  ctx.fillStyle = 'rgba(255,255,255,0.22)'; ctx.fillRect(x, y, w, 1);
  ctx.fillStyle = 'rgba(0,0,0,0.28)'; ctx.fillRect(x, y+h-1, w, 1);

}
// 7x7 five-point pixel star at integer scale s, centered on (x, y)
function drawStarPix(x, y, s, filled) {
  ctx.fillStyle = filled ? '#FFD75E' : 'rgba(255,246,232,0.18)';
  const px = (dx, dy, w2, h2) => ctx.fillRect(x + dx*s, y + dy*s, w2*s, h2*s);
  px(0,-3,1,1); px(-1,-2,3,1); px(-3,-1,7,1); px(-2,0,5,1); px(-1,1,3,1); px(-2,2,1,1); px(2,2,1,1);
  if (filled) { ctx.fillStyle = '#FFF6E8'; ctx.fillRect(x, y - s, s, s); }   // glint
}

// ---------- level complete / level failed ----------
function drawStageDecoScaled(i, x, y, s) {

}
function renderLevelWin() {
  const t = TIERS[runLevel], num = runLevel + 1;

    const sky = skyColor(from + (1 - y2/H) * (goal - from));
    ctx.fillStyle = 'rgb('+sky[0]+','+sky[1]+','+sky[2]+')'; ctx.fillRect(0, y2, W, 3);
  }
  ctx.fillStyle = 'rgba(11,14,26,0.55)'; ctx.fillRect(0, 0, W, H);   // veil so the text pops
  // altitude stars twinkle in for the high stages
  for (let i = 0; i < 34; i++) {
    const sx2 = (i*67 + 13) % W, sy2 = (i*131 + 7) % H;
    const a = clamp((from + (1 - sy2/H)*(goal - from) - 110) / 160, 0, 1);
    if (a <= 0) continue;
    ctx.globalAlpha = a * (.25 + .5*(.5 + .5*Math.sin(winT*.05 + i)));

  }

  if (!reduceMotion) for (let f = 0; f < 3; f++) {

      const fx = (f*73 + 31) % (W - 40) + 20, fy = 16 + (f*47) % Math.round(H*.22);

      }
      ctx.globalAlpha = 1;
    }
  }
  // confetti rains in the stage's own colors
  if (!reduceMotion) for (let i = 0; i < 36; i++) {
    const cx2 = (i*61 + 17) % W;
    const cy2 = ((winT * (1.1 + (i%4)*.35) + i*47) % (H + 20)) - 10;
    ctx.globalAlpha = .5 + .4*Math.sin(winT*.2 + i);

  txt(t.name, W/2+1, topY + 12, 2, 'rgba(0,0,0,0.5)', 'center');
  txt(t.name, W/2, topY + 11, 2, t.c, 'center');
  if (winT > 8) {   // COMPLETE! stamps in with a two-frame pop
    const sc = winT < 14 ? 3 : 2;
    txt('COMPLETE!', W/2+1, topY + 33, sc, 'rgba(0,0,0,0.5)', 'center');
    txt('COMPLETE!', W/2, topY + 32, sc, '#FFF6E8', 'center');
  }
  const starY = Math.round(H*.36);
  // the stage's own emblem, big on a soft glow — when the screen has room for it
  const gap = starY - (topY + 50);
  if (gap > 30 && winT > 16) {
    const ey = topY + 48 + Math.round((gap - 10) / 2), es = gap > 44 ? 3 : 2;
    ctx.fillStyle = t.c;
    ctx.globalAlpha = .1; ctx.fillRect(W/2 - es*9, ey - es*9, es*18, es*18);
    ctx.globalAlpha = .16; ctx.fillRect(W/2 - es*7, ey - es*7, es*14, es*14);
    ctx.globalAlpha = 1;
    drawStageDecoScaled(runLevel, W/2, ey, es);
  }
  // stars pop one by one
  for (let k = 0; k < 3; k++) {
    const at = 24 + k*12, on = k < winStars && winT > at;
    const pop = on && winT < at + 6;
    drawStarPix(W/2 + (k-1)*30, starY, pop ? 4 : 3, on);
  }
  // a 3-star clear earns blinking glitter around the row
  if (winStars === 3 && winT > 62 && !reduceMotion && Math.floor(winT/9) % 2 === 0) {
    ctx.fillStyle = '#FFD75E';
    ctx.fillRect(W/2 - 48, starY - 6, 2, 2); ctx.fillRect(W/2 + 46, starY + 2, 2, 2);
    ctx.fillRect(W/2 - 40, starY + 8, 1, 1); ctx.fillRect(W/2 + 40, starY - 8, 1, 1);
  }
  const placed = Math.max(1, blocks.length - runLaunch);
  txt('PERFECTS ' + runPerfects + '/' + placed, W/2, starY + 18, 1, 'rgba(255,246,232,0.55)', 'center');
  if (winT > 48) {   // reward counts up
    const shown = Math.min(winReward, Math.floor((winT - 48) * 1.5));
    drawCoin(W/2 - 20, starY + 31);
    txt('+' + shown, W/2 - 9, starY + 31, 1, '#FFD75E', 'left');
    if (winFirst) txt(prog === TIERS.length ? 'SKY CONQUERED!' : 'NEW STAGE UNLOCKED!', W/2, starY + 44, 1, '#62E8B5', 'center');
  }
  if (winT > 24) {
    const last = runLevel + 1 >= TIERS.length;
    const labels = { next: last ? 'BACK TO MAP' : 'NEXT LEVEL', retry: 'RETRY', map: 'SKY MAP' };
    for (const rw of WIN_ROWS) {
      const main = rw.id === 'next';
      plate3D(rw.x, rw.y, rw.w, rw.h, main ? playA(.85) : 'rgba(255,246,232,0.12)', main ? null : t.c);
      txt(labels[rw.id], W/2, rw.y + 7, 1, main ? '#08301F' : '#FFF6E8', 'center');
    }
    // the mascot celebrates on a mini tower below the buttons when there's room
    const btnBot = WIN_ROWS[2].y + WIN_ROWS[2].h;
    if (H - btnBot > 44) {
      const my = H - 12;
      for (let k = 0; k < 2; k++) { ctx.fillStyle = k ? t.c : dkHex(t.c, .7); ctx.fillRect(W/2 - 13, my - 7*(k+1), 26, 7); }
      const hop = reduceMotion ? 0 : Math.round(Math.abs(Math.sin(winT*.09))*4);
      drawMascot(W/2, my - 14 - hop);
    }
  }
}
function renderLevelFail() {
  const t = TIERS[runLevel], num = runLevel + 1;
  ctx.fillStyle = 'rgba(11,14,26,0.74)'; ctx.fillRect(0, 0, W, H);
  const goal = TIERS[runLevel].n, from = runLaunch;
  const pct = clamp((blocks.length - from) / (goal - from), 0, 1);
  const topY = Math.round(H*.14);
  txt('LEVEL ' + num + ' - ' + t.name, W/2, topY, 1, 'rgba(255,246,232,0.7)', 'center');
  const head = overCause === 'quit' ? 'RUN ENDED' : pct >= .6 ? 'SO CLOSE!' : 'TOPPLED!';
  txt(head, W/2+1, topY + 13, 2, 'rgba(0,0,0,0.5)', 'center');
  txt(head, W/2, topY + 12, 2, pct >= .6 ? '#FFD75E' : '#FF7E6B', 'center');
  // progress bar toward the goal
  const bw = Math.min(W - 60, 180), bx = Math.round(W/2 - bw/2), by = Math.round(H*.33);
  const fillW = Math.round(bw * pct * Math.min(1, failT/30));
  plate3D(bx, by, bw, 8, 'rgba(0,0,0,0.5)');
  ctx.fillStyle = t.c; ctx.fillRect(bx, by + 1, fillW, 6);
  txt('REACHED ' + blocks.length*METERS_PER + 'M / ' + goal*METERS_PER + 'M', W/2, by + 14, 1, 'rgba(255,246,232,0.75)', 'center');
  if (runCoins > 0) { drawCoin(W/2 - 16, by + 27); txt('+' + runCoins, W/2 - 5, by + 27, 1, '#FFD75E', 'left'); }
  if (failT > 24) {
    if (reviveOffered) {
      const cost = reviveCost(), ok = coins >= cost;
      const pulse = ok && Math.floor(tick/16)%2 === 0;
      plate3D(FAIL_REV.x, FAIL_REV.y, FAIL_REV.w, FAIL_REV.h,
        ok ? (pulse ? 'rgba(98,232,181,0.95)' : 'rgba(98,232,181,0.8)') : 'rgba(255,246,232,0.10)',
        ok ? null : 'rgba(255,246,232,0.25)');
      drawCoin(W/2 - 30, FAIL_REV.y + 7);
      txt(ok ? 'REVIVE ' + cost : 'NEED ' + cost, W/2 - 20, FAIL_REV.y + 7, 1, ok ? '#08301F' : 'rgba(255,246,232,0.5)', 'left');
      txt('1 REVIVE PER RUN', W/2, FAIL_REV.y - 10, 1, 'rgba(255,246,232,0.45)', 'center');
    }
    const labels = { retry: 'RETRY', map: 'SKY MAP', home: 'HOME' };
    for (const rw of FAIL_ROWS) {
      const main = rw.id === 'retry';
      plate3D(rw.x, rw.y, rw.w, rw.h, main ? playA(.85) : 'rgba(255,246,232,0.12)', main ? null : 'rgba(255,246,232,0.3)');
      txt(labels[rw.id], W/2, rw.y + 7, 1, main ? '#08301F' : '#FFF6E8', 'center');
    }
  }
}

// ---------- in-run HUD ----------
function renderHUD(h) {
  const shadow = 'rgba(0,0,0,0.35)';
  const m = curMode();
  ctx.fillStyle='rgba(0,0,0,0.25)'; ctx.fillRect(PAUSE_BTN.x-1,PAUSE_BTN.y-1,PAUSE_BTN.w+2,PAUSE_BTN.h+2);
  ctx.fillStyle='#FFF6E8'; ctx.fillRect(PAUSE_BTN.x+3,PAUSE_BTN.y+3,3,8); ctx.fillRect(PAUSE_BTN.x+8,PAUSE_BTN.y+3,3,8);
  drawCoin(22, 7); txt(coins, 31, 7, 1, '#FFD75E', 'left');
  txt(score, W/2+1, 6, 2, shadow, 'center'); txt(score, W/2, 5, 2, '#FFF6E8', 'center');
  if (m.time) { const s = Math.ceil(timeLeft/60); txt(s+'S', W-24, 7, 1, s<=10?(Math.floor(tick/8)%2?'#FF5E7E':'#FFD75E'):'rgba(255,246,232,0.9)', 'right'); }
  txt(h*METERS_PER+'M', W/2, 22, 1, 'rgba(255,246,232,0.8)', 'center');
  if (runLevel >= 0) {   // campaign HUD: the goal + a slim progress bar
    const goal = TIERS[runLevel].n, from = runLaunch;
    txt('LEVEL ' + (runLevel+1) + ' - GOAL ' + goal*METERS_PER + 'M', W/2, 33, 1, TIERS[runLevel].c, 'center');
    const bw = Math.min(W - 80, 120), bx = Math.round(W/2 - bw/2);
    const pct = clamp((h - from) / (goal - from), 0, 1);
    ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fillRect(bx, 43, bw, 3);
    ctx.fillStyle = TIERS[runLevel].c; ctx.fillRect(bx, 43, Math.round(bw*pct), 3);
  }
  if (combo > 1) {
    const lbl = nova ? 'NOVA X' : fever ? 'FEVER X' : combo >= 7 ? 'BLAZING X' : 'COMBO X';
    const col2 = nova ? (Math.floor(tick/4)%2 ? '#FFFFFF' : 'hsl('+((tick*14)%360)+',100%,80%)')
               : fever ? ('hsl('+((tick*8)%360)+',100%,75%)')
               : combo >= 7 ? '#FF9E3D' : (combo>=5?'#FF7E6B':'#FFD75E');
    txt(lbl+combo, W/2, runLevel >= 0 ? 50 : 33, 1, col2, 'center');
  }
  let ix = 4;
  for (let i=0;i<shield;i++) { drawIcon('shield', ix, 20); ix += 10; }
  if (widenNext) { drawIcon('wide', ix, 20); ix += 10; }
  if (slowBlocks > 0) { drawIcon('slow', ix, 20); ix += 10; }
  if (auraBlocks > 0) { drawIcon('aura', ix, 20); ix += 10; }
  if (goldenNext || (slider && slider.golden)) { drawIcon('gold', ix, 20); ix += 10; }
  if (m.fail && m.id!=='zen' && h > 5) {
    const bp = clamp(balance/TOPPLE, -1, 1);
    if (Math.abs(bp) > 0.22) {
      ctx.globalAlpha = Math.min(1, (Math.abs(bp) - 0.22) * 5);
      const bmW=54, bmX=W/2-bmW/2, bmY=44;
      ctx.fillStyle='rgba(0,0,0,0.32)'; ctx.fillRect(bmX-1,bmY-1,bmW+2,5);
      ctx.fillStyle='rgba(255,246,232,0.25)'; ctx.fillRect(bmX+bmW/2, bmY-1, 1, 5);
      const px = bmX + bmW/2 + bp*(bmW/2-1);
      const danger = Math.abs(bp) > 0.72;
      ctx.fillStyle = danger ? (Math.floor(tick/6)%2?'#FF5E7E':'#FFD75E') : '#62E8B5';
      ctx.fillRect(Math.round(px-1), bmY-1, 3, 5);
      ctx.globalAlpha = 1;
      if (danger && Math.floor(tick/10)%2===0) txt('BALANCE!', W/2, 52, 1, '#FF5E7E', 'center');
    }
  }
  if (wind) {
    const env = Math.sin(Math.min(wind.t/wind.dur,1)*Math.PI);
    ctx.globalAlpha = .4 + env*.5;
    txt(wind.dir>0?'WIND >':'< WIND', W/2, 62, 1, '#BFE8FF', 'center');
    ctx.globalAlpha = 1;
  }
  // first-run tutorial hints (one calm strip, bottom third)
  if (tutStep >= 0) {
    const msgs = ['TAP TO DROP THE BLOCK', 'CENTER IT FOR A PERFECT', 'STACK HIGH - DONT TOPPLE'];
    ctx.fillStyle = 'rgba(11,14,26,0.55)'; ctx.fillRect(0, H-84, W, 18);
    ctx.fillStyle = 'rgba(255,215,94,0.5)'; ctx.fillRect(0, H-84, W, 1);
    if (Math.floor(tick/25)%4 !== 3) txt(msgs[tutStep], W/2, H-78, 1, '#FFF6E8', 'center');
  }
  // sound toggle
  ctx.fillStyle='rgba(0,0,0,0.25)'; ctx.fillRect(SND_BTN.x-1,SND_BTN.y-1,SND_BTN.w+2,SND_BTN.h+2);
  ctx.fillStyle = muted ? 'rgba(255,246,232,0.45)' : '#FFF6E8';
  ctx.fillRect(SND_BTN.x+2,SND_BTN.y+5,3,4); ctx.fillRect(SND_BTN.x+5,SND_BTN.y+3,2,8);
  if (!muted) { ctx.fillRect(SND_BTN.x+9,SND_BTN.y+4,1,6); ctx.fillRect(SND_BTN.x+11,SND_BTN.y+2,1,10); }
  else { ctx.fillRect(SND_BTN.x+9,SND_BTN.y+4,1,1); ctx.fillRect(SND_BTN.x+10,SND_BTN.y+5,1,1); ctx.fillRect(SND_BTN.x+11,SND_BTN.y+6,1,2); ctx.fillRect(SND_BTN.x+10,SND_BTN.y+8,1,1); ctx.fillRect(SND_BTN.x+9,SND_BTN.y+9,1,1); }
}

// ---------- game over ----------
const CAUSE_TXT = { miss:'MISSED!', topple:'TOPPLED!', precision:'NOT PERFECT', time:"TIME'S UP", quit:'GAVE UP' };
function renderGameOver() {
  ctx.fillStyle = 'rgba(11,14,26,0.66)'; ctx.fillRect(0, 0, W, H);
  const shadow = 'rgba(0,0,0,0.35)';
  txt('GAME OVER', W/2+1, 27, 2, shadow, 'center');
  txt('GAME OVER', W/2, 26, 2, '#FF5E7E', 'center');
  txt((CAUSE_TXT[overCause] || '') + ' - ' + curMode().name, W/2, 46, 1, 'rgba(255,246,232,0.6)', 'center');
  txt('HEIGHT', W/2, 62, 1, 'rgba(255,246,232,0.7)', 'center');
  txt(blocks.length*METERS_PER+'M', W/2, 73, 2, newHeight?'#62E8B5':'#FFF6E8', 'center');
  if (newHeight && Math.floor(tick/20)%2===0) txt('NEW RECORD!', W/2, 91, 1, '#62E8B5', 'center');
  txt('SCORE '+score+(newBest?' - NEW BEST!':''), W/2, 103, 1, newBest?'#62E8B5':'rgba(255,246,232,0.85)', 'center');
  txt('BEST '+bestBlocksFor(mode)*METERS_PER+'M - '+fmtPts(bestScoreFor(mode))+' PTS', W/2, 114, 1, '#FFD75E', 'center');
  drawCoin(W/2-24, 127); txt('+'+runCoins, W/2-14, 127, 1, '#FFD75E', 'left');
  if (runSettled) txt('+'+xpThisRun+' XP', W/2+12, 127, 1, '#62E8B5', 'left');
  if (maxCombo > 1) txt('MAX COMBO X'+maxCombo, W/2, 141, 1, 'rgba(255,246,232,0.8)', 'center');
  if (reviveOffered) {   // XP/missions settle after the offer — this space is the revive's
    const cost = reviveCost(), ok = coins >= cost;
    const pulse = ok && Math.floor(tick/16)%2 === 0;
    plate3D(REVIVE_BTN.x, REVIVE_BTN.y, REVIVE_BTN.w, REVIVE_BTN.h,
      ok ? (pulse ? 'rgba(98,232,181,0.95)' : 'rgba(98,232,181,0.8)') : 'rgba(255,246,232,0.10)',
      ok ? null : 'rgba(255,246,232,0.25)');
    drawCoin(W/2 - 32, REVIVE_BTN.y + 8);
    txt(ok ? 'REVIVE ' + cost : 'NEED ' + cost, W/2 - 22, REVIVE_BTN.y + 8, 1, ok ? '#08301F' : 'rgba(255,246,232,0.5)', 'left');
    txt('1 REVIVE PER RUN', W/2, REVIVE_BTN.y + 27, 1, 'rgba(255,246,232,0.45)', 'center');
  } else if (runSettled) {
    let y = 156;
    if (levelUpsThisRun > 0) { txt('LEVEL UP! NOW LV '+lvl.level+' +25', W/2, y, 1, '#FFD75E', 'center'); y += 11; }
    for (let i = 0; i < achThisRun.length && i < 2; i++) { txt('ACHIEVEMENT: '+achThisRun[i]+' +25', W/2, y, 1, '#C77EFF', 'center'); y += 11; }
    for (let i = 0; i < completedThisRun.length && i < 2; i++) { txt('* '+completedThisRun[i].text+' +'+completedThisRun[i].reward, W/2, y, 1, '#62E8B5', 'center'); y += 11; }
    if (mode === 'daily') { txt('DAILY STREAK ' + daily.streak, W/2, y, 1, '#FF9E5E', 'center'); y += 11; }
  }
  ctx.fillStyle = 'rgba(94,200,242,0.9)'; ctx.fillRect(SHARE_BTN.x, SHARE_BTN.y, SHARE_BTN.w, SHARE_BTN.h);
  ctx.fillStyle = 'rgba(255,255,255,0.35)'; ctx.fillRect(SHARE_BTN.x, SHARE_BTN.y, SHARE_BTN.w, 1);
  txt('SHARE', W/2, SHARE_BTN.y + 5, 1, '#04222E', 'center');
  if (overLock <= 0 && Math.floor(tick/30)%2===0) txt(reviveOffered ? 'TAP TO SKIP' : 'TAP TO CONTINUE', W/2, H-68, 1, '#FFF6E8', 'center');
}

// ---------- loop ----------
let last = performance.now();
function frame(now) { rafId = 0; let dt=(now-last)/16.667; last=now; if (dt>3) dt=3; if (dt<0) dt=0; update(dt); render(); rafId = requestAnimationFrame(frame); }
blocks = [{ x:(W-BASE_W)/2, w:BASE_W, col:blockCol(0) }];
cameraY = towerTopY()-(H - 100); cameraTarget = cameraY; fadeT = 0;
previewIdx = Math.max(0, SKINS.findIndex(s => s.id === skinId));
booted = true;
render();
kickLoop();
try { if ('serviceWorker' in navigator && location.protocol.indexOf('http') === 0) navigator.serviceWorker.register('sw.js').catch(() => {}); } catch (e) {}
</script>
