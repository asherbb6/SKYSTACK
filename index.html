// Every non-run reward, purchase, refund, and revive uses this exact coin ledger. Run pickups
// still pass through addCoins so event/Character multipliers remain scoped to earned run coins.

function coinAmount(n) { return Math.max(0,Number.isFinite(+n)?Math.floor(+n):0); }
function transactCoins(delta, earned) {
  const n=Number.isFinite(+delta)?Math.trunc(+delta):0;
  if (n<0 && coins < -n) return false;
  coins=Math.max(0,coins+n);
  if (earned && n>0) { stats.coins+=n; store.set('skystack-stats',stats); }
  store.set('skystack-coins',coins);
  return true;
}
function canAfford(cost) { return coins>=coinAmount(cost); }
function unlockQuote(item, ownedIds, balance) {
  if (!item || !item.unlock || !Array.isArray(ownedIds)) return { ok:false, status:'invalid', charged:0 };
  if (ownedIds.indexOf(item.id)!==-1) return { ok:true, status:'owned', charged:0 };
  if (item.unlock.type!=='coins') return { ok:false, status:'locked', charged:0 };
  const cost=coinAmount(item.unlock.cost);
  if ((Number.isFinite(+balance)?Math.max(0,Math.floor(+balance)):coins)<cost) return { ok:false, status:'funds', charged:0 };
  return { ok:true, status:'purchase', charged:cost };
}
function purchaseUnlock(item, ownedIds) {
  const quote=unlockQuote(item,ownedIds,coins);
  if (!quote.ok || quote.status!=='purchase') return quote;
  if (!transactCoins(-quote.charged,false)) return { ok:false, status:'funds', charged:0 };
  ownedIds.push(item.id);
  return { ok:true, status:'purchased', charged:quote.charged };
}

    const now = Math.min(f.x + f.w, top.x + top.w) - Math.max(f.x, top.x);
    if (wouldHave > 1 && now <= 1) f.x = f.x > top.x ? top.x + top.w - 2 : top.x - f.w + 2;
  }
  const oL = Math.max(f.x, top.x), oR = Math.min(f.x + f.w, top.x + top.w), overlap = oR - oL;
  const offset = f.x - top.x;
  const m = activeMode();
  const dda = runContext.assistPolicy === 'adaptive';

  if (overlap <= 1) {
    if (shield > 0 || !m.fail || developerRunActive()) {
      if (shield > 0) shield--;
      if (dda) assist = Math.min(BALANCE_REGISTRY.assist.max, assist + BALANCE_REGISTRY.assist.missStep);   // a total miss: lean in with more help
      combo = 0; fever = false; feverT = 0; nova = false; novaT = 0; setExpr('dizzy', 40);
      let nw = Math.max(top.w * 0.6, 26), nx = clamp(f.x, 0, W - nw);
      if (Math.abs(nx - top.x) > top.w) nx = clamp(top.x + (f.x < top.x ? -8 : 8), 0, W - nw);
      blocks.push({ x: nx, w: nw, col: f.col });
      floaters.push({ text: developerRunActive() ? 'TEST SAVE' : m.fail ? 'SHIELD!' : 'SAVED', x:W/2, y:towerTopY()-BH, vy:-.4, life:1.4, color:'#5EC8F2' });
      for (let i = 0; i < 20; i++) particles.push({ x:nx+nw/2, y:towerTopY()-BH, vx:(Math.random()-.5)*3, vy:(Math.random()-.5)*3, life:1, color:'#5EC8F2' });
      sfx.shield(); shake = Math.max(shake, 3); faller = null; landFx(nw);
      cameraTarget = towerTopY() - (H - 100); state = 'playing'; afterPlace(f, false, nx+nw/2, {perfect:false,cut:false,miss:true,center:nx+nw/2}); spawnSlider(); return;
    }
    if (activeChallenge()&&activeChallenge().failOnImperfect) { setExpr('sad',999); gameOver('precision'); return; }
    debris.push({ x:f.x, y:f.y, w:f.w, h:BH, vx:f.x<top.x?-.6:.6, vy:1.5, rot:0, vr:(Math.random()-.5)*.2, col:f.col });
    setExpr('sad', 999); gameOver('miss'); return;
  }

  // v176: adaptive assist still slows the ORBIT slider and forgives tower balance, but does not
  // expand away the biome's visible lead requirement. Aura and Character precision remain real.
  const perfectWindow=f.orbitV
    ? PERFECT_PX*(auraBlocks>0?2:1)*passiveEffect(runContext,'perfect',1)
    : effPerfect();
  const isPerfect = Math.abs(offset) <= perfectWindow;
  let nx = oL, nw = overlap;
  // v163: the catch recovers a FRACTION of the overhang, never all of it. The old flat 8px grow
  // FULLY refunded any drop within 8px of centre — and the perfect window is only ~3.4px — so every
  // sloppy landing on CLOUD NINE came back to full width and the tower never narrowed (Asher: "makes
  // the level way too easy and basically gives the user a perfect every time"). Now a scrappy landing
  // always costs something; the cloud only SOFTENS the cut, it can't erase it.
  const SOFT_CATCH_FRAC = 0.4;                              // give back 40% of what the cut took...
  const SOFT_CATCH_CAP = 8;                                 // ...capped, so a wild drop isn't hugely rescued
  if (!isPerfect && matAt(tier).soft) {
    const overhang = f.w - nw;                              // width the cut removed
    const grow = Math.min(SOFT_CATCH_CAP, Math.floor(overhang * SOFT_CATCH_FRAC));
    if (grow > 0) {
      // v131 FIX: grow INWARD, over the support. Growing outward (the v128 behaviour) pushed the
      // block's centre further off the tower and INCREASED lean — a "forgiving" mechanic that was
      // quietly killing runs (12/20 simulated ordinary runs died on CLOUD NINE, up from 3/20).
      if (offset > 0) nx -= grow;
      nw += grow;
      if (grow > 1)   // v131: name the mechanic at the moment it acts
        floaters.push({ text:'CAUGHT!', x:nx+nw/2, y:towerTopY()-BH-8, vy:-.45, life:1.1, color:'#BFE8FF' });
    }
  }
  const goldMult = f.golden ? 5 : 1;
  if (isPerfect) {
    nx = top.x; nw = Math.min(f.w, top.w);
    combo++; runPerfects++; maxCombo = Math.max(maxCombo, combo);
    if (dda) assist = Math.max(assistFloor(), assist - BALANCE_REGISTRY.assist.perfectStep);   // you've got this: ease the help back down
    const grow = combo >= 8 ? 8 : combo >= 5 ? 5 : combo >= 3 ? 3 : 1;
    // v132: TREETOPS branches flex. A PERFECT springs the block wider than the biome cap would
    // normally allow — the reward for precision here is reach, so the level's identity is "be exact
    // and the forest gives you room". It is an OUTCOME, so reduceMotion must not suppress it; it also
    // stays centred on the support below, so springing can never add lean.
    const SPRING_PX = 5;
    const spr = matAt(tier).spring ? SPRING_PX : 0;
    const cap = combo >= 5 ? W : BASE_W + spr;
    const preSpring = nw;
    nw = Math.min(nw + grow + spr, cap);
    nx = top.x + (top.w - nw) / 2;
    if (spr && nw > preSpring + grow)   // only when the spring actually bought width
      floaters.push({ text:'SPRING!', x:nx+nw/2, y:towerTopY()-BH-18, vy:-.48, life:1.1, color:'#62E8B5' });
    flashT = 1; sfx.perfect(combo);
    // streak ladder now pays SCORE *and* COINS: x7 BLAZING (2 coins) -> x10 FEVER (x2) -> x15 SUPERNOVA (x3)
    const streakMult = nova ? 3 : fever ? 2 : 1;
    score += adjustedRunScore(runContext,(10 + 5 * combo) * streakMult * goldMult * (m.mult || 1));
    const perfCoins = (combo >= 7 ? 2 : 1) * streakMult;   // v113: the streak multiplier lifts coins too, not just score
    addCoins(perfCoins, W/2, towerTopY()-BH);
    floaters.push({ text:'PERFECT', x:W/2, y:towerTopY()-BH-6, vy:-.4, life:1, color:'#FFD75E' });
    if (combo > 1) floaters.push({ text:'X'+combo, x:W/2, y:towerTopY()-BH+6, vy:-.4, life:1.1, color:'#FFF6E8' });
    if (streakMult > 1) floaters.push({ text:'COINS X'+streakMult, x:W/2, y:towerTopY()-BH+16, vy:-.42, life:1.2, color:'#FFE28A' });
    burst(nx+nw/2, towerTopY()-BH, 14+Math.min(combo,10), f.col, true);
    shake = Math.max(shake, clamp(2 + Math.min(combo,10)*0.22 + (nw/BASE_W - 1)*2, 2, 5));   // v121: weight/combo
    mascot.hop = 1; setExpr(fever || combo >= 5 ? 'wow' : 'happy', 24);
    if (canSpawnPickups(runContext) && combo % 5 === 0) {
      const g = pick(GIFT_POOL);
      runPowerups++;
      applyPower(g, W/2, towerTopY()-BH-16, true);
      floaters.push({ text:'COMBO GIFT', x:W/2, y:towerTopY()-BH-26, vy:-.4, life:1.3, color:'#FFF6E8' });
      sfx.gift();
    }

    if (combo >= 15) {

        floaters.push({ text:'SUPERNOVA!', x:W/2, y:towerTopY()-BH-34, vy:-.5, life:1.8, color:'#FFFFFF' });
        burst(nx+nw/2, towerTopY()-BH, 40, {h:50}, true);
        shake = Math.max(shake, reduceMotion?3:7);
        sfx.supernova(); hapt([40, 30, 60]);
      }
      novaT = 200;
    }
  } else {
    combo = 0; fever = false; feverT = 0; nova = false; novaT = 0;
    if (dda) assist = Math.min(BALANCE_REGISTRY.assist.max, assist + BALANCE_REGISTRY.assist.sloppyStep);   // a sloppy drop: nudge the help up
    score += adjustedRunScore(runContext,10 * goldMult * (m.mult || 1));
    const cutW = f.w - overlap, cutX = offset > 0 ? oR : f.x;
    debris.push({ x:cutX, y:f.y, w:cutW, h:BH, vx:offset>0?.9:-.9, vy:-.4, rot:0, vr:(offset>0?1:-1)*(.06+Math.random()*.08), col:f.col });
    sfx.land(); sfx.slice(); setExpr('normal', 12);
    burst(offset>0?oR:f.x, towerTopY()-BH/2, 8, f.col, false);
    shake = Math.max(shake, clamp(Math.min(cutW*.18, 3.5) + (nw/BASE_W - 1)*1.5, 1.5, 4.5));   // v121: weight
  }
  const dust = reduceMotion ? 0 : Math.round(6 + squashPow * 6);   // v121: heavier landings kick more dust
  for (let k = 0; k < dust; k++) {   // landing dust at the block's feet
    const sideX = (k % 2 ? nx : nx + nw) + (Math.random()-.5)*4;
    particles.push({ x: sideX, y: towerTopY() - 2, vx: (k%2?-1:1)*(.3+Math.random()*.7)*(1+squashPow*.5), vy: -Math.random()*.5*(1+squashPow*.5), life: .55, color: 'rgba(255,246,232,0.75)' });
  }
  if (f.golden) { addCoins(10, nx + nw/2, towerTopY()-BH); floaters.push({ text:'GOLDEN X5', x:W/2, y:towerTopY()-BH-16, vy:-.4, life:1.3, color:'#FFE28A' }); sfx.golden(); }
  if (widenNext) { const grow2 = Math.min(14, BASE_W - nw); if (grow2 > 0) { nx -= grow2/2; nw += grow2; nx = clamp(nx, 0, W - nw); } widenNext = false; }

  // SKYBREAK — block spans the whole sky

    note('SKYBREAK! +50 COINS', '#FFD75E', 1);
    if (!reduceMotion) for (const c of clouds) c.x += (c.x < W/2 ? -1 : 1) * (10 + Math.random()*14);   // v130: the sky parts

    addCoins(50, W/2, towerTopY());
    balance = 0; if (canEarnRewards(runContext)) { stats.skybreaks++; runSkybreaks++; } skybreakT = 1;
    burst(W/2, towerTopY(), 36, f.col, true);
    for (let bx2 = 8; bx2 < W; bx2 += 24) particles.push({ x:bx2, y:towerTopY(), vx:0, vy:-1.6-Math.random(), life:1, color:'#FFD75E' });
    shake = Math.max(shake, reduceMotion ? 3 : 6);
    mascot.hop = 1; setExpr('wow', 40);
    sfx.skybreak(); hapt([30, 30, 60]);
    faller = null; landFx(BASE_W); cameraTarget = towerTopY() - (H - 100); state = 'playing';
    afterPlace(f, false, W/2, {perfect:isPerfect,cut:!isPerfect,miss:false,center:W/2});
    spawnSlider(); return;
  }

  // v128: ICE does not grip — a sloppy landing keeps travelling in the direction it overhung, then
  // locks. Severity reuses the v124 difficulty drift multiplier; the EASY/MEDIUM no-miss guarantee is
  // the same rule v125 established for wind drift. The logical resting x is final immediately; only
  // the DRAWN position animates (see slideT).
  const SLIDE_PX = 24;                                    // v131: 12px still read as noise — Asher could not feel it
  let slid = 0;
  if (!isPerfect && matAt(tier).slide) {
    const lean = offset > 0 ? 1 : -1;                       // the side it overhangs
    const sloppy = Math.min(1, Math.abs(offset) / Math.max(1, top.w * 0.5));
    let want = nx + lean * SLIDE_PX * sloppy * matAt(tier).slide * activeDifficulty().drift;
    if (!activeDifficulty().driftCanMiss) {                 // may cost overlap, never the block
      want = clamp(want, top.x - nw + 2, top.x + top.w - 2);
    }
    want = clamp(want, 0, W - nw);
    slid = want - nx; nx = want;
    if (Math.abs(slid) > 1)   // v131: name the mechanic at the moment it acts
      floaters.push({ text:'SLIP!', x:nx+nw/2, y:towerTopY()-BH-8, vy:-.45, life:1.1, color:'#7EF2C5' });
  }
  blocks.push({ x:nx, w:nw, col:f.col, slid:slid, slideT:slid ? 1 : 0 });
  faller = null; landFx(nw); cameraTarget = towerTopY() - (H - 100); state = 'playing';
  afterPlace(f, true, nx + nw/2, {perfect:isPerfect,cut:!isPerfect,miss:false,center:nx+nw/2});
  if (Math.abs(balance) > toppleLimit()) {                                          // v124: per-difficulty tolerance
    if (m.practice || developerRunActive()) {
      balance *= 0.2; swayX *= 0.2; setExpr('happy', 28);
      floaters.push({ text:developerRunActive()?'TEST STEADY':'STEADIED!', x:W/2, y:towerTopY()-BH-8, vy:-.4, life:1.3, color:'#62E8B5' });
      shake = Math.max(shake, reduceMotion ? 2 : 4); sfx.shield();
    } else { setExpr('dizzy', 999); gameOver('topple'); return; }
  }
  spawnSlider();
}

function afterPlace(f, updateBalance, placedCenter, outcome) {
  const m = activeMode();
  trackStarOutcome(outcome);                        // v126: star objectives ride the existing hook
  if (canEarnRewards(runContext)) stats.blocks++;
  if (updateBalance) { const p=BALANCE_REGISTRY.placement; balance = balance * p.balanceMemory + (placedCenter - W/2) * p.balanceOffset * (1 - assist * BALANCE_REGISTRY.assist.balanceForgiveness) * passiveEffect(runContext,'balance',1) * challengeRule(runContext,'balanceScale',1); }   // assist/passive forgive lean
  const r = blocks.length - 1, b = blocks[r];
  for (const p of pickups) { if (p.got || p.row !== r) continue; if (p.x >= b.x && p.x <= b.x + b.w) collectPickup(p, p.x, towerTopY()); }
  schedulePickups();
  maybeSpawnBalloon();
  const h = blocks.length;
  advanceTutorial(h);
  const placedOutcome=outcome||{perfect:false,cut:false,miss:false,center:placedCenter};
  updateModifiersForPlacement(h,placedOutcome);
  if (updateChallengeForPlacement(placedOutcome)) return;
  if (runLevel >= 0 && h >= levelGoalA(runLevel)) { levelComplete(); return; }   // campaign goal reached
  if (tier < TIERS.length && h >= TIERS[tier].n) {
    let reward = 5 + tier * 3;
    // v151: crossing a BIOME line is a milestone; it only CLEARS A LEVEL when that biome is the last
    // one in its level band (SURFACE now sits mid-level, so passing it must not bank a level).
    const lvOfTier = TIER_LEVEL[tier], endsLevel = LEVEL_BANDS[lvOfTier].t1 === tier;
    let milestoneText='';
    if (runContext.rewardPermissions.progress && endsLevel && lvOfTier + 1 > prog) {
      prog = lvOfTier + 1; store.set('skystack-tiers', prog);
      reward += 15; milestoneText='LEVEL CLEAR: '+levelName(lvOfTier);
      if (prog === LEVEL_COUNT) { milestoneText='SKY CONQUERED!'; reward += 200; }   // beat the game
    }
    if (canEarnRewards(runContext)) {
      addCoins(reward, W/2, 40);
      floaters.push({ text:'+'+reward+' COINS', x:W/2, y:towerTopY()-BH-18, vy:-.35, life:1.4, color:'#FFD75E' });
    }
    burst(W/2, towerTopY()-BH, 24, f.col, true); shake = Math.max(shake, reduceMotion?2:4);
    sfx.milestone(); tier++;
    const intro=startRegionIntro(tier,'area'); // area card owns the transition first; progress/reward follows
    if (milestoneText) note(milestoneText+' +'+reward+' COINS','#FFD75E',1,140,intro?Math.max(0,intro.dur-8):0);
  }
  const bh2 = activeChallenge()?challengeRecord(activeChallenge().id).bestBlocks:bestBlocksFor(runContext.mode);
  if (canWriteRecords(runContext) && h > bh2 && !newHeight && bh2 > 0) {
    newHeight = true;
    floaters.push({ text:'NEW BEST!', x:W/2, y:towerTopY()+2, vy:-.3, life:1.6, color:'#62E8B5' });
    burst(W/2, towerTopY(), 16, f.col, true); shake = Math.max(shake, 3); hapt([15,25,15]);
  }
}

// missions, XP and achievements settle at the end of every run (win or loss)
function settleRun(xpBonus) {
  completedThisRun = [];
  let changed = false;
  for (let i = 0; i < missions.length; i++) {
    const mm = missions[i], def = MDEF[mm.key];
    if (def.achieve() >= mm.target) {
      completedThisRun.push({ text: def.text(mm.target), reward: mm.reward });
      transactCoins(mm.reward,true);
      missions[i] = newMission(missions.map(x => x.key)); changed = true;
    }
  }
  if (completedThisRun.length) sfx.mission();
  if (changed) store.set('skystack-missions', missions);
  // XP + level (only the blocks YOU placed count, not the pre-stack)
  xpThisRun = Math.max(1, Math.round(score / 10) + (blocks.length - runLaunch) + (xpBonus || 0));
  lvl.xp += xpThisRun; levelUpsThisRun = 0;
  while (lvl.xp >= xpNeed()) { lvl.xp -= xpNeed(); lvl.level++; levelUpsThisRun++; transactCoins(ECONOMY_RULES.levelUpReward,true); }
  if (levelUpsThisRun) sfx.levelup();
  store.set('skystack-lv', lvl);
  achThisRun = [];
  for (const a of ACH) {
    if (achDone.indexOf(a.id) === -1 && a.chk()) {
      achDone.push(a.id); achThisRun.push({name:a.name,reward:a.reward});
      transactCoins(a.reward,true);
    }
  }
  if (achThisRun.length) { store.set('skystack-ach', achDone); sfx.unlock(); }
  // adapt the personal skill estimate so the next run's assist fits the player
  const placed = Math.max(0, blocks.length - runLaunch);
  const perf = clamp((Math.min(maxCombo, 12) / 12) * 0.6 + (Math.min(placed, 50) / 50) * 0.4, 0, 1);
  skill += (perf - skill) * 0.2; store.set('skystack-skill', +skill.toFixed(3));
  const charId=runContext.characterSnapshot.id, cm=masteryFor(charId);
  cm.xp+=xpThisRun; cm.runs++; cm.blocks+=placed; cm.perfects+=runPerfects;
  characterMastery[charId]=cm; persistCharacters();
  collectionThisRun=reconcileCollections(true);
  saveStats();
}
// campaign level goal reached mid-run: freeze the run and celebrate
function levelComplete() {
  const i = runLevel;
  const developer=developerRunActive();
  state = 'levelwin'; winT = 0;
  faller = null; slider = null; combo = 0; fever = false; feverT = 0; nova = false; novaT = 0; paused = false; dropPending = 0;
  const O = LEVEL_REGISTRY[i].starObjectives;               // v126: identity objectives, not one ratio
  winStarMet = [true, objectiveMet(O.two, starRun), objectiveMet(O.three, starRun)];
  winStars = winStarMet.reduce((n, m) => n + (m ? 1 : 0), 0);
  winFirst = !developer && i + 1 > prog;
  if (!developer) {
    if (winFirst) { prog = i + 1; store.set('skystack-tiers', prog); }
    recordPastRun(i);   // v152: your real tower becomes the past under the NEXT level
    const starDiff = activeDifficulty().id, SR = recordsFor(starDiff);     // v124: stars are per-difficulty
    if (winStars > (SR.stars[i] || 0)) { SR.stars[i] = winStars; saveRecords(starDiff, SR); }
    winReward = 15 + i * 10 + winStars * 5 + (winFirst ? 25 : 0) + (winFirst && prog === LEVEL_COUNT ? 200 : 0);
    transactCoins(winReward,true);
    stats.games++; stats.maxCombo = Math.max(stats.maxCombo, maxCombo); settleRun(20);
  } else winReward=0;
  runSettled = true; reviveOffered = false;   // wins settle on the spot; DEV wins never persist
  setExpr('happy', 600);
  sfx.win(); hapt([20, 30, 20, 30, 40]);
}
function gameOver(cause) {
  const m = activeMode();
  state = 'gameover'; faller = null; slider = null; combo = 0; fever = false; feverT = 0; nova = false; novaT = 0; paused = false; dropPending = 0;
  overCause = cause || 'miss';
  shake = reduceMotion ? 2 : (cause === 'topple' ? 8 : 6); overLock = 40; goT = 0;
  if (cause === 'topple') { sfx.topple();
    const dir = balance > 0 ? 1 : -1, calm = reduceMotion; let hidden = 0;   // v121: the WHOLE visible tower comes apart
    for (let i = blocks.length - 1; i >= 0; i--) {
      const sy = GROUND_Y - (i+1)*BH - cameraY;       // block i on screen?
      if (sy > H) break;                              // gone below the screen — everything under is too
      const b = blocks[i], fromTop = (blocks.length - 1) - i;
      const pop = Math.max(0, 1.4 - fromTop*0.08);    // the blocks near the break fly out hardest
      debris.push({ x:b.x, y:GROUND_Y-(i+1)*BH, w:b.w, h:BH,
        vx: dir*(0.6 + pop) + (Math.random()-.5)*0.7,
        vy: -(1.0 + Math.random()*1.6) - Math.max(0, 0.8 - fromTop*0.05),
        rot:0, vr: dir*(0.06 + Math.random()*0.10) * (calm?0.4:1), col:b.col });
      hidden++;
      if (calm && hidden >= 6) break;                 // reduceMotion: only the top ~6 tumble
    }
    toppleHideTop = hidden; }
  else if (cause==='challenge') sfx.win(); else sfx.over();
  if (canEarnRewards(runContext)) stats.maxCombo = Math.max(stats.maxCombo, maxCombo);
  if (canWriteRecords(runContext)) {
    const c=activeChallenge();
    if (c) recordChallengeOutcome();
    if (!c||c.id==='time60') {
      const dId = activeDifficulty().id, R = recordsFor(dId);            // v124: records are per-difficulty
      if (score > R.best) { R.best = score; newBest = true; }
      if (blocks.length > R.height) R.height = blocks.length;
      const rec = R.modes[runContext.mode] || { blocks: 0, score: 0 };
      if (blocks.length > rec.blocks) rec.blocks = blocks.length;
      if (score > (rec.score || 0)) { rec.score = score; newBest = true; }
      R.modes[runContext.mode] = rec; saveRecords(dId, R);
    }
  }
  if (runContext.mode === 'daily') {
    const t = dayStr(0);
    if (daily.lastPlayed !== t) {
      daily.streak = (daily.lastPlayed === dayStr(-1)) ? daily.streak + 1 : 1;
      daily.lastPlayed = t; daily.best = blocks.length;
    } else if (blocks.length > daily.best) { daily.best = blocks.length; }
    stats.streakBest = Math.max(stats.streakBest, daily.streak);
    store.set('skystack-daily', daily);
  }
  reviveOffered = canOfferRevive();
  if (!reviveOffered) finalizeRun();          // no second chance: settle now, show full results
  if (runLevel >= 0) { state = 'levelfail'; failT = 0; }    // campaign attempts get their own screen
}
// ---------- revive: one per run, paid in coins (button becomes WATCH AD TO REVIVE later) ----------
function reviveCost() { return adjustedReviveCost(runContext,25 + Math.min(tier, TIERS.length) * 5); }   // deeper runs pay more
function canOfferRevive() {
  return !developerRunActive() && !reviveUsed && !!(PERMISSION_REGISTRY[runContext.mode] && PERMISSION_REGISTRY[runContext.mode].revive) && overCause !== 'quit' && overCause !== 'time';
}
function finalizeRun() {   // the run is truly over: count the game and settle XP/missions once
  if (runSettled) return;
  runSettled = true; reviveOffered = false;
  if (!canEarnRewards(runContext)) return;
  stats.games++;
  settleRun(0);
}
function doRevive() {
  if (!reviveOffered || coins < reviveCost()) { sfx.deny(); return; }
  transactCoins(-reviveCost(),false);
  reviveUsed = true; reviveOffered = false;
  debris = []; balance = 0; swayX = 0; wind = null; windTimer = BALANCE_REGISTRY.wind.firstDelayFrames; toppleHideTop = 0; squashPow = 0;   // scrub the death state

function drawSurfaceGround(ph, yCeil) {
  const { cxL, cxR } = caveMouth();
  for (const seg of [[0, cxL], [cxR, W]]) {
    const x0 = seg[0], x1 = seg[1];
    ctx.globalAlpha = 1;
    // v101: the forest floor redrawn on the half-pixel fine grid — same layout/palette, every
    // element gains a lit side and a shaded side (dirt strata, two-tone blades, chamfered stones,
    // stemmed ferns, petaled flowers, gilled mushrooms)
    ctx.fillStyle = '#5A3F2A'; ctx.fillRect(x0, yCeil, x1 - x0, 7);                            // dirt lip
    ctx.fillStyle = '#4A3320'; ctx.fillRect(x0, yCeil + 2.5, x1 - x0, .5);                     // buried strata seam
    ctx.fillStyle = '#3A2818'; ctx.fillRect(x0, yCeil + 5, x1 - x0, 2);
    ctx.fillStyle = '#6B4A30';                                                                 // pebble specks in the topsoil
    for (let dx = x0 + 2; dx < x1 - 2; dx += 9) { if (bhash(dx*23) < .5) continue; ctx.fillRect(dx, yCeil + 1 + bhash(dx*3)*3, 1, .5); }
    ctx.fillStyle = '#2E1E10';                                                                 // root threads reach into the dark band
    for (let dx = x0 + 5; dx < x1 - 2; dx += 13) { if (bhash(dx*37) < .55) continue; ctx.fillRect(dx, yCeil + 4.5, .5, 2); }
    ctx.fillStyle = '#3E8A32'; ctx.fillRect(x0, yCeil - 2, x1 - x0, 3);                        // grass base
    ctx.fillStyle = '#2E6E3A'; ctx.fillRect(x0, yCeil + .5, x1 - x0, .5);                      // grass roots shade into the dirt
    for (let gx = x0; gx < x1; gx += 3) { const gv = bhash(gx*7), gh = 2 + Math.round(gv*3), sw = reduceMotion ? 0 : Math.round(Math.sin(ph*0.05 + gx)*0.6);
      // v102: bolder blades — mixed greens, full-pixel bright tips, and every fourth-ish blade
      // grows a taller companion so the silhouette varies instead of reading as an even comb
      ctx.fillStyle = gv > .55 ? '#4EA344' : '#3E8A32'; ctx.fillRect(gx + sw, yCeil - 2 - gh, 1, gh);   // blade body
      ctx.fillStyle = '#8EE87A'; ctx.fillRect(gx + sw, yCeil - 2 - gh, 1, 1);                  // sunlit tip
      if (bhash(gx*13) > .72) { const th2 = gh + 2;
        ctx.fillStyle = '#4EA344'; ctx.fillRect(gx + sw + 1, yCeil - 2 - th2, 1, th2);
        ctx.fillStyle = '#8EE87A'; ctx.fillRect(gx + sw + 1, yCeil - 2 - th2, 1, 1); } }       // taller companion blade
    for (let sx = x0 + 7; sx < x1 - 4; sx += 24) {                                             // small stones/moss stay outside the tower opening
      if (bhash(sx*19) < .42) continue;
      ctx.fillStyle = '#45433D'; ctx.fillRect(sx - 2, yCeil - 5, 7, 4); ctx.fillStyle = '#6E6B62'; ctx.fillRect(sx - 1, yCeil - 6, 4, 1);
      ctx.fillStyle = '#8A867A'; ctx.fillRect(sx - .5, yCeil - 6, 2, .5);                      // chamfered sun-catch on the crown
      ctx.fillStyle = '#2C2A26'; ctx.fillRect(sx - 2, yCeil - 1.5, 7, .5);                     // seated shadow at the grass line
      if (bhash(sx*29) > .62) { ctx.fillStyle = '#3B5A27'; ctx.fillRect(sx, yCeil - 7, 4, 2); ctx.fillStyle = '#5D7A38'; ctx.fillRect(sx + 1, yCeil - 8, 2, 1);
        ctx.fillStyle = '#7A9A4A'; ctx.fillRect(sx + 1.5, yCeil - 8, 1, .5); }                 // moss highlight
    }
    for (let fx = x0 + 5; fx < x1 - 7; fx += 17) {                                             // ferns arc out of the grass
      const r = bhash(fx*13); if (r < .5) continue;
      const fh = 4 + Math.round(r*4), sw = reduceMotion ? 0 : Math.sin(ph*0.04 + fx)*0.9;
      ctx.fillStyle = '#255C30'; ctx.fillRect(fx, yCeil - 3 - fh, 1, fh);                      // centre stem
      ctx.fillStyle = '#2E6E3A';
      for (let s2 = 0; s2 < fh; s2++) { const lean = s2*0.55 + sw*s2/fh;
        ctx.fillRect(Math.round(fx + lean), yCeil - 3 - s2, 1, 1); ctx.fillRect(Math.round(fx - lean), yCeil - 3 - s2, 1, 1); }
      ctx.fillStyle = '#49A048';                                                               // paired lit leaflet tips at the arc ends
      const tipL = fh*0.55 + sw; ctx.fillRect(Math.round(fx + tipL), yCeil - 3 - fh + 1, .5, .5); ctx.fillRect(Math.round(fx - tipL), yCeil - 3 - fh + 1, .5, .5);
    }
    for (let px2 = x0 + 10; px2 < x1 - 4; px2 += 21) {                                         // wildflowers on thin stems
      const r = bhash(px2*31); if (r < .45) continue;
      ctx.fillStyle = '#3E8A32'; ctx.fillRect(px2, yCeil - 6, 1, 4);
      ctx.fillStyle = '#2E6E3A'; ctx.fillRect(px2 + .5, yCeil - 4.5, 1.5, .5);                 // stem leaf
      const pet = r > .8 ? '#FF9ED2' : r > .62 ? '#FFD75E' : '#FFF6E8';
      ctx.fillStyle = pet;                                                                     // petal cross instead of a solid lump
      ctx.fillRect(px2 - 1, yCeil - 8, 3, 2); ctx.fillRect(px2, yCeil - 9, 1, 1); ctx.fillRect(px2, yCeil - 6.5, 1, .5);
      ctx.fillStyle = r > .8 ? '#B5432E' : '#C98A3E'; ctx.fillRect(px2, yCeil - 7.5, 1, 1);    // flower centre
      ctx.fillStyle = 'rgba(255,255,255,0.6)'; ctx.fillRect(px2 - 1, yCeil - 8, 1, .5);        // petal sun-catch
    }
    for (let mx = x0 + 15; mx < x1 - 5; mx += 37) {                                            // small red-cap mushrooms in the shade
      if (bhash(mx*43) < .55) continue;
      ctx.fillStyle = '#E8E0D0'; ctx.fillRect(mx, yCeil - 3, 1, 2);
      ctx.fillStyle = '#C8BEA8'; ctx.fillRect(mx + .5, yCeil - 3, .5, 2);                      // stalk shade side
      ctx.fillStyle = '#B5432E'; ctx.fillRect(mx - 1, yCeil - 5, 3, 2);
      ctx.fillStyle = '#D86A4A'; ctx.fillRect(mx - 1, yCeil - 5, 3, .5);                       // cap rim light
      ctx.fillStyle = '#8A2E1E'; ctx.fillRect(mx - 1, yCeil - 3.5, 3, .5);                     // gill line under the cap
      ctx.fillStyle = '#FFF6E8'; ctx.fillRect(mx, yCeil - 5, 1, 1);
    }
    if (x1 - x0 > 26) {                                                                        // a leafy bush hugs the outer side of each lip
      const bx = x0 === 0 ? x0 + 12 : x1 - 13, br = 6 + Math.round(bhash(bx*17)*3);
      foliageBlob(bx, yCeil - 4, br, 1); foliageBlob(bx - 5, yCeil - 2, br*0.7, 1); foliageBlob(bx + 5, yCeil - 2, br*0.7, 1);
    }
  }
  // v135: the hole edges used to be a dead VERTICAL CUT of grass+dirt. Each corner now wears a
  // rounded dirt shoulder — a small staircase of soil stepping down into the shaft — with grass
  // blades bending over the lip and a root thread, so the surface WRAPS into the entrance.
  for (const edge of [[cxL, 1], [cxR, -1]]) {
    const ex = edge[0], dir = edge[1];                                                         // dir points INTO the hole
    for (let s = 0; s < 4; s++) {                                                              // descending soil steps, shrinking into the shaft
      const sw2 = 6 - s + (bhash(ex*7 + s*13) > 0.5 ? 1 : 0), sy = yCeil + 4 + s*3;
      const sx2 = dir > 0 ? ex - 3 : ex + 3 - sw2;
      ctx.fillStyle = s < 2 ? '#4A3320' : '#3A2818'; ctx.fillRect(sx2 + dir*s, sy, sw2, 3);
      ctx.fillStyle = 'rgba(0,0,0,0.35)'; ctx.fillRect(sx2 + dir*s, sy + 2.5, sw2, .5);        // AO under each step
      ctx.fillStyle = '#6B4A30'; ctx.fillRect(sx2 + dir*s + (dir > 0 ? 0 : sw2 - 1), sy, 1, .5); // lit outer crumb
    }
    ctx.fillStyle = '#2E1E10'; ctx.fillRect(ex + dir*2, yCeil + 7, 1, 6 + Math.round(bhash(ex*11)*5)); // root thread down the shaft side
    for (let g2 = 0; g2 < 3; g2++) {                                                           // grass bending over the corner, tips hanging into the hole
      const gx2 = ex - dir*(1 + g2*2), hang = 3 + Math.round(bhash(ex*3 + g2*17)*3);
      ctx.fillStyle = g2 & 1 ? '#4EA344' : '#3E8A32';
      ctx.fillRect(gx2, yCeil - 2, 1, 2); ctx.fillRect(gx2 + dir, yCeil, 1, hang);             // blade folds at the lip and drapes down
      ctx.fillStyle = '#8EE87A'; ctx.fillRect(gx2 + dir, yCeil + hang, 1, 1);                  // sunlit hanging tip
    }
  }
  ctx.globalAlpha = 1;
}

// deterministic instances rooted at the surface. Trees top out ~TREETOPS(22).
// Fixed screen-X (the world never pans X). The forest is the only rooted structure set.
// v150: three SPECIES, not four copies of one tree — four identical trees is what read as
// "procedural". Species changes the silhouette (trunk width, branch spacing, crown size) and the
// BARK TREATMENT, so they read apart at a glance even at phone scale.
const TREE_SPECIES = {
  oak:   { wMul:1,    pMul:1,    brMul:1,    crown:18, side:15, mid:12, bark:'nick', body:'#3A2616', lit:'rgba(96,66,36,0.55)',    shade:'rgba(0,0,0,0.32)',     fleck:'rgba(150,108,64,0.55)' },
  birch: { wMul:0.70, pMul:1.55, brMul:0.78, crown:13, side:10, mid:8,  bark:'dash', body:'#C9C2AE', lit:'rgba(255,250,238,0.55)', shade:'rgba(96,92,78,0.35)',  fleck:'rgba(255,252,240,0.5)'  },
  bushy: { wMul:1.28, pMul:0.60, brMul:1.18, crown:20, side:16, mid:14, bark:'nick', body:'#42301C', lit:'rgba(112,80,46,0.55)',   shade:'rgba(0,0,0,0.34)',     fleck:'rgba(160,116,70,0.55)' }
};
const TREES = [
  { x:0.085, topA:57, s:1.05, kind:'oak'   }, { x:0.245, topA:47, s:0.82, kind:'birch' },
  { x:0.66,  topA:60, s:1.15, kind:'oak'   }, { x:0.93,  topA:50, s:0.95, kind:'bushy' }
];
// one whole tree rooted at the surface: tapering trunk + branches carrying connected canopy, top at topA
function rootedTree(t, seed) {
  const baseY = worldY(SURF_A), topY = worldY(t.topA);
  if (topY > H || baseY < 0) return;
  const sp = TREE_SPECIES[t.kind] || TREE_SPECIES.oak;                                         // v150: species drives silhouette + bark treatment
  const sway = treeBend(t.x), xs = Math.round(W * t.x), x = Math.round(W * t.x + sway);   // v155: gusts travel across the forest
  const w = Math.max(5, Math.round(9 * t.s * sp.wMul)), trunkTop = Math.max(topY + 6, -20), y1 = Math.min(baseY, H + 2);
  ctx.globalAlpha = 1;
  // v149: the trunk is not a ruled rectangle — it TAPERS toward the crown and its edges wander a
  // pixel, so the silhouette reads as wood rather than a post. Drawn in short world-anchored bands.
  const widthAt = d => Math.max(4, Math.round(w * (0.62 + 0.38 * clamp(d / Math.max(1, baseY - topY), 0, 1))));
  const leanAt  = d => Math.round(Math.sin(d*0.035 + seed)*1.2);                               // slow organic lean, same every frame at the same world height
  for (let yy = Math.max(trunkTop, -4); yy < y1; yy += 2) {
    const d = baseY - yy, tw = widthAt(d), tx = x + leanAt(d) + ((w - tw) >> 1), hh = Math.min(2, y1 - yy);
    ctx.fillStyle = sp.body;  ctx.fillRect(tx, yy, tw, hh);                                    // trunk body
    ctx.fillStyle = sp.lit;   ctx.fillRect(tx + tw - 2, yy, 2, hh);                            // lit right edge
    ctx.fillStyle = sp.shade; ctx.fillRect(tx, yy, 2, hh);                                     // shadow left edge
  }
  // v101/v102: fine-grid bark — short nicks alternate sides down the trunk so the wood reads
  // grained (v102 doubled the density and contrast; each nick carries a lit ridge underneath)
  // v149 BARK ANCHORING FIX (Asher: "make sure the bark of the trees dont move up or down"): the
  // nick rows used to start at `trunkTop`, which CLAMPS to -20 once the crown is off-screen — so the
  // whole grain slid along the trunk while climbing — and they hashed on the SWAYING screen x, so
  // they also re-rolled every frame. Every nick is now placed by its distance DOWN FROM THE ROOT
  // (a world constant) and seeded by the tree's FIXED x. Never reintroduce a screen-y bark seed.
  for (let d = 6; d < baseY - trunkTop; d += 7) {
    const ny = baseY - d; if (ny < -6 || ny > H + 6) continue;
    const nk = bhash(d*13 + xs*7 + seed); if (nk < .2) continue;
    const tw = widthAt(d), tx = x + leanAt(d) + ((w - tw) >> 1);
    if (sp.bark === 'dash') {                                                                  // BIRCH: dark horizontal lenticel dashes across pale bark, not nicks
      const dw = Math.max(2, Math.round(tw * (0.35 + nk*0.45))), dx0 = tx + Math.round((tw - dw) * nk);
      ctx.fillStyle = 'rgba(38,34,28,0.72)'; ctx.fillRect(dx0, ny + Math.round(nk*3), dw, 1);
      if (nk > .62) { ctx.fillStyle = 'rgba(38,34,28,0.45)'; ctx.fillRect(dx0 + 1, ny + Math.round(nk*3) + 2, Math.max(1, dw - 2), 1); }
      continue;
    }
    const nx = Math.round(((d/7 | 0) & 1) ? tx + 2 + nk*(tw-5) : tx + 1 + nk*(tw-5)), nw = tw > 7 ? 3 : 2;
    ctx.fillStyle = 'rgba(14,7,2,0.75)'; ctx.fillRect(nx, ny + Math.round(nk*4), nw, 1);
    if (nk > .5) { ctx.fillStyle = 'rgba(140,100,60,0.5)'; ctx.fillRect(nx, ny + Math.round(nk*4) + 1, nw - 1, 1); }   // lit ridge under the nick
  }
  ctx.fillStyle = sp.fleck;                                                                    // lit grain flecks near the sun edge
  for (let d = 9; d < baseY - trunkTop; d += 11) { const ny = baseY - d; if (ny < -6 || ny > H + 6) continue;
    if (bhash(d*7 + xs*3 + seed) < .4) continue;
    const tw = widthAt(d); ctx.fillRect(x + leanAt(d) + ((w - tw) >> 1) + tw - 3, ny, 1, 2); }
  const P = Math.max(16, Math.round(34 * t.s * sp.pMul));                                      // birch branches sparsely, the bushy one densely
  for (let by = topY + 10; by < y1; by += P) {                                                 // branch nodes + connected foliage
    if (by < -20 || by > H + 20) continue;
    const nd = Math.round((baseY - by) / P), side = (nd & 1) ? 1 : -1, br = Math.max(6, Math.round(16 * t.s * sp.brMul));
    const tw = widthAt(baseY - by), tx = x + leanAt(baseY - by) + ((w - tw) >> 1);
    const bx0 = side > 0 ? tx + tw - 1 : tx + 1;
    // v149: limbs are not horizontal bars — they RISE and TAPER away from the trunk in short steps,
    // then fork upward at the tip, so the branch reads as grown wood (no rectangles, no circles).
    let lx = bx0, ly = by, th = Math.max(2, Math.round(4 * t.s));
    for (let s2 = 0; s2 < br; s2 += 2) {
      const rise = Math.round(s2 * 0.42), tNow = Math.max(1, th - Math.round(s2 / Math.max(3, br * 0.45)));
      lx = bx0 + side * s2; ly = by - rise;
      ctx.fillStyle = sp.body; ctx.fillRect(side > 0 ? lx : lx - 2, ly, 2, tNow);
      ctx.fillStyle = sp.lit;  ctx.fillRect(side > 0 ? lx : lx - 2, ly, 2, 1);                            // branch top catches light
      ctx.fillStyle = 'rgba(0,0,0,0.4)';     ctx.fillRect(side > 0 ? lx : lx - 2, ly + tNow - 1, 2, 1);   // branch underside shadow
    }
    for (let f2 = 0; f2 < 4; f2++) { ctx.fillStyle = sp.body; ctx.fillRect(lx + (side > 0 ? 0 : -1), ly - f2, 1, 1); }  // twig forking off the tip
    foliageBlob(lx + side * 3, ly - 4, sp.side * t.s, 1, nd*29 + seed*13 + (side > 0 ? 5 : 91));
    foliageBlob(x + (w >> 1), by - 8 * t.s, sp.mid * t.s, 1, nd*17 + seed*7);
  }
  if (topY < H + 20) { foliageBlob(x + (w >> 1), topY + 4, sp.crown * t.s, 1, seed*101 + 3);    // canopy crown at the top
    foliageBlob(x + (w >> 1) - 6, topY + 2, sp.mid * t.s, 1, seed*57 + 19); foliageBlob(x + (w >> 1) + 6, topY + 7, sp.mid * t.s, 1, seed*23 + 61); }
  ctx.globalAlpha = 1;
}

// a small flapping bird — v136: the bat's craft level. Wings beat in two SEGMENTS folding at a
// joint, with feather fingers splaying on the down-beat; the body gains a lighter breast, a tail
// notch, an amber beak and an eye glint. All detail is layered translucently OVER the caller's
// colour, so distant dusk/night silhouettes keep their tone and still read at tiny sizes.
function drawBird(x, y, s, ph, col) {
  x = Math.round(x); y = Math.round(y);
  const tip = Math.round(Math.sin(ph) * 3 * s);                             // wingtip rise/fall
  const jTip = Math.round(tip * 0.45);                                      // the joint leads the tip (folded beat)
  const wl = Math.max(3, Math.round(5 * s)), bw = Math.max(2, Math.round(3 * s));
  const bh2 = Math.max(1, Math.round(2 * s));
  const inner = Math.max(2, Math.round(wl * 0.45)), outer = Math.max(2, wl - inner);
  ctx.fillStyle = col;
  ctx.fillRect(x - 1, y, bw, bh2);                                          // body
  ctx.fillRect(x - 2, y, 1, 1);                                             // tail notch
  ctx.fillRect(x + bw - 1, y - 1, Math.max(1, Math.round(s)), 1);           // head
  for (const dir of [-1, 1]) {                                              // two wings folding at a joint
    const sx = dir < 0 ? x - 1 : x + bw - 1;                                // shoulder
    const ix = dir < 0 ? sx - inner : sx + 1;
    const ox = dir < 0 ? sx - inner - outer : sx + 1 + inner;
    ctx.fillRect(ix, y - jTip, inner, 1);                                   // inner panel
    ctx.fillRect(ox, y - tip, outer, 1);                                    // outer panel
    const jx = dir < 0 ? ix : ix + inner - 1;                               // fold connector at the joint
    ctx.fillRect(jx, Math.min(y - jTip, y - tip), 1, Math.max(1, Math.abs(tip - jTip) + 1));
    if (tip < -1) {                                                         // feather fingers splay on the down-beat
      const fx = dir < 0 ? ox : ox + outer - 1;
      ctx.fillRect(fx, y - tip + 1, 1, 1); ctx.fillRect(fx - dir, y - tip + 1, 1, 1);
    }
  }
  if (s >= 0.7) {
    ctx.fillStyle = 'rgba(255,246,232,0.28)'; ctx.fillRect(x - 1, y + bh2 - 1, bw - 1, 1);   // lighter breast
    ctx.fillStyle = 'rgba(0,0,0,0.28)'; ctx.fillRect(x - 1, y, bw, 1);                        // back shade
    ctx.fillStyle = '#E8A43A'; ctx.fillRect(x + bw - 1 + Math.max(1, Math.round(s)), y - 1, 1, 1);   // beak
    ctx.fillStyle = 'rgba(255,255,255,0.55)'; ctx.fillRect(x + bw - 1, y - 1, 1, 1);          // eye glint
  }
}
// a little bat with angular flapping wings (cave life)
function drawBat(x, y, ph) {
  // v135: a real little animal instead of 13 flat pixels — two-tone webbed wings with a lit bone
  // ridge and scalloped trailing edge, furred body with belly shade, ears, and amber eye glints.
  x = Math.round(x); y = Math.round(y);
  const up = Math.round((Math.sin(ph) * 0.5 + 0.5) * 4);                    // 0 (down-beat) .. 4 (raised)
  const droop = up < 2 ? 1 : 0;                                             // wingtips drop below the body on the down-beat
  for (const dir of [-1, 1]) {                                              // one wing each side, mirrored
    const wx = k => x + 1 + dir * k;                                        // k px out from the shoulder
    ctx.fillStyle = '#221833';                                              // membrane
    ctx.fillRect(Math.min(wx(2), wx(4)), y - up + 1, 3, 2);                 // inner panel
    ctx.fillRect(Math.min(wx(5), wx(7)), y - up + 1 + droop, 3, 2);         // outer panel
    ctx.fillStyle = '#3A2B52';                                              // lit wing bone along the leading edge
    ctx.fillRect(Math.min(wx(2), wx(7)), y - up, 6, 1);
    ctx.fillRect(wx(7), y - up + 1 + droop, 1, 1);                          // wingtip claw
    ctx.fillStyle = '#140E1E';                                              // scalloped trailing edge
    ctx.fillRect(wx(3), y - up + 3, 1, 1); ctx.fillRect(wx(6), y - up + 3 + droop, 1, 1);
  }
  ctx.fillStyle = '#2A1F3A'; ctx.fillRect(x, y - 1, 3, 3);                  // furred body
  ctx.fillStyle = '#140E1E'; ctx.fillRect(x, y + 2, 3, 1);                  // belly shade
  ctx.fillRect(x, y - 2, 1, 1); ctx.fillRect(x + 2, y - 2, 1, 1);           // ears
  ctx.fillStyle = '#3A2B52'; ctx.fillRect(x + 1, y - 1, 1, 1);              // head sheen between the ears
  ctx.fillStyle = '#E0863A'; ctx.fillRect(x, y, 1, 1); ctx.fillRect(x + 2, y, 1, 1);   // amber eye glints
}
// cave creatures — every one physically attached: beetles crawl the wall edges, worms wriggle in
// the bottom dirt, bats swoop in arcs through the open cavern. All anchored to world altitude.
function drawCaveCreatures(cy, ph) {
  const baseW = Math.round(W * 0.17);
  for (const bt of beetles) {                                                                  // beetles pace up/down the inner wall edge
    const by = worldY(bt.a, cy) + Math.round(Math.sin(bt.ph) * 14); if (by < -6 || by > H + 6) continue;
    // v142: crawl ON the rock, not 1px off it in the lane (the v141 anchoring rule, applied to
    // the beetles too — they span a couple of pixels, so a short span keeps them on the face)
    const bedge = caveWallEdgeSpan(bt.side, by - 1, by + 3, GROUND_Y - cy, baseW);
    const bx = bt.side ? bedge + 1 : bedge - 4, leg = reduceMotion ? 0 : ((ph * 0.2 + bt.ph) | 0) & 1;
    const kind = bhash(Math.round(bt.a * 41));                                                 // red / rust / dark shells like the reference
    ctx.globalAlpha = 1; ctx.fillStyle = kind > 0.66 ? '#8A2E1E' : kind > 0.33 ? '#5E3A1A' : '#3A2A20';
    ctx.fillRect(bx, by, 4, 2);
    ctx.fillStyle = 'rgba(255,240,220,0.55)'; ctx.fillRect(bx + 1, by, 1, 1);                  // shine on the shell
    ctx.fillStyle = '#1A0E06'; ctx.fillRect(bt.side ? bx + 4 : bx - 1, by, 1, 1);              // head
    ctx.fillRect(bx - 1 + leg, by + 2, 1, 1); ctx.fillRect(bx + 3 + leg, by + 2, 1, 1);        // legs alternate
  }
  for (const wm of worms) {                                                                    // worms peek from the bottom dirt
    const wy = worldY(wm.a * 0.2, cy); if (wy < -6 || wy > H + 6) continue;
    const seg = reduceMotion ? 0 : Math.sin(wm.ph), wx = Math.round(wm.x);
    ctx.globalAlpha = 1; ctx.fillStyle = '#8A5A62';
    for (let s2 = 0; s2 < 4; s2++) ctx.fillRect(wx + s2, Math.round(wy - 1 - Math.max(0, Math.sin(wm.ph + s2 * 0.9)) * 2), 1, 2);
    ctx.fillStyle = '#B87A82'; ctx.fillRect(wx + (seg > 0 ? 3 : 0), Math.round(wy - 2 - Math.max(0, seg) * 2), 1, 1);   // head lifts
  }
  for (const b of bats) {                                                                      // bats swoop in arcs across the cavern
    const by = worldY(b.a, cy) + Math.round(Math.sin(b.wob) * 12); if (by < -8 || by > H + 8) continue;
    drawBat(b.x, by, b.ph);
  }

// a distant forest wall on the horizon behind the rooted trees — dark canopy silhouettes,
// world-locked to the surface line (1.0x, NO parallax) so the whole world scrolls as one piece
function drawTreeline(cy) {
  const yCeil = worldY(SURF_A, cy);

  ctx.globalAlpha = 1;

  // continuous per-pixel canopy line built from overlapping crown bumps (a broad cosine hump per
  // tree plus a fine bite), so the horizon reads as rounded crowns growing into each other.
  const crownLine = (step, amp, base, salt) => x => {
    const c = Math.floor(x / step), fx = (x - c*step) / step;                                  // position inside this crown
    const h1 = bhash(c*61 + salt), h2 = bhash((c + 1)*61 + salt);

  };

    const hgt = Math.max(2, near(x));

    if (bhash(x*17) > .78) { ctx.fillStyle = '#356030'; ctx.fillRect(x, yCeil - 2 - hgt, 1, 1); }   // v101/v102: sparse sunlit crown tips (full-pixel)
  }

// v150: AERIAL PERSPECTIVE. The forest drew in three depths but in one flat tone, so it read as a
// sticker sheet. A translucent sky-coloured veil now sits BETWEEN the depths — the far treeline gets
// two coats, the background trunks one, the rooted trees none — so distance reads as haze. This is
// TONE, not parallax: the world stays 1.0x world-locked (the v145/v146 anchoring rule). The veil
// covers only the sky side of the surface line, so it never touches the cave.
// GATING MATTERS: the veil must only exist while the FOREST is on screen. An ungated veil paints the
// whole sky at every altitude above the surface line (I shipped that bug into a probe frame — the
// entire upper atmosphere went milky), so it is skipped deep in the cave and FADED OUT as the canopy

function forestVeil(yCeil, a, cy) {

  const forestTop = worldY(HAZE_TOP_A, cy);                                                    // screen-y of the top of the canopy band
  const out = clamp((H - forestTop) / 70, 0, 1); if (out <= 0.01) return;                      // climbed clear of the forest — fade off, no pop
  const bot = Math.min(yCeil < 0 ? H : yCeil, H); if (bot <= 0) return;                        // sky side of the surface line only

// v150: DAPPLED LIGHT — the sun finds gaps in the canopy and lays warm pools on the forest floor.

// ---------- v158: the rest of the SURFACE pass — undergrowth, a landmark, and life ----------
// THE LANE RULE (inherited from v150's dappled light): the surface floor exists only as the two

// A big fallen trunk, mossed over, with bracket fungi and saplings growing out of it. SURFACE had no

function drawFallenLog(ph, yCeil) {

// ---------- v156: LOWER SKY — open air you can read ----------
// The emptiest biome in the game: a sky gradient, the canopy flanks fading out, and a few wisps.
// It gets DEPTH (distant cloud banks at several removes) and LIFE (a flock riding the gusts).
// GATING DISCIPLINE (the v150 lesson): every element here EXISTS ONLY at an altitude inside the
// band and is drawn as a bounded sprite. There is deliberately NO full-width veil anywhere in this
// function — a screen-wide rect is exactly what leaked the forest haze across the whole sky in v150.
// v157: A CLOUD IS NOT A STACK OF DISCS. The first cut built each bank from overlapping pixDiscs
// and it read as bokeh — the identical failure Decision #81 fixed in the foliage. A cumulus is now
// a CONTINUOUS PER-PIXEL SILHOUETTE, the same construction as the v149 treeline: a flat-ish base
// where the air condenses, a lumpy top from two out-of-phase lobes plus a per-column bite, a sunlit
// crown on the top pixel and a cool shaded belly on the bottom one. That top light is what makes it
// read as a solid body of vapour instead of a smudge.
function cloudTopAt(dx, halfW, seed) {
  const t = clamp(dx / halfW, -1, 1);

  const l1 = 0.58 + 0.42 * Math.sin(dx * 0.17 + seed * 2.3);
  const l2 = 0.62 + 0.38 * Math.sin(dx * 0.39 + seed * 5.1 + 1.7);                             // out of phase -> lumpy, not scalloped
  const bite = bhash(Math.round(dx * 0.5) * 131 + Math.round(seed * 17)) * 0.16;
  return Math.max(0, body * (0.55 * l1 + 0.45 * l2) - bite);

// ---------- background & world render ----------
function render() {
  const h = blocks.length;
  const menu = state === 'home' || state === 'shop' || state === 'me' || state === 'splash' || state === 'devmenu';
  const virtualH = menu ? levelStartN(prog) : h;   // v134: menus wear the sky of the chapter you're climbing next (levelStartN self-clamps), not a slow rainbow cycle
  const sky = skyColor(virtualH);
  ctx.fillStyle = 'rgb('+sky[0]+','+sky[1]+','+sky[2]+')'; ctx.fillRect(0,0,W,H);

  // camera stays perfectly centered — no shake offsets

  // as a canvas translate (quantized to 1/RS backing pixels) so the scroll glides instead of
  // ticking one chunky upscaled pixel at a time
  const cy = Math.round(cameraY);
  const cySub = Math.round((cy - cameraY) * RS) / RS;

  // in-game, paint the real atmosphere for this altitude (day → sunset → night → space);
  // `dark` then follows altitude so stars/moon/HUD arrive with the night, not the colour band
  if (!menu) drawBiomeSky(cy, h);

  const bandOff = Math.round((cameraY*.5 % 40) * RS) / RS;

  ctx.globalAlpha = 1;

  if (dark > 0.32) {
    const twSpeed = combo >= 7 ? .12 : .05;          // stars get excited during hot streaks
    for (const st of stars) {
      const sy = ((st.y - (menu?tick*.4:cy*.35)) % (H+20) + H+20) % (H+20) - 10;
      const tw = .5 + .5*Math.sin(tick*twSpeed + st.tw);
      ctx.globalAlpha = Math.min(1,(dark-.32)*2.2) * (.35 + tw*.65);
      ctx.fillStyle = '#FFF6E8'; ctx.fillRect(Math.floor(st.x), Math.floor(sy), st.sz, st.sz);
    }
    ctx.globalAlpha = 1;
  }

    for (let k=0;k<6;k++) ctx.fillRect(Math.floor(shooter.x-shooter.vx*k*1.5), Math.floor(shooter.y-shooter.vy*k*1.5), 2-(k>3?1:0), 2-(k>3?1:0));
    ctx.globalAlpha = 1;
  }
  if (dark > .45 && !menu) {

    if (mA > 0.02) {

      ctx.globalAlpha = mA*.4; pixDisc(mx, my, 12, 'rgba(255,246,216,0.6)');       // soft halo
      ctx.globalAlpha = mA;    pixDisc(mx, my, 8, '#FDF6D8');                        // disc
      ctx.fillStyle = 'rgba(0,0,0,0.10)'; ctx.fillRect(mx-3, my-2, 3, 3); ctx.fillRect(mx+2, my+3, 3, 2); ctx.fillRect(mx-1, my+4, 2, 2);   // craters

      const cx=Math.floor(c.x), cw=Math.floor(c.w), tp=Math.floor(cw*.6), bt=Math.floor(cw*.75);

      ctx.fillRect(cx+4,cyy-3,tp,3); ctx.fillRect(cx+4.5,cyy-3.5,tp-1,1);                // top puff, rounded crown

      ctx.fillRect(cx+2,cyy+5,bt,2.5); ctx.fillRect(cx+3,cyy+7.5,Math.floor(cw*.5),.5);  // base skirt, tapered

// shine that lives ON the letterforms: re-draws the title in white inside narrow
// vertical strips around a sweeping center, so it hugs every pixel of the glyphs
// and eases in/out over its cycle — never a box, never a hard cut-off
function titleShine(str, y, scale) {
  if (reduceMotion) return;
  const tw2 = str.length * 6 * scale, ttx = Math.round(W/2 - tw2/2);
  const phase = (tick % 150) / 150;                  // sweep, then rest
  if (phase >= 0.5) return;
  const p2 = phase / 0.5;
  const cx3 = ttx - 8 + (tw2 + 16) * p2;             // sweep center
  const fade = Math.sin(p2 * Math.PI);               // soft start + finish
  const gh = 7 * scale + 2;                          // glyph height + slack
  for (const band of [[0, .55], [3, .3], [6, .12]]) {
    for (const s2 of [-1, 1]) {
      const bx2 = cx3 + band[0] * s2 - (s2 < 0 ? 3 : 0);
      ctx.save(); ctx.beginPath(); ctx.rect(bx2, y - 1, 3, gh); ctx.clip();
      txt(str, W/2, y, scale, 'rgba(255,255,255,' + (band[1] * fade).toFixed(3) + ')', 'center');
      ctx.restore();
      if (band[0] === 0) break;                      // center band once
    }
  }
}

  const t = reduceMotion ? 999 : tick;

  txt('SKYSTACK', W/2, titleY, 3, '#FFF6E8', 'center');
  if (settled) titleShine('SKYSTACK', titleY, 3);
  const subA = Math.max(0, Math.min(1, (t-30)/18));
  if (subA > 0) {   // sits clear below the scale-3 glyphs (21px tall)

// evenly spaced by altitude so scroll + progress math is unchanged
function skyMapNodes() {
  const viewTop = MAP_HEAD + 4, viewBot = H - 4;   // v118: no footer band — the first card sits ~flush at the very bottom
  const colW = Math.min(W - 8, 300), colX = Math.round((W - colW) / 2);
  const n = LEVEL_COUNT, midX = Math.round(W / 2);
  const contentH = (n + 1) * MAP_ROW;                       // levels + gate — the first card owns the very bottom now
  mapScrollMax = Math.max(0, contentH - (viewBot - viewTop));
  mapScroll = clamp(mapScroll, 0, mapScrollMax);
  const bottomPad = (MAP_CARD_H >> 1) + 4;                  // the first card sits snug at the bottom, fully inside the clip
  const firstY = mapScrollMax > 0                           // CAVES (level 1) at the very bottom; higher tiers stack upward
    ? viewBot - bottomPad + Math.round(mapScroll)

  const pts = [];
  for (let i = 0; i < n; i++) pts.push({ x: midX, y: firstY - i * MAP_ROW });

function openSkyMap() {   // focus the view on the next goal

  const k = Math.min(prog, LEVEL_COUNT);                    // row index of the next goal / gate (first card owns the bottom)
  mapScroll = clamp(k * MAP_ROW - (L.viewBot - L.viewTop) / 2 + MAP_ROW, 0, mapScrollMax);

function mapTapAt(p) {

  const inView = y2 => y2 > L.viewTop - 6 && y2 < L.viewBot + 6;

// v119: real pixel-art biome covers on the sky-map cards (index-aligned to TIERS). The optimized

}
function renderSkyMap() {
  ensureCovers();

  const blocksAt = y2 => {
    const k = (L.start.y - y2) / MAP_ROW;
    if (k <= 0) return 0;

    if (a <= 0) continue;

    ctx.globalAlpha = a * 0.10; ctx.fillStyle = i % 2 ? '#C77EFF' : '#5E8CFF';

  ctx.fillStyle = 'rgba(11,14,26,0.5)'; ctx.fillRect(0, 0, W, H);   // night veil for readability
  // starfield fades in with altitude, parallaxing slower than the trail; a few twinkle in color
  for (let i = 0; i < 60; i++) {
    const sx2 = (i*67 + 13) % W, sy2 = (((i*131 + 7) + mapScroll*0.12) % H + H) % H;
    const a = clamp((blocksAt(sy2) - 90) / 170, 0, 1);

}

// raised plate: drop shadow + lit top edge + shaded bottom edge (+ accent spine)
// v92: two-depth fine keylines and a lit spine edge on the half-pixel grid
function plate3D(x, y, w, h, fill, accent) {

  ctx.fillStyle = 'rgba(0,0,0,0.14)'; ctx.fillRect(x+1.5, y+h+1.5, w-1, .5);

// 7x7 five-point pixel star at integer scale s, centered on (x, y)
// v92: half-pixel silhouette — same envelope, rounder points (axis stays at x+0.5*s)
function drawStarPix(x, y, s, filled) {

  const px = (dx, dy, w2, h2) => ctx.fillRect(x + dx*s, y + dy*s, w2*s, h2*s);

  px(-3,-1,7,.5); px(-2.5,-.5,6,.5); px(-2,0,5,.5); px(-1.5,.5,4,1);
  px(-2,1.5,2,.5); px(1,1.5,2,.5);
  px(-2.5,2,1.5,.5); px(2,2,1.5,.5);
  px(-3,2.5,1,.5); px(3,2.5,1,.5);

  if (!mod) return null;
  const p=modifierRuntime(mod),active=p.status==='active',inN=Math.max(0,mod.startAltitude-h);
  const text=active
    ?fitContextText(mod.name+': '+modifierProgressText(mod,p),modifierProgressText(mod,p),mod.name)
    :fitContextText('BONUS IN '+inN+': '+mod.name,mod.name+' IN '+inN,'BONUS IN '+inN);
  const lane=(mod.family==='gust'||mod.family==='target'||mod.family==='visibility')
    ?modifierLaneBounds(mod,active&&mod.family==='target'):null;
  return {text,accent:active?'#FFD75E':'#BFE8FF',alpha:.92,lane,active};
}
function tutorialHUDInfo(m) {
  if (tutStep<0) return null;
  const lesson=TUT_LESSONS[Math.min(tutStep,TUT_LESSONS.length-1)],pre=m.practice?'PRACTICE ':'';
  return {text:fitContextText(pre+lesson.title+': '+lesson.body,pre+lesson.title+': '+lesson.compact,lesson.compact),accent:'#FFD75E',alpha:.92};
}
function phaseHUDInfo(h) {
  const roman=['I','II','III'];
  let phase=spacePhaseAt(h);
  if (phase&&spaceHazardsEnabled()) return {text:fitContextText('SPACE '+roman[phase.index]+': '+phase.name,phase.name),accent:phase.color,alpha:.86};
  phase=orbitPhaseAt(h);
  if (phase&&orbitCoastEnabled()) {
    const coast=orbitCoastPlan(h,runContext.seed,activeDifficulty(),shield>0),dir=coast.dir>0?'>':'<';
    return {text:fitContextText('ORBIT '+roman[phase.index]+': '+phase.name+' '+dir,'ORBIT '+roman[phase.index]+': COAST '+dir,'COAST '+dir),accent:phase.color,alpha:.86};
  }
  phase=starsPhaseAt(h);
  if (phase&&starsPulseEnabled()) {
    const pulse=starsPulseBoost>0?'FLARE':'PULSE '+Math.max(0,starsPulseTimer/60).toFixed(1)+'S';
    return {text:fitContextText('STARS '+roman[phase.index]+': '+phase.name+' '+pulse,'STARS '+roman[phase.index]+': '+pulse,pulse),accent:phase.color,alpha:.9};
  }
  return null;
}
function contextHUDInfo(h,m,balanceDanger) {
  if (regionIntro||curNote||balanceDanger) return null;
  const modifier=modifierHUDInfo(h);
  if (modifier) return modifier;
  const tutorial=tutorialHUDInfo(m);
  if (tutorial) return tutorial;
  const phase=phaseHUDInfo(h);
  if (phase) return phase;
  if (wind) return {text:wind.dir>0?'WIND >':'< WIND',accent:'#BFE8FF',alpha:.82};
  return null;
}
function renderContextHUD(info) {
  if (!info) return;
  drawNotifyStrip(info.text,info.alpha,info.accent);
  if (info.lane) {
    const y=NOTIFY_Y+16;
    ctx.fillStyle='rgba(255,255,255,0.15)';ctx.fillRect(8,y,W-16,2);
    ctx.fillStyle=info.active?'#62E8B5':'#BFE8FF';ctx.fillRect(Math.round(info.lane.left),y,Math.max(2,Math.round(info.lane.right-info.lane.left)),2);
  }
}
function drawStarsPulseSignal() {
  const phase=starsPhaseAt(blocks.length);
  if (regionIntro||!phase||!starsPulseEnabled()||state!=='playing') return;
  const warning=starsPulseTimer<=phase.warn?clamp(1-starsPulseTimer/phase.warn,0,1):0,
        flash=clamp(starsPulseFlash,0,1);
  if (warning<=0&&flash<=0) return;
  const cx=Math.round(W/2), cy=Math.round(Math.max(108,Math.min(H*.24,150))),
        power=Math.max(warning,flash), radius=Math.round(15+(reduceMotion?0:(1-flash)*10));
  ctx.globalAlpha=.14+.52*power; ctx.fillStyle=phase.color;
  ctx.fillRect(cx-radius,cy-1,radius*2+1,2);ctx.fillRect(cx-1,cy-radius,2,radius*2+1);
  ctx.fillRect(cx-radius+3,cy-radius+3,4,2);ctx.fillRect(cx+radius-6,cy-radius+3,4,2);
  ctx.fillRect(cx-radius+3,cy+radius-5,4,2);ctx.fillRect(cx+radius-6,cy+radius-5,4,2);
  ctx.globalAlpha=.35+.65*power;drawStarPix(cx,cy,Math.max(1,Math.round(1+power)),true);
  ctx.globalAlpha=1;
}
function renderHUD(h) {
  const shadow = 'rgba(0,0,0,0.35)';
  const m = activeMode();
  ctx.fillStyle='rgba(0,0,0,0.25)'; ctx.fillRect(PAUSE_BTN.x-1,PAUSE_BTN.y-1,PAUSE_BTN.w+2,PAUSE_BTN.h+2);
  ctx.fillStyle='#FFF6E8'; ctx.fillRect(PAUSE_BTN.x+3,PAUSE_BTN.y+3,3,8); ctx.fillRect(PAUSE_BTN.x+8,PAUSE_BTN.y+3,3,8);
  const tW=s=>String(s).length*6-1;   // fine-font width at scale 1
  const coinLbl = coins > 9999 ? Math.floor(coins/1000)+'K' : coins > 999 ? (Math.floor(coins/100)/10)+'K' : coins;   // <=4 chars: never reaches a 6-digit score
  drawCoin(22, 7.5); txt(coinLbl, 31, 7, 1, '#FFD75E', 'left');
  txt(score, W/2+1, 6, 2, shadow, 'center'); txt(score, W/2, 5, 2, '#FFF6E8', 'center');
  if (m.time) { const s = Math.ceil(timeLeft/60); txt(s+'S', W-24, 7, 1, s<=10?(Math.floor(tick/8)%2?'#FF5E7E':'#FFD75E'):'rgba(255,246,232,0.9)', 'right'); }
  txt(h*METERS_PER+'M', W/2, 22, 1, 'rgba(255,246,232,0.8)', 'center');
  const challenge=activeChallenge();
  if(challenge){
    const lives=challenge.lives?'LIVES '+(shield+1):'';
    let ct=challenge.name+' - '+challengeProgressText();
    if (Math.round(W/2-tW(ct)/2) < (lives?7+tW(lives)+5:6) || W/2+tW(ct)/2 > W-6) ct=challengeProgressText();   // compact: the persistent objective, never overlapping LIVES or the edges
    txt(ct,W/2,33,1,'#FFD75E','center');
    if(lives)txt(lives,7,33,1,'#62E8B5','left');
  }
  if (runLevel >= 0) {   // campaign HUD: the goal + a slim progress bar
    const goal = levelGoalA(runLevel), from = runLaunch;
    txt('GOAL '+goal*METERS_PER+'M', W/2, 33, 1, levelColor(runLevel), 'center');
    const bw = Math.min(W - 80, 120), bx = Math.round(W/2 - bw/2);
    const pct = clamp((h - from) / (goal - from), 0, 1);
    ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fillRect(bx, 43, bw, 3);
    ctx.fillStyle = levelColor(runLevel); ctx.fillRect(bx, 43, Math.round(bw*pct), 3);
  }
  let ix = 4;
  for (let i=0;i<shield;i++) { drawIcon('shield', ix, 20); ix += 10; }
  if (widenNext) { drawIcon('wide', ix, 20); ix += 10; }
  if (slowBlocks > 0) { drawIcon('slow', ix, 20); ix += 10; }
  if (auraBlocks > 0) { drawIcon('aura', ix, 20); ix += 10; }
  if (goldenNext || (slider && slider.golden)) { drawIcon('gold', ix, 20); ix += 10; }
  let balanceDanger = false;
  if ((m.fail || m.practice) && h > 5) {
    const bp = clamp(balance/toppleLimit(), -1, 1);
    if (Math.abs(bp) > 0.22) {
      ctx.globalAlpha = Math.min(1, (Math.abs(bp) - 0.22) * 5);
      const bmW=54, bmX=W/2-bmW/2, bmY=49;   // lane below the campaign progress bar (43..46), above the combo lane (55)
      ctx.fillStyle='rgba(0,0,0,0.32)'; ctx.fillRect(bmX-1,bmY-1,bmW+2,5);
      ctx.fillStyle='rgba(255,246,232,0.25)'; ctx.fillRect(bmX+bmW/2, bmY-1, 1, 5);
      const px = bmX + bmW/2 + bp*(bmW/2-1);
      balanceDanger = Math.abs(bp) > 0.72;
      ctx.fillStyle = balanceDanger ? (Math.floor(tick/6)%2?'#FF5E7E':'#FFD75E') : '#62E8B5';
      ctx.fillRect(Math.round(px-1), bmY-1, 3, 5);
      ctx.globalAlpha = 1;
      if (balanceDanger && Math.floor(tick/10)%2===0) txt(m.practice ? 'AUTO STEADY' : 'BALANCE!', W/2, 55, 1, m.practice ? '#62E8B5' : '#FF5E7E', 'center');
    }
  }
  const contextInfo=contextHUDInfo(h,m,balanceDanger);
  if (combo > 1 && !balanceDanger && !curNote && !regionIntro && !contextInfo) {
    const lbl = nova ? 'NOVA X' : fever ? 'FEVER X' : combo >= 7 ? 'BLAZING X' : 'COMBO X';
    const col2 = nova ? (Math.floor(tick/4)%2 ? '#FFFFFF' : 'hsl('+((tick*14)%360)+',100%,80%)')
               : fever ? ('hsl('+((tick*8)%360)+',100%,75%)')
               : combo >= 7 ? '#FF9E3D' : (combo>=5?'#FF7E6B':'#FFD75E');
    txt(lbl+combo, W/2, 55, 1, col2, 'center');
  }
  renderContextHUD(contextInfo);
  if (developerRunActive()) pixelButton(DEV_HUD_BTN,'DEV LAB',false);
  // sound toggle
  ctx.fillStyle='rgba(0,0,0,0.25)'; ctx.fillRect(SND_BTN.x-1,SND_BTN.y-1,SND_BTN.w+2,SND_BTN.h+2);
  // v92 fine grid: sloped speaker cone, thin sound arcs, half-pixel mute cross
  ctx.fillStyle = muted ? 'rgba(255,246,232,0.45)' : '#FFF6E8';
  ctx.fillRect(SND_BTN.x+2,SND_BTN.y+5,2.5,4);
  ctx.fillRect(SND_BTN.x+4.5,SND_BTN.y+4.5,.5,5); ctx.fillRect(SND_BTN.x+5,SND_BTN.y+4,.5,6);
  ctx.fillRect(SND_BTN.x+5.5,SND_BTN.y+3.5,.5,7); ctx.fillRect(SND_BTN.x+6,SND_BTN.y+3,.5,8);
  if (!muted) {
    ctx.fillRect(SND_BTN.x+8,SND_BTN.y+4.5,.5,.5); ctx.fillRect(SND_BTN.x+8.5,SND_BTN.y+5,.5,4); ctx.fillRect(SND_BTN.x+8,SND_BTN.y+9,.5,.5);
    ctx.fillRect(SND_BTN.x+10,SND_BTN.y+3,.5,.5); ctx.fillRect(SND_BTN.x+10.5,SND_BTN.y+3.5,.5,7); ctx.fillRect(SND_BTN.x+10,SND_BTN.y+10.5,.5,.5);
  }
  else for (let s2=0;s2<6;s2++) { ctx.fillRect(SND_BTN.x+8+s2*.5,SND_BTN.y+4.5+s2*.5,.5,.5); ctx.fillRect(SND_BTN.x+10.5-s2*.5,SND_BTN.y+4.5+s2*.5,.5,.5); }
}

// ---------- game over ----------
const CAUSE_TXT = { miss:'MISSED!', topple:'TOPPLED!', precision:'NOT PERFECT', time:"TIME'S UP", challenge:'GOAL COMPLETE', quit:'RUN ENDED' };
function renderGameOver() {
  ctx.fillStyle = 'rgba(11,14,26,0.66)'; ctx.fillRect(0, 0, W, H);
  const shadow = 'rgba(0,0,0,0.35)';
  // v115: paced, hierarchical reveal. Lines fade + slide up into place in sequence keyed off goT
  // (the game-over clock), so the eye lands on one reward at a time instead of 14 identical dim
  // rows at once. Rewards get emphasis (a brief scale-pop); routine tallies just fade in quietly.
  // reduceMotion => everything instant at full alpha, and the RESTING layout is byte-identical to
  // before, so there is zero overflow/overlap risk — only the first ~1.5s is animated.
  const RM = reduceMotion;
  const rev = t0 => RM ? 1 : clamp((goT - t0) / 7, 0, 1);              // 0..1 fade for a line born at t0
  const slide = t0 => RM ? 0 : (1 - rev(t0)) * 4;                      // starts 4px low, rises to rest
  const pop = t0 => RM ? 1 : (rev(t0) < 1 ? 1 + 0.26 * (1 - rev(t0)) : 1);  // emphasis: 1.26x -> 1x
  const at = t0 => { ctx.globalAlpha = rev(t0); return slide(t0); };   // set alpha, return y-offset

  let s = at(0);
  const title=challengeCleared?'CHALLENGE CLEAR':'GAME OVER';
  txt(title, W/2+1, 27+s, 2*pop(0), shadow, 'center');
  txt(title, W/2, 26+s, 2*pop(0), challengeCleared?'#62E8B5':'#FF5E7E', 'center');
  s = at(5); txt((CAUSE_TXT[overCause] || '') + ' - ' + activeRunName(), W/2, 46+s, 1, 'rgba(255,246,232,0.6)', 'center');
  s = at(10);
  txt('HEIGHT', W/2, 62+s, 1, 'rgba(255,246,232,0.7)', 'center');
  txt(blocks.length*METERS_PER+'M', W/2, 73+s, 2*(newHeight?pop(10):1), newHeight?'#62E8B5':'#FFF6E8', 'center');
  if (newHeight) { s = at(14); if (Math.floor(tick/20)%2===0) txt('NEW RECORD!', W/2, 91+s, pop(14), '#62E8B5', 'center'); }
  s = at(16); txt('SCORE '+score+(newBest?' - NEW BEST!':''), W/2, 103+s, newBest?pop(16):1, newBest?'#62E8B5':'rgba(255,246,232,0.85)', 'center');
  const runBest=activeChallenge()?challengeRecord(activeChallenge().id):{bestBlocks:bestBlocksFor(runContext.mode),bestScore:bestScoreFor(runContext.mode)};
  s = at(21); txt('BEST '+runBest.bestBlocks*METERS_PER+'M - '+fmtPts(runBest.bestScore)+' PTS', W/2, 114+s, 1, '#FFD75E', 'center');
  at(26); drawCoin(W/2-24, 127.5); txt('+'+runCoins, W/2-14, 127, 1, '#FFD75E', 'left');   // coin fades in place (stays centered on its digits)
  if (runSettled) txt('+'+xpThisRun+' XP', W/2+12, 127, 1, '#62E8B5', 'left');
  if (maxCombo > 1) { s = at(31); txt('MAX COMBO X'+maxCombo, W/2, 141+s, 1, 'rgba(255,246,232,0.8)', 'center'); }
  if(challengeReward){ s = at(34); txt('CHALLENGE REWARD +'+challengeReward+' COINS',W/2,151+s,pop(34),'#FFD75E','center'); }
  if (modifierResults.length) { s=at(36);txt(bonusSummaryText(),W/2,(challengeReward?162:151)+s,1,'#62E8B5','center'); }
  if (reviveOffered) {   // XP/missions settle after the offer — this space is the revive's
    ctx.globalAlpha = rev(14);   // the revive button fades in early so it's ready when overLock frees taps
    const cost = reviveCost(), ok = coins >= cost;
    const pulse = ok && Math.floor(tick/16)%2 === 0;
    plate3D(REVIVE_BTN.x, REVIVE_BTN.y, REVIVE_BTN.w, REVIVE_BTN.h,
      ok ? (pulse ? 'rgba(98,232,181,0.95)' : 'rgba(98,232,181,0.8)') : 'rgba(255,246,232,0.10)',
      ok ? null : 'rgba(255,246,232,0.25)');
    drawCoin(W/2 - 32, REVIVE_BTN.y + 8.5);
    txt(ok ? 'REVIVE ' + cost : 'NEED ' + cost, W/2 - 22, REVIVE_BTN.y + 8, 1, ok ? '#08301F' : 'rgba(255,246,232,0.5)', 'left');
    // HIDE, NEVER COLLIDE: on a short screen this caption has nowhere to go — drop it rather than
    // print it over the SHARE button. The button itself is already clamped above SHARE in relayout.
    if (REVIVE_BTN.y + 27 + 7 <= SHARE_BTN.y - 2)
      txt('1 REVIVE PER RUN', W/2, REVIVE_BTN.y + 27, 1, 'rgba(255,246,232,0.45)', 'center');
  } else if (runSettled) {
    let y = modifierResults.length ? (challengeReward?178:167) : (challengeReward?167:156);
    let ct = 42;   // the reward cascade reveals last, one item at a time, each with its own accent
    if (levelUpsThisRun > 0) {   // v114/v115: the biggest reward gets the biggest treatment and the first spotlight
      const so=at(ct),label='LEVEL UP! LV '+lvl.level+' +'+ECONOMY_RULES.levelUpReward+' COINS';
      const tw = label.length*6-1, pulse = Math.floor(tick/14)%2, yy = y+so;
      ctx.fillStyle = pulse ? 'rgba(255,215,94,0.24)' : 'rgba(255,215,94,0.15)';
      ctx.fillRect(W/2 - tw/2 - 8, yy-2, tw+16, 11);
      ctx.fillStyle = '#FFD75E'; ctx.fillRect(W/2 - tw/2 - 8, yy-2, tw+16, 1); ctx.fillRect(W/2 - tw/2 - 8, yy+8, tw+16, 1);
      txt(label, W/2, yy, 1, '#FFF6E8', 'center'); y += 14; ct += 7;
    }
    for(let i=0;i<achThisRun.length&&i<2;i++){const so=at(ct);txt(rewardLine('ACHIEVEMENT',achThisRun[i].name,achThisRun[i].reward,W-16),W/2,y+so,pop(ct),'#C77EFF','center');y+=11;ct+=6;}
    for(let i=0;i<collectionThisRun.length&&i<1;i++){const so=at(ct);txt(rewardLine('COLLECTION',collectionThisRun[i].name,collectionThisRun[i].reward,W-16),W/2,y+so,pop(ct),'#FFD75E','center');y+=11;ct+=6;}
    for(let i=0;i<completedThisRun.length&&i<2;i++){const so=at(ct);txt(rewardLine('ORDER',completedThisRun[i].text,completedThisRun[i].reward,W-16),W/2,y+so,pop(ct),'#62E8B5','center');y+=11;ct+=6;}
    if (runContext.mode === 'daily') { const so = at(ct); txt('DAILY STREAK ' + daily.streak, W/2, y+so, pop(ct), '#FF9E5E', 'center'); y += 11; }
  }
  ctx.globalAlpha = rev(30);
  ctx.fillStyle = 'rgba(94,200,242,0.9)'; ctx.fillRect(SHARE_BTN.x, SHARE_BTN.y, SHARE_BTN.w, SHARE_BTN.h);
  ctx.fillStyle = 'rgba(255,255,255,0.35)'; ctx.fillRect(SHARE_BTN.x, SHARE_BTN.y, SHARE_BTN.w, 1);
  txt('SHARE', W/2, SHARE_BTN.y + 5, 1, '#04222E', 'center');
  ctx.globalAlpha = 1;   // reveal is transient UI only — never let alpha leak into the next render
  if (overLock <= 0 && Math.floor(tick/30)%2===0) txt(reviveOffered ? 'TAP TO SKIP' : 'TAP TO CONTINUE', W/2, H-68, 1, '#FFF6E8', 'center');
}

// ---------- loop ----------
let last = performance.now();
// v130: the death beat breathes — the first stretch of a topple plays in slow motion. Safe because
// the run is already over and no input is pending; slow-mo during PLAY would change drop timing and
// therefore difficulty, which would be a balance change rather than a presentation one.
function beatScale() { return (!reduceMotion && state === 'gameover' && overCause === 'topple' && goT < 14) ? 0.45 : 1; }
function frame(now) { rafId = 0; let dt=(now-last)/16.667; last=now; if (dt>3) dt=3; if (dt<0) dt=0; update(dt*beatScale()); render(); rafId = requestAnimationFrame(frame); }
blocks = [{ x:(W-BASE_W)/2, w:BASE_W, col:blockCol(0) }];
cameraY = towerTopY()-(H - 100); cameraTarget = cameraY; camVel = 0; fadeT = 0;
previewIdx = Math.max(0, SKINS.findIndex(s => s.id === skinId));
booted = true;
if (DEV_MODE) { state='devmenu'; fadeT=0; }
render();
kickLoop();
try { if ('serviceWorker' in navigator && location.protocol.indexOf('http') === 0) navigator.serviceWorker.register('sw.js').catch(() => {}); } catch (e) {}
</script>
